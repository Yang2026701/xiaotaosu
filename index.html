<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>小桃酥的成长记录</title>

<!-- PWA -->
<link rel="manifest" href="/xiaotaosu/manifest.json">
<meta name="theme-color" content="#FFA07A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="小桃酥">
<link rel="apple-touch-icon" href="/xiaotaosu/icon-192.png">
<link rel="icon" type="image/png" href="/xiaotaosu/icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="小桃酥">

<style>
/* ===== RESET ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans SC",system-ui,-apple-system,sans-serif;background:#FFFBF5;color:#4E342E;line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}
button{cursor:pointer;font-family:inherit;border:none;background:none}
input,textarea,select{font-family:inherit;font-size:inherit}
input:focus,textarea:focus,select:focus{outline:none}

/* ===== DESIGN TOKENS ===== */
:root{
--peach:#FFA07A;--peach2:#FF8C69;--peach-light:#FFF0EB;--peach-bg:#FFEDE6;
--pink-light:#FFF0F3;--pink:#FFB6C1;
--cre-bg:#FFFBF5;--cre-card:#FFFFFF;--cre-hover:#FFF5EE;
--txt:#4E342E;--txt2:#8D6E63;--txt3:#BCAAA4;
--shadow:0 4px 12px rgba(0,0,0,0.06);
--radius:12px;--radius-lg:16px;--radius-full:9999px;
}

/* ===== LOCK SCREEN ===== */
#lock{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:linear-gradient(175deg,#FEF9F5,#FFF3EC,#FFE8DD,#FFF0F3,#FEF9F5);transition:opacity .4s}
#lock canvas{position:absolute;inset:0;pointer-events:none}
#lock.exit{opacity:0;pointer-events:none}
.lock-inner{position:relative;z-index:1;text-align:center;padding:40px 28px;max-width:340px;width:100%}
.lock-icon{font-size:4.2rem;display:block;margin-bottom:6px;animation:lkb 2.5s ease-in-out infinite;filter:drop-shadow(0 8px 20px rgba(255,160,122,.35))}
@keyframes lkb{0%,100%{transform:translateY(0)scale(1)}20%{transform:translateY(-14px)scale(1.1)}40%{transform:translateY(0)}55%{transform:translateY(-5px)scale(1.03)}70%{transform:translateY(0)}}
.lock-title{font-size:2.6rem;font-weight:800;letter-spacing:6px;margin-bottom:2px;background:linear-gradient(135deg,#E8886A,#FFA07A,#FF8C69,#E8886A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lock-sub{font-size:.95rem;color:#A09085;margin-bottom:32px;letter-spacing:2px}
.lock-wrap{display:flex;gap:8px}
.lock-input{flex:1;padding:15px 20px;border:1.5px solid rgba(255,160,122,.2);border-radius:18px;font-size:1.1rem;background:rgba(255,255,255,.65);color:#4E342E;letter-spacing:4px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 2px 12px rgba(180,140,120,.06);transition:border-color .2s,box-shadow .2s}
.lock-input:focus{border-color:#FFA07A;box-shadow:0 2px 16px rgba(255,160,122,.15)}
.lock-input::placeholder{color:#D7CCC8;letter-spacing:1px;font-size:.9rem}
.lock-btn{padding:15px 28px;border-radius:18px;background:linear-gradient(135deg,#FFA07A,#FF8C69);color:#fff;font-size:.95rem;font-weight:600;letter-spacing:2px;box-shadow:0 4px 18px rgba(255,140,105,.3);white-space:nowrap;transition:transform .15s,opacity .15s,box-shadow .15s}
.lock-btn:active{transform:scale(.95);box-shadow:0 2px 8px rgba(255,140,105,.2)}
.lock-btn:disabled{opacity:.6}
.lock-err{margin-top:14px;font-size:.82rem;color:#EF9A9A;min-height:20px}

/* ===== WELCOME PAGE ===== */
#welcome{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:linear-gradient(175deg,#FEF9F5 0%,#FFF3EC 25%,#FFE8DD 50%,#FFF0F3 75%,#FEF9F5 100%);transition:opacity .5s,transform .5s;overflow:hidden}
#welcome canvas{position:absolute;inset:0;pointer-events:none;z-index:0}
#welcome.exit{opacity:0;transform:scale(1.05);pointer-events:none}
.wc{position:relative;z-index:1;text-align:center;padding:32px 28px;max-width:340px;width:100%}
.w-icon{font-size:4.2rem;display:block;margin-bottom:8px;animation:lkb 2s ease-in-out infinite;filter:drop-shadow(0 8px 20px rgba(255,160,122,.35))}
.w-title{font-size:2.6rem;font-weight:800;letter-spacing:6px;margin-bottom:2px;background:linear-gradient(135deg,#E8886A 0%,#FFA07A 40%,#FF8C69 70%,#E8886A 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.w-sub{font-size:.95rem;color:#A09085;margin-bottom:28px;letter-spacing:2px;font-weight:400}

/* Age badge */
.w-age-badge{display:inline-block;background:rgba(255,255,255,.7);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:24px;padding:18px 32px;margin-bottom:24px;box-shadow:0 4px 24px rgba(180,140,120,.08);border:1px solid rgba(255,255,255,.8)}
.w-age-num{font-size:2.2rem;font-weight:800;color:#FF8C69;letter-spacing:1px;line-height:1.1}
.w-age-unit{font-size:.8rem;color:#A09085;font-weight:400;letter-spacing:2px;margin-top:2px}

/* Countdown card */
.w-cd-card{background:rgba(255,255,255,.65);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:20px;padding:16px 22px;margin-bottom:28px;text-align:center;box-shadow:0 4px 24px rgba(180,140,120,.08);border:1px solid rgba(255,255,255,.7)}
.w-cd-header{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px}
.w-cd-label-icon{font-size:1.3rem}
.w-cd-label-text{font-size:.85rem;font-weight:600;color:#8D6E63;letter-spacing:1px}
.w-cd-days-row{display:flex;align-items:baseline;justify-content:center;gap:8px;margin-bottom:10px}
.w-cd-num{font-size:2.6rem;font-weight:800;color:#FF8C69;font-variant-numeric:tabular-nums;font-feature-settings:"tnum";line-height:1}
.w-cd-unit{font-size:.95rem;color:#8D6E63;font-weight:500}
.w-cd-bar{height:4px;background:rgba(0,0,0,.04);border-radius:2px;overflow:hidden;margin-top:2px}
.w-cd-fill{height:100%;background:linear-gradient(90deg,#FFA07A,#FFB6C1);border-radius:2px;transition:width .8s ease;width:0%}

.w-enter{display:inline-flex;align-items:center;gap:10px;padding:18px 56px;border-radius:60px;background:linear-gradient(135deg,#FFA07A,#FF8C69);color:#fff;font-size:1.1rem;font-weight:600;letter-spacing:3px;box-shadow:0 8px 32px rgba(255,140,105,.3);transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden}
.w-enter::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);transition:left .6s}
.w-enter:hover::after,.w-enter:active::after{left:100%}
.w-enter:active{transform:scale(.95);box-shadow:0 4px 16px rgba(255,140,105,.25)}
.w-footer{margin-top:20px;font-size:.72rem;color:#BCAAA4;letter-spacing:1px;line-height:1.6}

/* ===== MAIN APP ===== */
#main{padding-bottom:56px;padding-bottom:calc(56px + env(safe-area-inset-bottom,0))}
#main[hidden]{display:none}
#main{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;max-width:768px;margin:0 auto}
#bar{position:sticky;top:0;z-index:50;background:rgba(255,251,245,.78);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(240,232,224,.6);padding:0 16px;height:48px;display:flex;align-items:center;justify-content:space-between}
.bar-left{display:flex;align-items:center;gap:8px}
.bar-logo{font-size:1.5rem;animation:lkb 3s ease-in-out infinite}
.bar-title{font-size:.95rem;font-weight:600;display:flex;align-items:center;gap:6px}
.bar-age-chip{display:inline-block;font-size:.6rem;font-weight:500;padding:1px 8px;border-radius:10px;background:rgba(255,160,122,.12);color:#FF8C69;letter-spacing:.5px}
.bar-sub{font-size:.7rem;color:#A09085}
.btn-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.25rem}
.btn-icon:active{background:#FFEDE6}
/* Content */
#content{flex:1;padding:16px}
.page{animation:pgIn .2s ease}
.page[hidden]{display:none}
@keyframes pgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Tab bar */
#tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:768px;height:56px;height:calc(56px+env(safe-area-inset-bottom,0));padding-bottom:env(safe-area-inset-bottom,0);background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-top:1px solid #F0E8E0;display:flex;justify-content:flex-start;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;z-index:50}
#tabs::-webkit-scrollbar{display:none}
.tab{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 10px;border-radius:6px;color:#BCAAA4;font-size:.625rem;font-weight:500;transition:color .15s;flex-shrink:0}
.tab.active{color:#FF8C69}
.tab .ti{font-size:1.4rem}

/* FAB */
#fab{position:fixed;bottom:calc(56px+16px+env(safe-area-inset-bottom,0));right:16px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#FFA07A,#FF8C69);color:#fff;font-size:1.75rem;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(255,140,105,.3);z-index:40;transition:transform .2s}
#fab:active{transform:scale(.92)}
#fab.hidden{transform:scale(0);opacity:0;pointer-events:none}
@media(min-width:768px){#fab{right:calc(50% - 384px + 16px)}}

/* Cards */
.card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid #F0E8E0;margin-bottom:16px;transition:transform .2s,box-shadow .3s}
.card:active{box-shadow:0 4px 12px rgba(0,0,0,.06)}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:8px 24px;border-radius:50px;font-size:.875rem;font-weight:500;transition:background .15s,transform .15s}
.btn:active{transform:scale(.97)}
.btn-p{background:#FFA07A;color:#fff}
.btn-p:active{background:#E67A5A}
.btn-s{background:#FFF5EE;color:#4E342E}
.btn-s:active{background:#FAEBD7}
.btn-d{background:#EF9A9A;color:#fff}
.btn-sm{padding:4px 12px;font-size:.75rem}
.btn-block{width:100%}

/* Form */
.fg{margin-bottom:16px}
.fl{display:block;font-size:.875rem;font-weight:500;color:#8D6E63;margin-bottom:4px}
.fi,.ft{width:100%;padding:8px 16px;border:1px solid #F0E8E0;border-radius:6px;background:#fff;color:#4E342E;font-size:1rem}
.fi:focus,.ft:focus{border-color:#FFA07A;box-shadow:0 0 0 3px rgba(255,160,122,.12)}
.ft{resize:vertical;min-height:100px;line-height:1.6}
.fr{display:flex;gap:16px}.fr .fg{flex:1}

/* Modal */
.modal{position:fixed;inset:0;background:rgba(78,52,46,.3);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;z-index:100;animation:fadeIn .2s}
.modal[hidden]{display:none}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.mc{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:85vh;display:flex;flex-direction:column;animation:slideUp .3s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 0}
.mh h2{font-size:1.125rem;font-weight:600}
.mb{padding:16px;overflow-y:auto;flex:1}
.mf{padding:0 16px 16px;display:flex;gap:8px;justify-content:flex-end}
@media(min-width:768px){.modal{align-items:center}.mc{border-radius:16px;max-height:80vh}}

/* Toast */
#toasts{position:fixed;bottom:calc(56px+16px+env(safe-area-inset-bottom,0));left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:#4E342E;color:#fff;padding:8px 24px;border-radius:50px;font-size:.875rem;box-shadow:0 8px 24px rgba(0,0,0,.08);animation:tIn .3s,tOut .3s 2.2s forwards;pointer-events:auto}
.toast-ok{background:#66BB6A}
.toast-err{background:#EF5350}
@keyframes tIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes tOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-16px)}}

/* Empty */
.empty{display:flex;flex-direction:column;align-items:center;padding:48px 16px;text-align:center}
.empty-icon{font-size:3.5rem;margin-bottom:16px;animation:floatIcon 3s ease-in-out infinite}
@keyframes floatIcon{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.empty-title{font-size:1.125rem;font-weight:500;color:#8D6E63;margin-bottom:8px}
.empty-desc{font-size:.875rem;color:#BCAAA4;max-width:240px}

/* Chips */
.chips{display:flex;gap:8px;flex-wrap:nowrap;overflow-x:auto;padding:8px 0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 16px;border-radius:50px;font-size:.75rem;font-weight:500;white-space:nowrap;border:1px solid #F0E8E0;background:#fff;color:#8D6E63;transition:all .15s}
.chip.on{background:#FFA07A;color:#fff;border-color:#FFA07A}

/* Photo grid */
.photo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.pg-month{font-size:.875rem;font-weight:600;color:#8D6E63;padding:16px 0 8px;position:sticky;top:56px;background:#FFFBF5;z-index:5}
.pc{position:relative;border-radius:12px;overflow:hidden;background:#FFF5EE;aspect-ratio:1;cursor:pointer;transition:transform .25s}
.pc:active{transform:scale(.97)}
.pc img{width:100%;height:100%;object-fit:cover}
.pc-cap{position:absolute;bottom:0;left:0;right:0;padding:8px;background:linear-gradient(transparent,rgba(0,0,0,.5));color:#fff;font-size:.75rem;display:flex;justify-content:space-between}
.pc-fav{position:absolute;top:8px;right:8px;font-size:1rem;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3))}
@media(min-width:768px){.photo-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1024px){.photo-grid{grid-template-columns:repeat(4,1fr)}}

/* Lightbox */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:150;display:flex;flex-direction:column;align-items:center;justify-content:center}
.lb[hidden]{display:none}
.lb-img{flex:1;display:flex;align-items:center;justify-content:center;padding:16px}
.lb-img img{max-width:100%;max-height:70vh;object-fit:contain;border-radius:6px}
.lb-close{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;font-size:1.25rem;display:flex;align-items:center;justify-content:center}
.lb-nav{position:absolute;top:50%;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;font-size:1.25rem;display:flex;align-items:center;justify-content:center}
.lb-prev{left:8px}.lb-next{right:8px}
.lb-cap{padding:16px;color:#fff;text-align:center}
.lb-cap .ltitle{font-size:1rem;font-weight:500}
.lb-cap .ldate{font-size:.875rem;color:rgba(255,255,255,.6)}
.lb-acts{display:flex;gap:12px;justify-content:center;padding:0 16px 24px}
.lb-acts button{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.12);color:#fff;font-size:1.1rem;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer}
.lb-acts button:active{background:rgba(255,255,255,.25)}

/* Lightbox description */
.lb-desc{font-size:.8rem;color:rgba(255,255,255,.5);margin-top:4px;max-width:280px;margin-left:auto;margin-right:auto}

/* Milestone */
.ms-sum{display:flex;gap:16px;margin-bottom:24px}
.ms-stat{flex:1;text-align:center;background:#fff;border-radius:12px;padding:8px;border:1px solid #F0E8E0}
.ms-stat-v{font-size:1.25rem;font-weight:600;color:#FF8C69}
.ms-stat-l{font-size:.75rem;color:#BCAAA4;margin-top:2px}
.ms-card{display:flex;gap:16px;padding:16px;background:#fff;border-radius:12px;border:1px solid #F0E8E0;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ms-card.up{opacity:.5;border-style:dashed;background:#FFF5EE}
.ms-emoji{font-size:2rem;width:48px;height:48px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#FFF5EE;border-radius:50%}
.ms-info{flex:1;min-width:0}
.ms-info h3{font-size:1rem;font-weight:500;margin-bottom:2px}
.ms-meta{font-size:.75rem;color:#BCAAA4;margin-bottom:8px}
.ms-notes{font-size:.875rem;color:#8D6E63;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* Milestone guessing */
.mg-section{margin-top:28px;padding-top:20px;border-top:2px dashed #F0E8E0}
.mg-section-title{font-size:.95rem;font-weight:600;color:#5D4037;margin-bottom:16px}
.mg-upcoming-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#FFFBF5;border-radius:12px;margin-bottom:8px;border:1px solid #F5EDE5}
.mg-up-emoji{font-size:1.5rem;flex-shrink:0}
.mg-up-info{flex:1;min-width:0}
.mg-up-title{font-size:.85rem;font-weight:500;color:#4E342E}
.mg-up-meta{font-size:.7rem;color:#BCAAA4}
.mg-guess-btn{padding:6px 14px;border-radius:16px;background:linear-gradient(135deg,#FFA07A,#FF8C69);color:#fff;font-size:.7rem;font-weight:500;cursor:pointer;white-space:nowrap;transition:transform .15s;flex-shrink:0}
.mg-guess-btn:active{transform:scale(.93)}
.mg-guess-count{font-size:.65rem;color:#FFA07A;margin-top:2px;text-align:center}

/* Guess results for achieved */
.mg-result-card{background:linear-gradient(135deg,#FFFBF5,#FFF8F0);border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid #F5EDE5}
.mg-result-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.mg-result-emoji{font-size:1.3rem}
.mg-result-title{font-size:.85rem;font-weight:600;color:#4E342E}
.mg-result-date{font-size:.7rem;color:#8D6E63;margin-left:auto}
.mg-leader-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;margin-bottom:4px;font-size:.8rem}
.mg-leader-item.winner{background:rgba(255,215,0,.15);font-weight:600}
.mg-leader-rank{font-size:1.1rem;width:24px;text-align:center;flex-shrink:0}
.mg-leader-name{flex:1;color:#4E342E}
.mg-leader-diff{font-size:.7rem;color:#8D6E63}
.mg-leader-diff.exact{color:#66BB6A;font-weight:600}
.mg-no-guesses{font-size:.75rem;color:#BCAAA4;padding:8px 0}
.mg-share-hint{font-size:.75rem;color:#BCAAA4;text-align:center;padding:12px;margin-top:8px}

/* Growth */
.stat-tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:24px}
.stat-tile{background:#fff;border-radius:12px;padding:16px;text-align:center;border:1px solid #F0E8E0}
.stat-val{font-size:1.5rem;font-weight:600;color:#4E342E}.stat-val .u{font-size:.875rem;font-weight:400;color:#8D6E63;margin-left:2px}
.stat-lbl{font-size:.75rem;color:#BCAAA4;margin-top:4px}
.chart-box{background:#fff;border-radius:14px;padding:16px;margin-bottom:20px;border:1px solid #F0E8E0}
.chart-box h3{font-size:.95rem;font-weight:600;margin-bottom:12px;color:#8D6E63}
.chart-wrap{position:relative;width:100%;height:280px}

/* Growth cards — cute style */
.growth-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.gr-card{background:#fff;border-radius:14px;padding:14px 10px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.03);transition:transform .15s}
.gr-card:active{transform:scale(.96)}
.gr-card-top{display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:4px}
.gr-card-icon{font-size:1.2rem}
.gr-card-label{font-size:.75rem;color:#8D6E63;font-weight:500}
.gr-card-val{font-size:1.4rem;font-weight:700;color:#4E342E}
.gr-card-unit{font-size:.75rem;font-weight:400;color:#8D6E63}
.gr-card-pct{font-size:.75rem;font-weight:600;margin-top:2px}
.gr-card-delta{font-size:.7rem;color:#81C784;margin-top:2px}
.tbl{width:100%;border-collapse:collapse;font-size:.875rem}
.tbl th,.tbl td{text-align:center;padding:8px 4px;border-bottom:1px solid #F0E8E0}
.tbl th{font-weight:500;color:#BCAAA4;font-size:.75rem}

/* Diary - enhanced */
.diary-tl{position:relative;padding-left:20px}
.diary-tl::before{content:'';position:absolute;left:6px;top:8px;bottom:8px;width:2px;background:linear-gradient(180deg,#FFA07A,#FFB6C1,#D7CCC8);border-radius:1px}
.dc{position:relative;padding:16px;border-radius:14px;margin-bottom:16px;cursor:pointer;transition:transform .2s,box-shadow .3s;overflow:hidden}
.dc::before{content:'';position:absolute;left:-24px;top:22px;width:10px;height:10px;border-radius:50%;border:2px solid #fff;z-index:1}
.dc-mood-joyful{background:linear-gradient(135deg,#FFFBF5,#FFF0EB);border:1px solid rgba(255,160,122,.15)}.dc-mood-joyful::before{background:#FFA07A;box-shadow:0 0 0 2px rgba(255,160,122,.3)}
.dc-mood-tired{background:linear-gradient(135deg,#FFFBF5,#E8EAF6);border:1px solid rgba(159,168,218,.15)}.dc-mood-tired::before{background:#9FA8DA;box-shadow:0 0 0 2px rgba(159,168,218,.3)}
.dc-mood-grateful{background:linear-gradient(135deg,#FFFBF5,#F3E5F5);border:1px solid rgba(206,147,216,.15)}.dc-mood-grateful::before{background:#CE93D8;box-shadow:0 0 0 2px rgba(206,147,216,.3)}
.dc-mood-worried{background:linear-gradient(135deg,#FFFBF5,#E3F2FD);border:1px solid rgba(144,202,249,.15)}.dc-mood-worried::before{background:#90CAF9;box-shadow:0 0 0 2px rgba(144,202,249,.3)}
.dc-mood-touched{background:linear-gradient(135deg,#FFFBF5,#FFE0B2);border:1px solid rgba(255,183,77,.15)}.dc-mood-touched::before{background:#FFB74D;box-shadow:0 0 0 2px rgba(255,183,77,.3)}
.dc-mood-amused{background:linear-gradient(135deg,#FFFBF5,#C8E6C9);border:1px solid rgba(129,199,132,.15)}.dc-mood-amused::before{background:#81C784;box-shadow:0 0 0 2px rgba(129,199,132,.3)}
.dc-mood-hopeful{background:linear-gradient(135deg,#FFFBF5,#FFE0F0);border:1px solid rgba(240,98,146,.1)}.dc-mood-hopeful::before{background:#F06292;box-shadow:0 0 0 2px rgba(240,98,146,.3)}
.dc:active{transform:scale(.98);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.dc-h{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.dc-mood{font-size:1.8rem;line-height:1}
.dc-date{font-size:.75rem;color:#BCAAA4}
.dc-weather{font-size:.9rem}
.dc-title{font-size:1.05rem;font-weight:600;margin-bottom:6px;color:#4E342E}
.dc-preview{font-size:.875rem;color:#8D6E63;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;line-height:1.6}
.dc-photos{display:flex;gap:6px;margin-top:10px;overflow-x:auto}
.dc-photos img{width:60px;height:60px;border-radius:8px;object-fit:cover;flex-shrink:0}
.dc-footer{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;align-items:center}
.dc-tag{font-size:.7rem;color:#FF8C69;background:rgba(255,160,122,.1);padding:2px 8px;border-radius:10px}
.dc-otd{background:linear-gradient(135deg,#FFE0D5,#FFEDE6);border-radius:12px;padding:10px 14px;margin-bottom:16px;font-size:.85rem;display:flex;align-items:center;gap:8px}
.dc-otd span{color:#FF8C69;font-weight:600}
.dc-template{background:#fff;border-radius:14px;padding:10px;margin-bottom:16px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.dc-tpl-btn{text-align:center;padding:10px 4px;border-radius:10px;border:1px dashed #EDE7E0;cursor:pointer;font-size:.75rem;transition:all .15s}
.dc-tpl-btn:active{background:#FFF0EB;border-color:#FFA07A}
.dc-tpl-btn .tpl-icon{font-size:1.2rem;display:block;margin-bottom:2px}
.dc-add-hero{background:linear-gradient(135deg,#FFF0EB,#FFE4E8);border-radius:20px;padding:28px 20px;text-align:center;cursor:pointer;transition:transform .2s,box-shadow .2s;border:2px dashed rgba(255,160,122,.3);animation:heroGlow 3s ease-in-out infinite}
.dc-add-hero:active{transform:scale(.96);box-shadow:0 4px 20px rgba(255,160,122,.15)}
@keyframes heroGlow{0%,100%{box-shadow:0 0 20px rgba(255,160,122,.1)}50%{box-shadow:0 0 40px rgba(255,160,122,.2)}}
.dc-add-icon{font-size:3rem;display:block;margin-bottom:8px;animation:floatIcon 2.5s ease-in-out infinite}
.dc-add-title{font-size:1.2rem;font-weight:700;color:#4E342E;margin-bottom:4px}
.dc-add-sub{font-size:.8rem;color:#BCAAA4;margin-bottom:12px}
.dc-add-btn{display:inline-block;padding:10px 32px;background:linear-gradient(135deg,#FFA07A,#FF8C69);color:#fff;border-radius:25px;font-size:.9rem;font-weight:600;letter-spacing:1px;box-shadow:0 4px 16px rgba(255,140,105,.3)}
.detail-h{margin-bottom:24px}
.detail-content{font-size:1rem;line-height:1.8;white-space:pre-wrap;margin-bottom:24px}
/* Parenting Guide */
.pg-progress{background:#FFF0EB;border-radius:16px;padding:16px;margin-bottom:20px;border:1px solid rgba(255,160,122,.15)}
.pg-progress-bar{height:8px;border-radius:4px;background:#FFDDD1;margin-top:8px;overflow:hidden}
.pg-progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#FFA07A,#FF8C69);transition:width .5s}
.pg-stage-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid #F0E8E0;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.pg-stage-card.active{border-color:#FFA07A;box-shadow:0 4px 16px rgba(255,160,122,.12)}
.pg-stage-card.locked{opacity:.5;background:#FAFAFA;pointer-events:none}
.pg-knowledge{background:#FFFBFA;border-radius:12px;padding:12px;margin:12px 0;border:1px dashed #FFDDD1}
.pg-kn-header{display:flex;align-items:center;gap:6px;margin-bottom:8px;cursor:pointer}
.pg-kn-title{font-size:.85rem;font-weight:600;color:#FF8C69}
.pg-kn-body{font-size:.85rem;line-height:1.7;color:#5D4037}
.pg-kn-body p{margin-bottom:8px}
.pg-kn-body strong{color:#FF8C69}
.pg-kn-tag{display:inline-block;font-size:.65rem;padding:1px 6px;border-radius:6px;background:#FFEDE6;color:#FF8C69;margin-right:4px;margin-bottom:4px}
.pg-stage-content{transition:max-height .3s ease}
.pg-stage-toggle-btn{font-size:.75rem;color:#FF8C69;margin-top:8px;cursor:pointer;display:inline-block}
.pg-stage-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:4px 0}
.pg-stage-title{font-size:1rem;font-weight:600}
.pg-stage-age{font-size:.8rem;color:#BCAAA4}
.pg-stage-badge{font-size:.7rem;padding:2px 8px;border-radius:10px;font-weight:500}
.pg-stage-badge.current{background:#FFEDE6;color:#FF8C69}
.pg-stage-badge.done{background:#E8F5E9;color:#66BB6A}
.pg-stage-badge.upcoming{background:#F5F5F5;color:#BCAAA4}
.pg-cat{margin-top:12px}
.pg-cat-title{font-size:.8rem;font-weight:600;color:#BCAAA4;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.pg-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #F5F3F0}
.pg-item:last-child{border-bottom:none}
.pg-check{width:22px;height:22px;border-radius:50%;border:2px solid #DDD;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.7rem;cursor:pointer;transition:all .15s;margin-top:1px}
.pg-check.done{background:#81C784;border-color:#81C784;color:#fff}
.pg-check:active{transform:scale(1.2)}
.pg-item-text{flex:1;font-size:.9rem;line-height:1.5}
.pg-item-tip{font-size:.75rem;color:#BCAAA4;margin-top:2px}
.pg-stage-toggle{font-size:.8rem;color:#FF8C69;cursor:pointer}

/* Health module */
.health-ai{background:linear-gradient(135deg,#FFF0EB,#FFE4E8);border-radius:16px;padding:16px;margin-bottom:24px;border:1px solid rgba(255,160,122,.2)}
.health-ai h3{font-size:1rem;font-weight:600;color:#FF8C69;margin-bottom:8px}
.health-ai-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:.9rem}
.health-ai-warn{color:#EF9A9A;font-weight:500}
.health-ai-ok{color:#81C784;font-weight:500}
.health-tl{position:relative;padding-left:24px}
.health-tl::before{content:'';position:absolute;left:8px;top:4px;bottom:4px;width:2px;background:#EDE7E0}
.hr-card{position:relative;padding:12px 16px;background:#fff;border-radius:12px;border:1px solid #F0E8E0;margin-bottom:12px}
.hr-card::before{content:'';position:absolute;left:-20px;top:16px;width:10px;height:10px;border-radius:50%;background:#FFA07A;border:2px solid #fff;box-shadow:0 0 0 2px #FFA07A}
.hr-card.done::before{background:#81C784;box-shadow:0 0 0 2px #81C784}
.hr-card.overdue::before{background:#EF9A9A;box-shadow:0 0 0 2px #EF9A9A;animation:overduePulse 2s infinite}
@keyframes overduePulse{0%,100%{box-shadow:0 0 0 2px #EF9A9A}50%{box-shadow:0 0 0 6px rgba(239,154,154,.3)}}
.hr-card.overdue{border-color:#FFCDD2;background:#FFFBFB}
.hr-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.hr-badge{font-size:.65rem;padding:2px 8px;border-radius:10px;font-weight:600;letter-spacing:.5px}
.hr-badge.vaccine{background:#FFEDE6;color:#FF8C69}
.hr-badge.checkup{background:#E8F5E9;color:#66BB6A}
.hr-badge.illness{background:#FFEBEE;color:#EF5350}
.hr-badge.medication{background:#E3F2FD;color:#42A5F5}
.hr-title{font-size:.95rem;font-weight:500;flex:1}
.hr-date{font-size:.75rem;color:#BCAAA4}
.hr-notes{font-size:.8rem;color:#8D6E63;margin-top:4px}
.hr-actions{display:flex;gap:8px;margin-top:8px}
.hr-add{background:#fff;border-radius:16px;padding:16px;border:2px dashed #EDE7E0;text-align:center;cursor:pointer;transition:border-color .2s}
.hr-add:active{border-color:#FFA07A}
.hr-add-icon{font-size:1.5rem;color:#FFA07A;margin-bottom:4px}
.hr-add-text{font-size:.85rem;color:#BCAAA4}
.hr-file{display:inline-flex;align-items:center;gap:4px;background:#F5F5F5;padding:4px 10px;border-radius:8px;font-size:.75rem;color:#42A5F5;margin-top:6px;cursor:pointer;transition:background .15s}
.hr-file:active{background:#E3F2FD}
.hr-file-icon{font-size:.9rem}
.hr-file-input{display:none}

/* Moods */
.moods{display:flex;gap:8px;flex-wrap:wrap}
.mood-o{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;border:2px solid transparent;background:#FFF5EE;transition:all .15s}
.mood-o.sel{border-color:#FFA07A;background:#FFEDE6;transform:scale(1.1)}

/* Settings */
.ss{margin-bottom:32px}
.ss h3{font-size:.875rem;font-weight:600;color:#BCAAA4;text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px}
.sc{background:#fff;border-radius:12px;border:1px solid #F0E8E0;overflow:hidden}
.sr{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid #F0E8E0}
.sr:last-child{border-bottom:none}
.sr-label{font-size:.875rem;font-weight:500}
.sr-val{font-size:.875rem;color:#8D6E63}
.sr-act{color:#FFA07A;font-size:.875rem;font-weight:500}
.sr:active{background:#FFF5EE}

/* Confetti */
.confetti{position:fixed;inset:0;pointer-events:none;z-index:300}

/* FAB menu */
.fab-menu{position:fixed;right:16px;z-index:55;display:flex;flex-direction:column;gap:12px;transition:opacity .2s,transform .2s;pointer-events:auto}
.fab-menu.hidden{opacity:0;transform:translateY(12px);pointer-events:none}
.fab-mbtn{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.12);transition:transform .15s}
.fab-mbtn:active{transform:scale(.9)}
#fab-photo{background:#FFA07A;color:#fff}
#fab-video{background:#FF91A4;color:#fff}
@media(min-width:768px){.fab-menu{right:calc(50% - 384px + 16px)}}

/* Video card overlay */
.pc-video-badge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:1rem;pointer-events:none}
.pc-video-badge::after{content:'';display:block;width:0;height:0;border-style:solid;border-width:8px 0 8px 14px;border-color:transparent transparent transparent #fff;margin-left:3px}

/* Lightbox video */
.lb-video{max-width:100%;max-height:70vh;border-radius:6px;outline:none}

/* Daily log */
.dl-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.dl-btn{border-radius:14px;padding:18px 10px;text-align:center;cursor:pointer;border:none;font-size:.95rem;font-weight:600;color:#fff;transition:transform .15s;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.dl-btn:active{transform:scale(.95)}
.dl-bf{background:linear-gradient(135deg,#FFA07A,#FF8C69)}
.dl-sl{background:linear-gradient(135deg,#9FA8DA,#7986CB)}
.dl-dp{background:linear-gradient(135deg,#A5D6A7,#81C784)}
.dl-other{background:linear-gradient(135deg,#FFB74D,#FFA726)}
.dl-btn-icon{font-size:1.8rem;display:block;margin-bottom:4px}
.dl-today{border-radius:14px;padding:16px;margin-bottom:16px;background:linear-gradient(135deg,#FFFBF5,#FFF0EB);border:1px solid rgba(255,160,122,.15)}
.dl-today h3{font-size:.95rem;font-weight:600;color:#FF8C69;margin-bottom:10px}
.dl-stat{display:flex;justify-content:space-around;text-align:center}
.dl-stat-item{flex:1}
.dl-stat-num{font-size:1.3rem;font-weight:700;color:#4E342E}
.dl-stat-lbl{font-size:.7rem;color:#BCAAA4}
.dl-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F5F3F0}
.dl-item-icon{font-size:1.3rem;width:28px;text-align:center}
.dl-item-info{flex:1;font-size:.85rem}
.dl-item-time{font-size:.7rem;color:#BCAAA4}
.dl-item-val{font-size:.85rem;font-weight:600;color:#FF8C69;white-space:nowrap}
.dl-item-del{color:#BCAAA4;cursor:pointer;font-size:.8rem;padding:4px}
.dl-item-del:active{color:#EF9A9A}
.dl-quick{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.dl-chip{font-size:.7rem;padding:4px 10px;border-radius:10px;background:#fff;border:1px solid #F0E8E0;cursor:pointer;white-space:nowrap}
.dl-chip.on{background:#FFA07A;color:#fff;border-color:#FFA07A}
/* Responsive */
@media(min-width:768px){
#tabs{position:static;transform:none;height:auto;padding:0 16px;background:transparent;backdrop-filter:none;border-top:none;border-bottom:1px solid #F0E8E0;gap:4px;justify-content:flex-start}
.tab{flex-direction:row;gap:4px;padding:8px 16px;border-bottom:2px solid transparent;font-size:.875rem}
.tab.active{border-bottom-color:#FF8C69}
.tab .ti{font-size:1.1rem}
#main{padding-bottom:0}
#fab{bottom:16px}
}

@media print{
#tabs,#fab,.modal,#toasts,#lock,#welcome,canvas{display:none!important}
#main{padding-bottom:0;max-width:none}body{background:#fff;color:#000}
.card,.ms-card,.dc{box-shadow:none;border:1px solid #ddd}
}

/* ===== WEEKLY BANNER (顶部横幅卡片) ===== */
.wb-card{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#FFFBF5,#FFF0EB,#FFF5F0);border-radius:14px;padding:12px 14px;margin-bottom:14px;border:1px solid rgba(255,160,122,.2);cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.wb-card:active{transform:scale(.98);box-shadow:0 4px 12px rgba(255,160,122,.15)}
.wb-card::after{content:'';position:absolute;top:-20px;right:-20px;width:60px;height:60px;border-radius:50%;background:rgba(255,160,122,.08)}
.wb-icon{font-size:2rem;flex-shrink:0;position:relative;z-index:1}
.wb-info{flex:1;min-width:0;position:relative;z-index:1}
.wb-title{font-size:.85rem;font-weight:600;color:#5D4037;margin-bottom:2px}
.wb-week{font-size:.7rem;color:#BCAAA4;margin-bottom:4px}
.wb-stats{display:flex;gap:8px;flex-wrap:wrap}
.wb-stat{font-size:.65rem;color:#8D6E63;background:rgba(255,255,255,.7);padding:2px 8px;border-radius:8px;white-space:nowrap}
.wb-arrow{font-size:1.2rem;color:#FFA07A;flex-shrink:0;position:relative;z-index:1}
.wb-empty{font-size:.7rem;color:#BCAAA4}

/* Weekly report back button */
.wr-back{display:inline-flex;align-items:center;gap:4px;padding:8px 14px;background:#fff;border:1px solid #F0E8E0;border-radius:20px;color:#8D6E63;font-size:.8rem;cursor:pointer;margin-bottom:12px;transition:all .15s}
.wr-back:active{background:#FFEDE6}

/* ===== WEEKLY REPORT (手账杂志风) ===== */
.wr-wrap{padding-bottom:80px}
.wr-header{display:flex;align-items:center;justify-content:center;gap:16px;padding:8px 0 20px}
.wr-nav-btn{width:36px;height:36px;border-radius:50%;background:#fff;border:1px solid #F0E8E0;color:#8D6E63;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all .15s}
.wr-nav-btn:active{background:#FFEDE6;border-color:#FFA07A}
.wr-nav-btn.disabled{opacity:.3;pointer-events:none}
.wr-week-label{font-size:1rem;font-weight:600;color:#4E342E;letter-spacing:1px;min-width:180px;text-align:center}
.wr-week-sub{font-size:.7rem;color:#BCAAA4;font-weight:400;display:block;margin-top:2px}
.wr-card{background:#fff;border-radius:16px;padding:18px 16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.04);border:1px solid #F5EDE5;position:relative;overflow:hidden}
.wr-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#FFA07A,#FFB6C1,#FFD1C4,#FFA07A);opacity:.5}
.wr-card.paper{background:linear-gradient(180deg,#FFFBF5,#FFF9F0,#FFFBF5)}
.wr-section-t{font-size:.95rem;font-weight:600;color:#5D4037;margin-bottom:14px;padding-bottom:8px;border-bottom:1px dashed #EDE0D5;letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.wr-section-t .wr-ico{font-size:1.2rem}
.wr-stat-row{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.wr-stat-badge{flex:1;min-width:70px;background:#FFFBF5;border-radius:12px;padding:12px 10px;text-align:center;border:1px solid #F5EDE5}
.wr-stat-badge .wr-sv{font-size:1.4rem;font-weight:700;color:#FF8C69;line-height:1.2}
.wr-stat-badge .wr-sl{font-size:.65rem;color:#BCAAA4;margin-top:4px}
.wr-stat-badge.accent .wr-sv{color:#81C784}
.wr-stat-badge.formula .wr-sv{color:#FFA07A}
.wr-stat-badge.breast .wr-sv{color:#FF91A4}

/* Feed bar chart */
.wr-bars{display:flex;align-items:flex-end;gap:6px;height:100px;padding:4px 0}
.wr-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.wr-bar{width:100%;max-width:32px;border-radius:6px 6px 2px 2px;transition:height .3s;min-height:4px}
.wr-bar.fm{background:linear-gradient(180deg,#FFA07A,#FFCCA0)}
.wr-bar.bm{background:linear-gradient(180deg,#FF91A4,#FFC4D0)}
.wr-bar-label{font-size:.6rem;color:#BCAAA4;text-align:center}
.wr-bar-val{font-size:.55rem;color:#8D6E63;font-weight:500}

/* Feed summary */
.wr-feed-summary{display:flex;gap:8px;margin-top:12px;font-size:.75rem;color:#8D6E63;flex-wrap:wrap}
.wr-feed-tag{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:500}
.wr-feed-tag.fm-tag{background:#FFF0EB;color:#FF8C69}
.wr-feed-tag.bm-tag{background:#FFF0F3;color:#FF91A4}

/* Photo strip */
.wr-photo-strip{display:flex;gap:10px;overflow-x:auto;padding:4px 0 8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.wr-photo-strip::-webkit-scrollbar{display:none}
.wr-photo-item{flex-shrink:0;width:80px;text-align:center}
.wr-photo-img{width:80px;height:80px;border-radius:6px;object-fit:cover;background:#FFEDE6;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.wr-photo-cap{font-size:.6rem;color:#BCAAA4;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px}

/* Diary snippet */
.wr-diary-item{padding:10px 14px;margin-bottom:8px;background:linear-gradient(135deg,#FFFBF5,#FFF8F0);border-radius:10px;border-left:3px solid #FFD1C4}
.wr-diary-mood{font-size:1.2rem;margin-right:4px}
.wr-diary-date{font-size:.65rem;color:#BCAAA4;margin-bottom:4px}
.wr-diary-text{font-size:.8rem;color:#6D5D55;line-height:1.5;font-style:italic;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

const lockInput = $('#lock-input');
const lockBtn = $('#lock-submit');
const lockErr = $('#lock-err');
const lockEl = $('#lock');

lockInput.focus();

async function tryLogin(input) {
  lockBtn.textContent = '验证中...';
  lockBtn.disabled = true;
  lockErr.textContent = '';

  try {
    // Add timeout
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 10000);

    const config = await API.getConfig();
    clearTimeout(timer);

    if (!config) {
      lockErr.textContent = '数据库配置缺失，请先执行 SQL 初始化';
      lockBtn.textContent = '进入';
      lockBtn.disabled = false;
      return;
    }

    if (config.passcode === input) {
      sessionStorage.setItem('xts_pass', input);
      await enterApp(config);
    } else {
      lockErr.textContent = '密码错误，请重试（默认: 123456）';
      lockBtn.textContent = '进入';
      lockBtn.disabled = false;
    }
  } catch (e) {
    console.error('Login error:', e);
    if (e.name === 'AbortError') {
      lockErr.textContent = '连接超时，请检查网络后刷新';
    } else {
      lockErr.textContent = '无法连接服务器: ' + e.message.slice(0,30);
    }
    lockBtn.textContent = '进入';
    lockBtn.disabled = false;
  }
}

lockBtn.addEventListener('click', () => {
  const val = lockInput.value.trim();
  if (!val) { lockErr.textContent = '请输入密码'; return; }
  lockErr.textContent = '';
  tryLogin(val);
});

lockInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const val = e.target.value.trim();
    if (val) tryLogin(val);
  }
});

// Try auto-login with stored passcode
(function(){
  const saved = sessionStorage.getItem('xts_pass');
  if (saved) {
    lockInput.value = saved;
    tryLogin(saved);
  }
})();

  appData.settings.babyName = config.baby_name || CFG.DEFAULT_NAME;

  lockEl.classList.add('exit');

    lockEl.style.display = 'none';

    // Load data
    try {
      const [photos, milestones, growth, diary, health, parenting, dailyLogs, milestoneGuesses] = await Promise.all([

      console.error('Load error:', e);
      isFirstRun = true;
    }

    showWelcome();

}

function showWelcome() {
  const s = appData.settings;
  const age = U.age(s.birthDate, U.today());
  const msAchieved = new Set(appData.milestones.filter(m=>m.type!=='custom').map(m=>m.type));

  $('#wname').textContent = s.babyName;
  $('#wage').textContent = age.text;
  $('#w-footer-stats').textContent = appData.photos.length+' 张照片 · '+msAchieved.size+' 个里程碑';

  // Countdown to next milestone
  const milestones = getUpcomingMilestones(s.birthDate);
  if (milestones.length > 0) {
    const next = milestones[0];
    $('#w-cd-emoji').textContent = next.emoji;
    $('#w-cd-name').textContent = next.label;
    $('#w-cd-days').textContent = next.daysLeft;
    // Calculate progress percentage
    var totalDays=next.totalDays||100;
    var elapsed=Math.max(0,totalDays-next.daysLeft);
    var pct=Math.min(100,Math.round(elapsed/totalDays*100));
    $('#w-cd-fill').style.width=pct+'%';
    if (next.daysLeft === 0) {
      $('#w-cd-unit-text').textContent = '就是今天！';
      $('#w-cd-fill').style.width='100%';
      $('#w-cd-fill').style.background='linear-gradient(90deg,#FFD700,#FFA07A)';
    } else {
      $('#w-cd-unit-text').textContent = '天后到来';
    }
  } else {
    $('#w-countdown').style.display = 'none';
  }

  $('#welcome').hidden = false;
  initWelcomeParticles();

  $('#wenter').addEventListener('click', () => {
    $('#welcome').classList.add('exit');
    setTimeout(() => {
      $('#welcome').hidden = true;
      setupMainApp();
    }, 450);
  });
}

function setupMainApp() {
  $('#main').hidden = false;
  updateTitle();
  updateAge();

  const hash = location.hash.replace('#','');
  activeTab = ['album','milestones','growth','diary','daily','weekly','parenting','health','settings'].includes(hash) ? hash : 'album';
  location.hash = activeTab;
  navigate(activeTab);

  // Tab clicks
  $$('#tabs .tab').forEach(b => {
    b.addEventListener('click', () => { location.hash = b.dataset.tab; });
  });

  window.addEventListener('hashchange', async () => {
    const tab = location.hash.replace('#','');
    if (['album','milestones','growth','diary','daily','weekly','parenting','health','settings'].includes(tab)) {
      await reloadData();
      navigate(tab);
    }
  });

  $('#bsettings').addEventListener('click', () => { location.hash = 'settings'; });
  $('#fab').addEventListener('click', handleFab);

  // Auto-start music on first app entry
  $('#mclose').addEventListener('click', closeModal);

  // Init pages
  initPhotoInput();
  setInterval(updateAge, 60000);

  // Auto-refresh on any data change (modal save, delete, etc.)
  Emitter.on('actionDone', async function(){ await reloadData(); renderPage(); });
}

async function reloadData() {
  try {
    const [photos, milestones, growth, diary, health, parenting, dailyLogs, milestoneGuesses] = await Promise.all([
      API.getPhotos(), API.getMilestones(), API.getGrowth(), API.getDiary(), API.getHealth().catch(()=>[]), API.getParenting().catch(()=>[]), API.getDailyLogs().catch(()=>[]), API.getGuesses().catch(()=>[])

  } catch (e) { console.error('Reload error:', e); }
}

function navigate(tab) {
  $$('.page').forEach(p=>p.hidden=true);
  const pg=$('#page-'+tab); if(pg)pg.hidden=false;
  $$('#tabs .tab').forEach(b=>{b.classList.toggle('active',b.dataset.tab===tab);});
  $('#fab').classList.toggle('hidden', tab==='settings'||tab==='daily'||tab==='weekly');
  if(fabMenuOpen)closeFabMenu();
  if(activeTab!==tab&&activeTab==='growth'){if(heightChart)heightChart.destroy();if(weightChart)weightChart.destroy();}
  activeTab=tab;
  renderPage();
  // Inject weekly banner on non-special pages
  if(tab!=='weekly'&&tab!=='settings'){
    if(pg){var banner=renderWeeklyBanner();pg.innerHTML=banner+pg.innerHTML;}
  }
  $('#content').scrollTop=0;
}

function renderPage() {
  switch(activeTab){
    case'album':renderAlbum();break;
    case'milestones':renderMilestones();break;
    case'growth':renderGrowth();break;
    case'diary':renderDiary();break;
    case'parenting':renderParenting();break;
    case'daily':renderDaily();break;
    case'weekly':renderWeekly();break;
    case'health':renderHealth();break;
    case'settings':renderSettings();break;
  }
}

// Confirm
function confirm(msg,cb) {
  const ov=document.createElement('div');ov.style.cssText='position:fixed;inset:0;background:rgba(78,52,46,.3);z-index:200;display:flex;align-items:center;justify-content:center';
  ov.innerHTML='<div style="background:#fff;border-radius:16px;padding:24px;max-width:300px;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.12)"><p style="margin-bottom:16px;font-size:1rem">'+U.esc(msg)+'</p><div style="display:flex;gap:8px;justify-content:center"><button class="btn btn-s" id="cno">取消</button><button class="btn btn-d" id="cyes">确认</button></div></div>';
  document.body.appendChild(ov);
  ov.querySelector('#cno').onclick=()=>ov.remove();
  ov.querySelector('#cyes').onclick=()=>{ov.remove();cb();};
  ov.addEventListener('click',(e)=>{if(e.target===ov)ov.remove();});
}

// Confetti celebration
function celebrate() {
  const c=document.createElement('div');c.className='confetti';document.body.appendChild(c);
  const colors=['#FFA07A','#FFB6C1','#FFD700','#FF91A4','#81C784','#FF8C69','#FFC4AE','#FFF5EE'];
  for(let i=0;i<50;i++){
    const el=document.createElement('div');el.style.cssText='position:absolute;top:-20px;left:'+Math.random()*100+'%;width:'+(6+Math.random()*10)+'px;height:'+(6+Math.random()*10)+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+';border-radius:2px;animation:cf'+(1.5+Math.random()*2)+'s '+Math.random()*.4+'s ease-in forwards';
    c.appendChild(el);
  }
  if(!document.getElementById('cf-style')){
    const s=document.createElement('style');s.id='cf-style';s.textContent='@keyframes cf{0%{transform:translateY(0)rotate(0deg)scale(1);opacity:1}100%{transform:translateY(100vh)rotate(720deg)scale(.3);opacity:0}}';
    document.head.appendChild(s);
  }
  setTimeout(()=>c.remove(),3000);
}

function initPhotoInput() {

    toast('正在压缩上传...','');
    try{
      const compressed=await U.resizeImg(file,600,.6);
      const thumb=await U.resizeImg(file,150,.5);
      const pid=U.genId('p');
      const[pp,tp]=await Promise.all([API.uploadFile(compressed,pid,false),API.uploadFile(thumb,pid,true)]);
      showPhotoForm(pid,pp,tp,false);
    }catch(err){console.error(err);toast('上传失败: '+err.message,'err');}
    e.target.value='';
  });

  // Video input (with auto-compression)
  $('#video-input').addEventListener('change', async function(e) {
    const file=e.target.files[0];if(!file)return;
    if(!file.type.startsWith('video/')){toast('请选择视频文件','err');e.target.value='';return;}
    if(file.size>500*1024*1024){toast('视频不能超过500MB','err');e.target.value='';return;}

    let uploadBlob=null;
    const MAX_TARGET=30*1024*1024; // Target ~30MB, compress if larger
    const pid=U.genId('p');

    try{
      if(file.size<=MAX_TARGET){
        toast('正在上传视频...','');
        uploadBlob=await fetch(URL.createObjectURL(file)).then(r=>r.blob());
      }else{
        const sizeMB=(file.size/1048576).toFixed(0);
        toast('视频较大('+sizeMB+'MB)，正在压缩...','');
        uploadBlob=await compressVideo(file, 720, 2500000, MAX_TARGET);
        const newMB=(uploadBlob.size/1048576).toFixed(1);
        toast('已压缩至 '+newMB+'MB，正在上传...','');
      }
      const thumbDataUrl=await captureVideoThumb(file);
      const thumbBlob=await fetch(thumbDataUrl).then(r=>r.blob());
      const ext=uploadBlob.type.includes('mp4')?'mp4':'webm';
      const formDataV=new FormData();formDataV.append('file',uploadBlob,pid+'.'+ext);
      const formDataT=new FormData();formDataT.append('file',thumbBlob,pid+'.jpg');
      const [vp,tp]=await Promise.all([
        uploadFileDirect('videos/'+pid+'.'+ext,formDataV),
        uploadFileDirect('thumbs/'+pid+'.jpg',formDataT)
      ]);
      showPhotoForm(pid,vp,tp,true);
    }catch(err){console.error(err);toast('上传失败: '+err.message,'err');}
    e.target.value='';
  });
}

// Video compression (Canvas + MediaRecorder)
async function compressVideo(file, maxHeight, bitrate, maxSize){
  const video=document.createElement('video');
  video.preload='metadata';video.muted=true;video.playsInline=true;
  return new Promise((ok,no)=>{
    video.onloadedmetadata=()=>{
      let w=video.videoWidth, h=video.videoHeight;
      const scale=Math.min(1, maxHeight/h);
      w=Math.round(w*scale);h=Math.round(h*scale);
      if(w%2)w--;if(h%2)h--;
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      const stream=canvas.captureStream(30);
      const chunks=[];
      let mime='video/webm;codecs=vp8';
      if(MediaRecorder.isTypeSupported('video/webm;codecs=vp9'))mime='video/webm;codecs=vp9';
      const recorder=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:bitrate});
      recorder.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
      recorder.onstop=()=>{
        const blob=new Blob(chunks,{type:mime});
        if(blob.size>maxSize){
          const ratio=maxSize/blob.size*0.8;
          const retry=document.createElement('video');
          retry.preload='metadata';retry.muted=true;retry.playsInline=true;
          retry.src=URL.createObjectURL(blob);
          retry.onloadedmetadata=()=>{
            const chunks2=[];
            const stream2=canvas.captureStream(30);
            const rec2=new MediaRecorder(stream2,{mimeType:mime,videoBitsPerSecond:Math.round(bitrate*ratio)});
            rec2.ondataavailable=e=>{if(e.data.size>0)chunks2.push(e.data);};
            rec2.onstop=()=>{const b2=new Blob(chunks2,{type:mime});ok(b2);URL.revokeObjectURL(retry.src);};
            rec2.start(1000);retry.currentTime=0;retry.play();
            (function draw2(){if(rec2.state==='recording'){ctx.drawImage(retry,0,0,w,h);requestAnimationFrame(draw2)}else{rec2.stop()}})();
          };
          retry.onerror=()=>ok(blob);
          return;
        }
        ok(blob);URL.revokeObjectURL(video.src);
      };
      recorder.onerror=()=>no(new Error('压缩失败'));
      recorder.start(1000);
      video.currentTime=0;video.play();
      (function drawFrame(){if(recorder.state==='recording'){ctx.drawImage(video,0,0,w,h);requestAnimationFrame(drawFrame)}else{recorder.stop()}})();
    };
    video.onerror=()=>no(new Error('无法读取视频'));
    video.src=URL.createObjectURL(file);
  });
}

// Direct upload helper
async function uploadFileDirect(path,formData){
  const res=await fetch(CFG.SUPABASE_URL+'/storage/v1/object/'+CFG.BUCKET+'/'+path,{
    method:'POST',
    headers:{'apikey':CFG.SUPABASE_KEY,'Authorization':'Bearer '+CFG.SUPABASE_KEY,'x-upsert':'true'},
    body:formData
  });
  if(!res.ok){const t=await res.text();throw new Error('上传失败('+res.status+'): '+t.slice(0,80));}
  return path;
}

// Capture video thumbnail at 1 second
function captureVideoThumb(file){
  return new Promise((ok,no)=>{
    const video=document.createElement('video');
    video.preload='metadata';video.muted=true;video.playsInline=true;
    video.onloadeddata=()=>{
      video.currentTime=Math.min(1,video.duration/3);
    };
    video.onseeked=()=>{
      const canvas=document.createElement('canvas');
      canvas.width=300;canvas.height=Math.round(300*(video.videoHeight/video.videoWidth));
      canvas.getContext('2d').drawImage(video,0,0,canvas.width,canvas.height);
      ok(canvas.toDataURL('image/jpeg',.7));
      URL.revokeObjectURL(video.src);
    };
    video.onerror=()=>{no(new Error('无法读取视频'));};
    video.src=URL.createObjectURL(file);
  });
}

function showLightbox(photos,p){
  let idx=photos.findIndex(x=>x.id===p.id);if(idx<0)idx=0;
  const ov=document.createElement('div');ov.className='lb';
  function ri(){
    const cur=photos[idx];
    const mediaHtml=cur.isVideo
      ? '<video class="lb-video" src="'+cur.dataUrl+'" controls playsinline autoplay style="max-width:100%;max-height:70vh;border-radius:6px;outline:none"></video>'
      : '<img src="'+cur.dataUrl+'" alt="'+U.esc(cur.title||'')+'">';
    ov.innerHTML='<button class="lb-close">✕</button>'+(idx>0?'<button class="lb-nav lb-prev">◀</button>':'')+(idx<photos.length-1?'<button class="lb-nav lb-next">▶</button>':'')+'<div class="lb-img">'+mediaHtml+'</div><div class="lb-cap"><div class="ltitle">'+(cur.isVideo?'🎬 ':'')+U.esc(cur.title||'无标题')+'</div>'+(cur.description?'<div class="lb-desc">'+U.esc(cur.description)+'</div>':'')+'<div class="ldate">'+U.fmtDate(cur.date)+(cur.time?' '+cur.time:'')+' · '+(idx+1)+'/'+photos.length+'</div></div><div class="lb-acts"><button id="lb-edit" title="编辑">✏️</button><button id="lb-fav" title="'+(cur.favorite?'取消收藏':'收藏')+'">'+(cur.favorite?'⭐':'☆')+'</button><button id="lb-del" title="删除">🗑️</button></div>';
    ov.querySelector('.lb-close').onclick=close;
    ov.querySelector('.lb-close').onclick=close;
    const pv=ov.querySelector('.lb-prev');if(pv)pv.onclick=()=>{idx--;ri();};
    const nx=ov.querySelector('.lb-next');if(nx)nx.onclick=()=>{idx++;ri();};
    ov.querySelector('#lb-edit').onclick=()=>{showEditMediaForm(cur,ri);};
    ov.querySelector('#lb-fav').onclick=async()=>{cur.favorite=!cur.favorite;await API.updatePhoto(cur.id,{favorite:cur.favorite});const photo=appData.photos.find(x=>x.id===cur.id);if(photo)photo.favorite=cur.favorite;ri();};
    ov.querySelector('#lb-del').onclick=()=>{confirm('确定删除这张照片吗？',async()=>{await API.deletePhoto(cur.id);toast('已删除','ok');close();Emitter.emit('actionDone');});};
  }
  function close(){ov.remove();document.removeEventListener('keydown',onKey);}
  function onKey(e){if(e.key==='Escape')close();if(e.key==='ArrowLeft'&&idx>0){idx--;ri();}if(e.key==='ArrowRight'&&idx<photos.length-1){idx++;ri();}}
  document.addEventListener('keydown',onKey);
  let tx=0;ov.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;});ov.addEventListener('touchend',e=>{const d=tx-e.changedTouches[0].clientX;if(Math.abs(d)>60){if(d>0&&idx<photos.length-1)idx++;else if(d<0&&idx>0)idx--;ri();}});
  ri();document.body.appendChild(ov);
}

function renderGuessResults(ms){
  var guesses=appData.milestoneGuesses||[];
  var msGuesses=[];
  for(var i=0;i<guesses.length;i++){
    if(guesses[i].milestone_key===ms.type)msGuesses.push(guesses[i]);
  }
  if(msGuesses.length===0){
    return '<div class="mg-no-guesses">还没有家人竞猜这个里程碑</div>';
  }
  // Sort by date difference
  var msDate=new Date(ms.date+'T00:00:00');
  msGuesses.sort(function(a,b){
    var da=Math.abs(new Date(a.guessed_date+'T00:00:00')-msDate);
    var db=Math.abs(new Date(b.guessed_date+'T00:00:00')-msDate);
    return da-db;
  });
  var h='';
  for(var i=0;i<msGuesses.length;i++){
    var g=msGuesses[i];
    var gd=new Date(g.guessed_date+'T00:00:00');
    var diffDays=Math.round((gd-msDate)/86400000);
    var diffText='';
    if(diffDays===0)diffText='<span class="mg-leader-diff exact">🎯 完全猜对！</span>';
    else if(diffDays>0)diffText='<span class="mg-leader-diff">早了 '+diffDays+' 天</span>';
    else diffText='<span class="mg-leader-diff">晚了 '+Math.abs(diffDays)+' 天</span>';
    var rank='';
    if(i===0)rank='🥇';
    else if(i===1)rank='🥈';
    else if(i===2)rank='🥉';
    else rank=(i+1);
    var isWin=i===0?' winner':'';
    h+='<div class="mg-leader-item'+isWin+'"><span class="mg-leader-rank">'+rank+'</span><span class="mg-leader-name">'+U.esc(g.guesser_name)+'</span>'+diffText+'</div>';
  }
  return '<div class="mg-result-card"><div class="mg-result-header"><span class="mg-result-emoji">'+ms.emoji+'</span><span class="mg-result-title">'+U.esc(ms.title)+'</span><span class="mg-result-date">达成 '+U.fmtShort(ms.date)+'</span></div>'+h+'</div>';
}

function renderGuesses(){
  var allTypes=getAllMsTypes();
  var milestones=appData.milestones||[];
  var guesses=appData.milestoneGuesses||[];
  var achievedKeys=new Set();
  for(var i=0;i<milestones.length;i++){
    if(milestones[i].type!=='custom')achievedKeys.add(milestones[i].type);
  }

  // Build guess count map for upcoming
  var guessCount={};
  for(var i=0;i<guesses.length;i++){
    var k=guesses[i].milestone_key;
    guessCount[k]=(guessCount[k]||0)+1;
  }

  var html='';
  // Filter by current category
  var upcoming=[],achieved=[];

  for(var i=0;i<allTypes.length;i++){
    var t=allTypes[i];
    if(msCat!=='all'&&t.category!==msCat)continue;
    if(achievedKeys.has(t.key)){
      // Find the actual milestone record
      var ms=null;
      for(var j=0;j<milestones.length;j++){if(milestones[j].type===t.key){ms=milestones[j];break;}}
      if(ms)achieved.push(ms);
    } else {
      upcoming.push(t);
    }
  }

  // Show achieved with guess results
  if(achieved.length>0){
    html+='<div class="mg-section"><div class="mg-section-title">🏆 竞猜揭晓</div>';
    for(var i=0;i<achieved.length;i++){
      html+=renderGuessResults(achieved[i]);
    }
    html+='</div>';
  }

  // Show upcoming with guess buttons
  if(upcoming.length>0){
    html+='<div class="mg-section"><div class="mg-section-title">🔮 猜一猜</div>';
    for(var i=0;i<upcoming.length;i++){
      var t=upcoming[i];
      var cnt=guessCount[t.key]||0;
      var ageHint='';
      if(t.typicalAgeDays<60)ageHint='约 '+t.typicalAgeDays+' 天';

    }
    if(upcoming.length===0||Object.keys(guessCount).length===0){
      html+='<div class="mg-share-hint">💬 把链接分享给家人，一起来猜宝宝的下一个里程碑吧~</div>';
    }
    html+='</div>';
  }

  if(upcoming.length===0&&achieved.length===0){
    html+='<div class="mg-share-hint">💬 还没有里程碑数据，先记录一些再邀请家人来猜吧~</div>';
  }

  return html;
}

// ---- SVG Chart Renderer (zero dependencies) ----
function drawSVGChart(records,metric,color){
  var data=[];records.forEach(function(r){
    var v=metric==='height'?r.height:r.weight;
    if(v!=null)data.push({x:r.ageInDays,y:v});
  });
  if(data.length<1)return'<p style="text-align:center;color:#BCAAA4">暂无数据</p>';

  var maxAge=Math.max(730,data[data.length-1].x+30);
  var yMax=Math.max(metric==='height'?80:15,data.reduce(function(m,d){return Math.max(m,d.y);},0)+5);
  var yMin=metric==='height'?40:1;
  var W=600,H=280,pl=50,pr=20,pt=20,pb=40,pw=W-pl-pr,ph=H-pt-pb;

  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;font-family:sans-serif" xmlns="http://www.w3.org/2000/svg">';
  svg+='<rect width="'+W+'" height="'+H+'" fill="#FFFBF5" rx="8"/>';
  
  // WHO reference bands
  var pts=getWHOPoints(metric);
  if(pts){
    // P3-P97 fill
    var fillPath='M'+toSVGX(pts.p3[0][0],0,maxAge,pl,pw)+' '+toSVGY(pts.p3[0][1],yMin,yMax,pt,ph);
    for(var i=1;i<pts.p3.length;i++)fillPath+=' L'+toSVGX(pts.p3[i][0],0,maxAge,pl,pw)+' '+toSVGY(pts.p3[i][1],yMin,yMax,pt,ph);
    for(var i=pts.p97.length-1;i>=0;i--)fillPath+=' L'+toSVGX(pts.p97[i][0],0,maxAge,pl,pw)+' '+toSVGY(pts.p97[i][1],yMin,yMax,pt,ph);
    svg+='<path d="'+fillPath+' Z" fill="rgba(215,204,200,0.12)"/>';
    // Ref lines
    svg+=drawSVGLine(pts.p97,'rgba(215,204,200,0.5)',1.5,'4,4',0,maxAge,yMin,yMax,pl,pt,pw,ph);
    svg+=drawSVGLine(pts.p50,'#D7CCC8',1.5,'6,3',0,maxAge,yMin,yMax,pl,pt,pw,ph);
    svg+=drawSVGLine(pts.p3,'rgba(215,204,200,0.5)',1.5,'4,4',0,maxAge,yMin,yMax,pl,pt,pw,ph);
  }
  
  // Data line
  var dPath='M'+toSVGX(data[0].x,0,maxAge,pl,pw)+' '+toSVGY(data[0].y,yMin,yMax,pt,ph);
  for(var i=1;i<data.length;i++)dPath+=' L'+toSVGX(data[i].x,0,maxAge,pl,pw)+' '+toSVGY(data[i].y,yMin,yMax,pt,ph);
  svg+='<path d="'+dPath+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
  
  // Data dots
  data.forEach(function(d){
    svg+='<circle cx="'+toSVGX(d.x,0,maxAge,pl,pw)+'" cy="'+toSVGY(d.y,yMin,yMax,pt,ph)+'" r="4.5" fill="#fff" stroke="'+color+'" stroke-width="2"/>';
  });
  
  // Grid + axes
  for(var i=0;i<=5;i++){
    var gy=pt+(ph*i/5);
    svg+='<line x1="'+pl+'" y1="'+gy+'" x2="'+(pl+pw)+'" y2="'+gy+'" stroke="#EDE7E0" stroke-width="0.5"/>';
    var val=(yMin+(yMax-yMin)*i/5).toFixed(1);
    svg+='<text x="'+(pl-4)+'" y="'+(gy+4)+'" text-anchor="end" font-size="10" fill="#BCAAA4">'+val+'</text>';
  }
  // X ticks
  var step=Math.ceil(maxAge/10/30)*30;
  for(var dx=0;dx<=maxAge;dx+=step){
    var gx=toSVGX(dx,0,maxAge,pl,pw);
    svg+='<line x1="'+gx+'" y1="'+(pt+ph)+'" x2="'+gx+'" y2="'+(pt+ph+4)+'" stroke="#BCAAA4" stroke-width="0.5"/>';
    svg+='<text x="'+gx+'" y="'+(pt+ph+16)+'" text-anchor="middle" font-size="9" fill="#BCAAA4">'+dx+'天</text>';
  }
  
  svg+='<line x1="'+pl+'" y1="'+pt+'" x2="'+pl+'" y2="'+(pt+ph)+'" stroke="#BCAAA4" stroke-width="1"/>';
  svg+='<line x1="'+pl+'" y1="'+(pt+ph)+'" x2="'+(pl+pw)+'" y2="'+(pt+ph)+'" stroke="#BCAAA4" stroke-width="1"/>';
  
  // Legend
  svg+='<rect x="'+(pl+6)+'" y="'+(pt+2)+'" width="10" height="10" rx="2" fill="'+color+'"/>';
  svg+='<text x="'+(pl+20)+'" y="'+(pt+10)+'" font-size="10" fill="#8D6E63">小桃酥</text>';
  svg+='<line x1="'+(pl+70)+'" y1="'+(pt+7)+'" x2="'+(pl+100)+'" y2="'+(pt+7)+'" stroke="#D7CCC8" stroke-width="1.5" stroke-dasharray="4,3"/>';
  svg+='<text x="'+(pl+104)+'" y="'+(pt+10)+'" font-size="10" fill="#BCAAA4">同龄均值</text>';
  
  svg+='</svg>';
  return'<div style="text-align:center">'+svg+'</div>';
}
function toSVGX(x,xMin,xMax,pl,pw){return(pl+(x-xMin)/(xMax-xMin)*pw).toFixed(1);}
function toSVGY(y,yMin,yMax,pt,ph){return(pt+ph-(y-yMin)/(yMax-yMin)*ph).toFixed(1);}
function drawSVGLine(pts,color,width,dashArr,xMin,xMax,yMin,yMax,pl,pt,pw,ph){
  if(!pts||pts.length<2)return'';
  var p='M'+toSVGX(pts[0][0],xMin,xMax,pl,pw)+' '+toSVGY(pts[0][1],yMin,yMax,pt,ph);
  for(var i=1;i<pts.length;i++)p+=' L'+toSVGX(pts[i][0],xMin,xMax,pl,pw)+' '+toSVGY(pts[i][1],yMin,yMax,pt,ph);
  return'<path d="'+p+'" fill="none" stroke="'+color+'" stroke-width="'+width+'" stroke-dasharray="'+dashArr+'"/>';
}

function getWHOPoints(metric){
  var p3=[],p50=[],p97=[];
  WHO_GIRLS.forEach(function(row){
    var days=Math.round(row[0]*30.4375);
    if(metric==='height'){p3.push([days,row[1]]);p50.push([days,row[3]]);p97.push([days,row[5]]);}
    else{p3.push([days,row[6]]);p50.push([days,row[8]]);p97.push([days,row[10]]);}
  });
  return{p3:p3,p50:p50,p97:p97};
}

function getPercentile(records,metric,value){
  if(value==null)return null;
  var prev=[],next=[],p50AtVal=0;
  var age=records[records.length-1]?records[records.length-1].ageInDays:0;
  var mon=Math.round(age/30.4375);
  if(mon>=24)mon=23;
  
  var row=WHO_GIRLS[mon];
  if(!row)return null;
  
  var p3,p50,p97;
  if(metric==='height'){p3=row[1];p50=row[3];p97=row[5];}
  else if(metric==='weight'){p3=row[6];p50=row[8];p97=row[10];}
  else return null;
  
  if(value<p3)return'偏小';
  if(value<=p3+(p50-p3)*0.4)return'偏小';
  if(value<=p3+(p50-p3)*0.8)return'中等偏小';
  if(value<=p50+(p97-p50)*0.3)return'标准';
  if(value<=p50+(p97-p50)*0.7)return'中等偏大';
  if(value<=p97)return'偏大';
  return'偏大';
}

function getPctColor(pct){
  if(!pct)return'#BCAAA4';
  if(pct.indexOf('标准')>=0||pct.indexOf('中等')>=0)return'#81C784';
  if(pct.indexOf('低于')>=0||pct.indexOf('高于')>=0)return'#EF9A9A';
  return'#FFD54F';
}

function deltaS(latest,prev,metric){
  if(!latest||!prev)return'';
  var cur=m=metric==='height'?latest.height:latest.weight;
  var pr=m=metric==='height'?prev.height:prev.weight;
  if(cur==null||pr==null)return'';
  var d=cur-pr,u=metric==='height'?'cm':'kg';
  return(d>=0?'+':'')+d.toFixed(1)+u+' 较上次';
}

function growAssessmentCard(htPct,wtPct,count){
  if(count<1)return'';
  var lines=[];
  var htOK=htPct&&(htPct.indexOf('中等')>=0||htPct.indexOf('标准')>=0);
  var wtOK=wtPct&&(wtPct.indexOf('中等')>=0||wtPct.indexOf('标准')>=0);
  if(htOK&&wtOK)lines.push('✅ 身高体重均在正常范围，生长状态良好');
  else if(!htOK&&wtOK)lines.push('⚠️ 身高需关注，体重正常');
  else if(htOK&&!wtOK)lines.push('⚠️ 体重需关注，身高正常');
  else lines.push('⚠️ 生长指标均需关注，建议咨询儿科医生');
  lines.push('📋 已记录'+count+'条测量，继续定期监测');
  
  var html='<div style="background:linear-gradient(135deg,#FFFBF5,#F8FFF5);border-radius:14px;padding:14px;margin-bottom:20px;border:1px solid rgba(129,199,132,.15)">';
  html+='<div style="font-weight:600;color:#66BB6A;margin-bottom:6px;font-size:.95rem">📊 智能评估</div>';
  lines.forEach(function(l){html+='<div style="font-size:.85rem;color:#4E342E;line-height:1.6">'+l+'</div>';});
  html+='<div style="font-size:.65rem;color:#BCAAA4;margin-top:6px">依据：WHO标准(2006)+中国卫健委WS/T 423-2022</div></div>';
  return html;
}

function renderDiary(){
  const entries=[...appData.diaryEntries].sort((a,b)=>b.date.localeCompare(a.date));
  if(diaryDetail){const e=entries.find(x=>x.id===diaryDetail);if(e){renderDiaryDetail(e);return;}diaryDetail=null;}

  if(entries.length===0){
    $('#page-diary').innerHTML='<div style="padding:24px 0">'+'<div class="dc-add-hero" onclick="startDiaryTemplate(\'爸爸妈妈想对你说\')"><div class="dc-add-icon">💌</div><div class="dc-add-title">写给小桃酥</div><div class="dc-add-sub">记录每一个温暖的瞬间</div><div class="dc-add-btn">开始写日记</div></div>'+'<div style="display:flex;gap:10px;justify-content:center;margin-top:16px">'+['📝今日第一次','✨今日趣事'].map(function(t){var key=t.slice(0,1)===String.fromCharCode(0xD83D,0xDCDD)?'今日第一次':'今日趣事';return'<div class="dc-tpl-btn" style="flex:1;max-width:140px" onclick="startDiaryTemplate(\''+t.slice(2)+'\')"><span class="tpl-icon">'+t.slice(0,2)+'</span>'+t.slice(2)+'</div>';}).join('')+'</div>'+'</div>';return;
  }

  const birth=appData.settings.birthDate, today=U.today();
  let html='';

  // AI Insights placeholder
  html+='<div id="dy-insight"></div>';
  // Templates
  html+='<div class="dc-add-hero" onclick="startDiaryTemplate(\'爸爸妈妈想对你说\')"><div class="dc-add-icon">💌</div><div class="dc-add-title">写给小桃酥</div><div class="dc-add-sub">记录每一个温暖的瞬间</div><div class="dc-add-btn">开始写日记</div></div>'+'<div style="display:flex;gap:10px;justify-content:center;margin:12px 0 16px">'+'<div class="dc-tpl-btn" style="flex:1;max-width:140px" onclick="startDiaryTemplate(\'今日第一次\')"><span class="tpl-icon">📝</span>今日第一次</div>'+'<div class="dc-tpl-btn" style="flex:1;max-width:140px" onclick="startDiaryTemplate(\'今日趣事\')"><span class="tpl-icon">✨</span>今日趣事</div>'+'</div>';

  // That-year-today
  var thisDayEntries=entries.filter(function(e){return e.date.substring(5)===today.substring(5)&&e.date!==today;});
  if(thisDayEntries.length>0){
    var pastE=thisDayEntries[0], pastDate=new Date(pastE.date+'T00:00:00'), todayDate=new Date(today+'T00:00:00');
    var yearsAgo=Math.floor((todayDate-pastDate)/(365.25*86400000));
    html+='<div class="dc-otd"><span>📅</span> <span>那年今日（'+yearsAgo+'年前）：</span>'+U.esc(pastE.title||'无标题')+'</div>';
  }

  // Time axis
  html+='<div class="diary-tl">';
  entries.forEach(function(e){
    var mood=MOODS.find(function(x){return x.key===e.mood;})||MOODS[0];
    var photos=(e.photoIds||[]).map(function(pid){return appData.photos.find(function(p){return p.id===pid;});}).filter(Boolean);
    html+='<div class="dc dc-mood-'+e.mood+'" data-id="'+e.id+'">';
    html+='<div class="dc-h"><span class="dc-mood">'+mood.emoji+'</span><span class="dc-date">'+U.fmtDate(e.date)+'</span>'+(e.weather?'<span class="dc-weather">'+e.weather+'</span>':'')+'</div>';
    html+='<div class="dc-title">'+U.esc(e.title||'无标题')+'</div>';
    html+='<div class="dc-preview">'+U.esc(e.content||'')+'</div>';
    if(photos.length>0){
      html+='<div class="dc-photos">'+photos.slice(0,4).map(function(p){return'<img src="'+(p.thumbnailDataUrl||p.dataUrl)+'" alt="" loading="lazy">';}).join('')+(photos.length>4?'<span style="font-size:.75rem;color:#BCAAA4;align-self:center">+'+ (photos.length-4)+'</span>':'')+'</div>';
    }
    html+='<div class="dc-footer">'+(e.tags||[]).slice(0,3).map(function(t){return'<span class="dc-tag">#'+U.esc(t)+'</span>';}).join('')+'</div>';
    html+='</div>';
  });
  html+='</div>';
  $('#page-diary').innerHTML=html;

  // AI insights
  if(getDSKey()){setTimeout(function(){showDiaryInsights();},300);}
  $$('#page-diary .dc').forEach(function(card){card.addEventListener('click',function(){diaryDetail=card.dataset.id;renderDiary();});});
}

function startDiaryTemplate(tpl){
  var birth=appData.settings.birthDate, age=U.age(birth,U.today());
  var title='',content='';
  switch(tpl){
    case'今日第一次':title=age.text+'的第一次';content='今天小桃酥第一次...\n\n我们好惊喜，赶紧记录下来。';break;
    case'今日趣事':title='小桃酥的趣事';content='今天发生了一件好玩的事...\n\n小桃酥的反应太可爱了！';break;
    case'爸爸妈妈想对你说':title='写给小桃酥';content='亲爱的宝贝，\n\n今天爸爸妈妈想对你说...';break;
  }
  showDiaryForm(null,tpl,title,content);
}

function renderDiaryDetail(e){
  var mood=MOODS.find(function(x){return x.key===e.mood;})||MOODS[0];
  var photos=(e.photoIds||[]).map(function(pid){return appData.photos.find(function(p){return p.id===pid;});}).filter(Boolean);
  var charCount=(e.content||'').length, readTime=Math.max(1,Math.ceil(charCount/400));
  var html='<button class="btn btn-s btn-sm" id="dback" style="margin-bottom:16px">← 返回</button>';
  html+='<div class="detail-h dc-mood-'+e.mood+'" style="padding:20px;border-radius:14px">';
  html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">';
  html+='<span class="dc-date">'+U.fmtDate(e.date)+'</span>';
  if(e.weather)html+='<span class="dc-weather">'+e.weather+'</span>';
  html+='<span style="font-size:.7rem;color:#BCAAA4;margin-left:auto">'+charCount+'字 · 约'+readTime+'分钟</span>';
  html+='</div>';
  html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:2rem">'+mood.emoji+'</span><span style="font-size:.9rem;color:#8D6E63">'+mood.label+'</span></div>';
  html+='<h2 style="font-size:1.3rem;font-weight:700;margin:0">'+U.esc(e.title||'无标题')+'</h2>';
  html+='</div>';
  if(photos.length>0){
    html+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin:16px 0">';
    photos.forEach(function(p){html+='<img src="'+(p.dataUrl||p.thumbnailDataUrl)+'" alt="" style="width:100%;border-radius:10px;aspect-ratio:1;object-fit:cover;cursor:pointer" loading="lazy" onclick="window.open(\''+p.dataUrl+'\',\'_blank\')">';});
    html+='</div>';
  }
  html+='<div class="detail-content" style="padding:4px 0">'+(e.content||'').split('\n').map(function(l){return'<p style="margin-bottom:8px;line-height:1.8">'+U.esc(l)+'</p>';}).join('')+'</div>';
  if(e.tags&&e.tags.length){html+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">'+e.tags.map(function(t){return'<span class="chip">#'+U.esc(t)+'</span>';}).join('')+'</div>';}
  html+='<div style="display:flex;gap:8px"><button class="btn btn-p btn-sm" id="dedit">✏️ 编辑</button><button class="btn btn-d btn-sm" id="ddel">🗑️ 删除</button></div>';
  $('#page-diary').innerHTML=html;

  $('#dback').addEventListener('click',function(){diaryDetail=null;renderDiary();});
  $('#dedit').addEventListener('click',function(){diaryDetail=null;showDiaryForm(e);});
  $('#ddel').addEventListener('click',function(){confirm('确定删除？',async function(){await API.deleteDiary(e.id);toast('已删除','ok');diaryDetail=null;Emitter.emit('actionDone');});});
}

function showDiaryForm(existing,tplName,tplTitle,tplContent){
  var isEdit=!!existing,today=U.today();
  var selMood=existing?existing.mood:(tplName==='爸爸妈妈想对你说'?'grateful':'joyful');
  var selWeather=existing?existing.weather||'':'';
  var moodsHtml=MOODS.map(function(md){return'<button class="mood-o'+(selMood===md.key?' sel':'')+'" data-mood="'+md.key+'" title="'+md.label+'">'+md.emoji+'</button>';}).join('');
  var weathers=['☀️','⛅','☁️','🌧️','⛈️','❄️','🌈','🌙'];
  var wHtml=weathers.map(function(w){return'<button class="mood-o'+(selWeather===w?' sel':'')+'" data-w="'+w+'" style="font-size:1.2rem">'+w+'</button>';}).join('');

  var html='<div class="fg"><label class="fl">日期</label><input type="date" class="fi" id="dy-date" value="'+(existing?existing.date:today)+'"></div>'+
    '<div class="fg"><label class="fl">标题</label><input type="text" class="fi" id="dy-title" value="'+U.esc(tplTitle||(existing?existing.title||'':''))+'" placeholder="给这篇日记起个标题"></div>'+
    '<div class="fg"><label class="fl">心情</label><div class="moods" id="dy-moods">'+moodsHtml+'</div></div>'+
    '<div class="fg"><label class="fl">天气</label><div class="moods" id="dy-weathers">'+wHtml+'</div></div>'+
    '<div class="fg"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><label class="fl" style="margin:0">内容</label><div style="display:flex;gap:6px"><button type="button" class="btn btn-s btn-sm" id="dy-voice" title="语音输入">🎙️</button><button type="button" class="btn btn-s btn-sm" id="dy-polish" title="AI润色">✨</button></div></div><textarea class="ft" id="dy-content" rows="7" placeholder="今天发生了什么...">'+U.esc(tplContent||(existing?existing.content||'':''))+'</textarea><div style="font-size:.7rem;color:#BCAAA4;margin-top:2px" id="dy-hint"></div></div>'+
    '<div class="fg"><label class="fl">标签（逗号分隔）</label><input type="text" class="fi" id="dy-tags" value="'+(existing?(existing.tags||[]).join(', '):'')+'" placeholder="例如: 出生, 医院">';

  var modalTitle=isEdit?'编辑日记':'写日记';
  if(tplName)modalTitle+=' · '+tplName;

  showModal(modalTitle,html,async function(){
    var date=$('#dy-date').value,title=$('#dy-title').value.trim(),content=$('#dy-content').value.trim(),tagsStr=$('#dy-tags').value.trim();
    if(!date){toast('请选择日期','err');return false;}
    if(!title){toast('请输入标题','err');return false;}
    var tags=tagsStr?tagsStr.split(/[,，]/).map(function(t){return t.trim();}).filter(Boolean):[];
    var data={date:date,title:title,content:content,mood:selMood,weather:selWeather,tags:tags,photoIds:existing?existing.photoIds:[]};
    try{
      if(isEdit){await API.updateDiary(existing.id,data);toast('已更新','ok');}
      else{data.id=U.genId('d');await API.addDiary(data);toast('日记已保存','ok');celebrate();}
      return true;
    }catch(e){toast('保存失败: '+e.message,'err');return false;}
  },function(){
    $$('#dy-moods .mood-o').forEach(function(b){b.addEventListener('click',function(){$$('#dy-moods .mood-o').forEach(function(x){x.classList.remove('sel');});b.classList.add('sel');selMood=b.dataset.mood;});});
    $$('#dy-weathers .mood-o').forEach(function(b){b.addEventListener('click',function(){$$('#dy-weathers .mood-o').forEach(function(x){x.classList.remove('sel');});b.classList.add('sel');selWeather=b.dataset.w;});});
    // Voice input
    initDiaryVoice();
    // AI polish
    $('#dy-polish').addEventListener('click',polishDiaryContent);
  });
}

//  DAILY LOG PAGE — 喂养·睡眠·换尿布
