<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>小桃酥的成长记录</title>
<style>
/* ===== RESET ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans SC",system-ui,-apple-system,sans-serif;background:#FFFBF5;color:#4E342E;line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}
button{cursor:pointer;font-family:inherit;border:none;background:none}
input,textarea,select{font-family:inherit;font-size:inherit}
input:focus,textarea:focus,select:focus{outline:none}

/* ===== DESIGN TOKENS ===== */
:root{
--peach:#FFA07A;--peach2:#FF8C69;--peach-light:#FFF0EB;--peach-bg:#FFEDE6;
--pink-light:#FFF0F3;--pink:#FFB6C1;
--cre-bg:#FFFBF5;--cre-card:#FFFFFF;--cre-hover:#FFF5EE;
--txt:#4E342E;--txt2:#8D6E63;--txt3:#BCAAA4;
--shadow:0 4px 12px rgba(0,0,0,0.06);
--radius:12px;--radius-lg:16px;--radius-full:9999px;
}

/* ===== LOCK SCREEN ===== */
#lock{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:linear-gradient(170deg,#FFF0EB,#FFE0D5,#FFD1C4,#FFF0F3);transition:opacity .4s}
#lock canvas{position:absolute;inset:0;pointer-events:none}
#lock.exit{opacity:0;pointer-events:none}
.lock-inner{position:relative;z-index:1;text-align:center;padding:32px 24px;max-width:360px;width:100%}
.lock-icon{font-size:4.5rem;display:block;margin-bottom:8px;animation:lkb 2.5s ease-in-out infinite}
@keyframes lkb{0%,100%{transform:translateY(0)scale(1)}20%{transform:translateY(-14px)scale(1.1)}40%{transform:translateY(0)}55%{transform:translateY(-5px)scale(1.03)}70%{transform:translateY(0)}}
.lock-title{font-size:2rem;font-weight:700;letter-spacing:3px;margin-bottom:2px}
.lock-sub{font-size:.95rem;color:#8D6E63;margin-bottom:32px}
.lock-wrap{display:flex;gap:8px}
.lock-input{flex:1;padding:14px 18px;border:2px solid rgba(255,160,122,.25);border-radius:16px;font-size:1.1rem;background:rgba(255,255,255,.7);color:#4E342E;letter-spacing:4px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.lock-input:focus{border-color:#FFA07A}
.lock-input::placeholder{color:#D7CCC8;letter-spacing:1px;font-size:.95rem}
.lock-btn{padding:14px 24px;border-radius:16px;background:linear-gradient(135deg,#FFA07A,#FF8C69);color:#fff;font-size:1rem;font-weight:600;letter-spacing:2px;box-shadow:0 4px 16px rgba(255,140,105,.3);white-space:nowrap;transition:transform .15s,opacity .15s}
.lock-btn:active{transform:scale(.95)}
.lock-btn:disabled{opacity:.6}
.lock-err{margin-top:12px;font-size:.85rem;color:#EF9A9A;min-height:20px}

/* ===== WELCOME PAGE ===== */
#welcome{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:linear-gradient(170deg,#FFF5F1,#FFEDE6,#FFE0D5,#FFF0F3);transition:opacity .5s,transform .5s;overflow:hidden}
#welcome canvas{position:absolute;inset:0;pointer-events:none;z-index:0}
#welcome.exit{opacity:0;transform:scale(1.05);pointer-events:none}
.wc{position:relative;z-index:1;text-align:center;padding:40px 24px;max-width:380px;width:100%}
.w-icon{font-size:5rem;display:block;margin-bottom:12px;animation:lkb 2s ease-in-out infinite;filter:drop-shadow(0 8px 16px rgba(255,160,122,.3))}
.w-title{font-size:2rem;font-weight:700;letter-spacing:2px;margin-bottom:4px}
.w-sub{font-size:1rem;color:#8D6E63;margin-bottom:36px}
.w-stats{display:flex;align-items:center;background:rgba(255,255,255,.55);backdrop-filter:blur(12px);border-radius:20px;padding:16px 24px;margin-bottom:36px;box-shadow:0 4px 20px rgba(255,160,122,.1);border:1px solid rgba(255,180,150,.2)}
.w-stat{flex:1;text-align:center}
.w-stat-num{display:block;font-size:1.5rem;font-weight:700;color:#FF8C69}
.w-stat-lbl{font-size:.7rem;color:#BCAAA4;letter-spacing:1px}
.w-div{width:1px;height:32px;background:rgba(0,0,0,.06)}

/* Countdown card */
.w-countdown{background:rgba(255,255,255,.55);backdrop-filter:blur(12px);border-radius:20px;padding:14px 24px;margin-bottom:36px;text-align:center;box-shadow:0 4px 20px rgba(255,160,122,.1);border:1px solid rgba(255,180,150,.2)}
.w-cd-label{font-size:.75rem;color:#BCAAA4;letter-spacing:1px;margin-bottom:4px}
.w-cd-row{display:flex;align-items:baseline;justify-content:center;gap:4px}
.w-cd-num{font-size:2rem;font-weight:700;color:#FF8C69;font-variant-numeric:proportional-nums;animation:cdPulse 2s ease-in-out infinite}
@keyframes cdPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.w-cd-unit{font-size:.95rem;color:#8D6E63}

.w-enter{display:inline-flex;align-items:center;gap:10px;padding:16px 48px;border-radius:50px;background:linear-gradient(135deg,#FFA07A,#FF8C69);color:#fff;font-size:1.15rem;font-weight:600;letter-spacing:2px;box-shadow:0 8px 28px rgba(255,140,105,.35);transition:transform .2s}
.w-enter:active{transform:scale(.94)}
.w-footer{margin-top:32px;font-size:.8rem;color:#BCAAA4;letter-spacing:1px}

/* ===== MAIN APP ===== */
#main{padding-bottom:56px;padding-bottom:calc(56px + env(safe-area-inset-bottom,0))}
#main[hidden]{display:none}
#main{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;max-width:768px;margin:0 auto}
#bar{position:sticky;top:0;z-index:50;background:rgba(255,251,245,.85);backdrop-filter:blur(12px);border-bottom:1px solid #F0E8E0;padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between}
.bar-left{display:flex;align-items:center;gap:8px}
.bar-logo{font-size:1.75rem;animation:lkb 3s ease-in-out infinite}
.bar-title{font-size:1.125rem;font-weight:600}
.bar-sub{font-size:.75rem;color:#8D6E63}
.btn-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.25rem}
.btn-icon:active{background:#FFEDE6}

/* Content */
#content{flex:1;padding:16px}
.page{animation:pgIn .2s ease}
.page[hidden]{display:none}
@keyframes pgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Tab bar */
#tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:768px;height:56px;height:calc(56px+env(safe-area-inset-bottom,0));padding-bottom:env(safe-area-inset-bottom,0);background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-top:1px solid #F0E8E0;display:flex;justify-content:space-around;z-index:50}
.tab{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 16px;border-radius:6px;color:#BCAAA4;font-size:.625rem;font-weight:500;transition:color .15s}
.tab.active{color:#FF8C69}
.tab .ti{font-size:1.4rem}

/* FAB */
#fab{position:fixed;bottom:calc(56px+16px+env(safe-area-inset-bottom,0));right:16px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#FFA07A,#FF8C69);color:#fff;font-size:1.75rem;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(255,140,105,.3);z-index:40;transition:transform .2s}
#fab:active{transform:scale(.92)}
#fab.hidden{transform:scale(0);opacity:0;pointer-events:none}
@media(min-width:768px){#fab{right:calc(50% - 384px + 16px)}}

/* Cards */
.card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid #F0E8E0;margin-bottom:16px;transition:transform .2s,box-shadow .3s}
.card:active{box-shadow:0 4px 12px rgba(0,0,0,.06)}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:8px 24px;border-radius:50px;font-size:.875rem;font-weight:500;transition:background .15s,transform .15s}
.btn:active{transform:scale(.97)}
.btn-p{background:#FFA07A;color:#fff}
.btn-p:active{background:#E67A5A}
.btn-s{background:#FFF5EE;color:#4E342E}
.btn-s:active{background:#FAEBD7}
.btn-d{background:#EF9A9A;color:#fff}
.btn-sm{padding:4px 12px;font-size:.75rem}
.btn-block{width:100%}

/* Form */
.fg{margin-bottom:16px}
.fl{display:block;font-size:.875rem;font-weight:500;color:#8D6E63;margin-bottom:4px}
.fi,.ft{width:100%;padding:8px 16px;border:1px solid #F0E8E0;border-radius:6px;background:#fff;color:#4E342E;font-size:1rem}
.fi:focus,.ft:focus{border-color:#FFA07A;box-shadow:0 0 0 3px rgba(255,160,122,.12)}
.ft{resize:vertical;min-height:100px;line-height:1.6}
.fr{display:flex;gap:16px}.fr .fg{flex:1}

/* Modal */
.modal{position:fixed;inset:0;background:rgba(78,52,46,.3);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;z-index:100;animation:fadeIn .2s}
.modal[hidden]{display:none}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.mc{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:85vh;display:flex;flex-direction:column;animation:slideUp .3s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 0}
.mh h2{font-size:1.125rem;font-weight:600}
.mb{padding:16px;overflow-y:auto;flex:1}
.mf{padding:0 16px 16px;display:flex;gap:8px;justify-content:flex-end}
@media(min-width:768px){.modal{align-items:center}.mc{border-radius:16px;max-height:80vh}}

/* Toast */
#toasts{position:fixed;bottom:calc(56px+16px+env(safe-area-inset-bottom,0));left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:#4E342E;color:#fff;padding:8px 24px;border-radius:50px;font-size:.875rem;box-shadow:0 8px 24px rgba(0,0,0,.08);animation:tIn .3s,tOut .3s 2.2s forwards;pointer-events:auto}
.toast-ok{background:#66BB6A}
.toast-err{background:#EF5350}
@keyframes tIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes tOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-16px)}}

/* Empty */
.empty{display:flex;flex-direction:column;align-items:center;padding:48px 16px;text-align:center}
.empty-icon{font-size:3.5rem;margin-bottom:16px;animation:floatIcon 3s ease-in-out infinite}
@keyframes floatIcon{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.empty-title{font-size:1.125rem;font-weight:500;color:#8D6E63;margin-bottom:8px}
.empty-desc{font-size:.875rem;color:#BCAAA4;max-width:240px}

/* Chips */
.chips{display:flex;gap:8px;flex-wrap:nowrap;overflow-x:auto;padding:8px 0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 16px;border-radius:50px;font-size:.75rem;font-weight:500;white-space:nowrap;border:1px solid #F0E8E0;background:#fff;color:#8D6E63;transition:all .15s}
.chip.on{background:#FFA07A;color:#fff;border-color:#FFA07A}

/* Photo grid */
.photo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.pg-month{font-size:.875rem;font-weight:600;color:#8D6E63;padding:16px 0 8px;position:sticky;top:56px;background:#FFFBF5;z-index:5}
.pc{position:relative;border-radius:12px;overflow:hidden;background:#FFF5EE;aspect-ratio:1;cursor:pointer;transition:transform .25s}
.pc:active{transform:scale(.97)}
.pc img{width:100%;height:100%;object-fit:cover}
.pc-cap{position:absolute;bottom:0;left:0;right:0;padding:8px;background:linear-gradient(transparent,rgba(0,0,0,.5));color:#fff;font-size:.75rem;display:flex;justify-content:space-between}
.pc-fav{position:absolute;top:8px;right:8px;font-size:1rem;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3))}
@media(min-width:768px){.photo-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1024px){.photo-grid{grid-template-columns:repeat(4,1fr)}}

/* Lightbox */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:150;display:flex;flex-direction:column;align-items:center;justify-content:center}
.lb[hidden]{display:none}
.lb-img{flex:1;display:flex;align-items:center;justify-content:center;padding:16px}
.lb-img img{max-width:100%;max-height:70vh;object-fit:contain;border-radius:6px}
.lb-close{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;font-size:1.25rem;display:flex;align-items:center;justify-content:center}
.lb-nav{position:absolute;top:50%;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;font-size:1.25rem;display:flex;align-items:center;justify-content:center}
.lb-prev{left:8px}.lb-next{right:8px}
.lb-cap{padding:16px;color:#fff;text-align:center}
.lb-cap .ltitle{font-size:1rem;font-weight:500}
.lb-cap .ldate{font-size:.875rem;color:rgba(255,255,255,.6)}
.lb-acts{display:flex;gap:16px;justify-content:center;padding:0 16px 24px}
.lb-acts button{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.12);color:#fff;font-size:1.25rem}

/* Milestone */
.ms-sum{display:flex;gap:16px;margin-bottom:24px}
.ms-stat{flex:1;text-align:center;background:#fff;border-radius:12px;padding:8px;border:1px solid #F0E8E0}
.ms-stat-v{font-size:1.25rem;font-weight:600;color:#FF8C69}
.ms-stat-l{font-size:.75rem;color:#BCAAA4;margin-top:2px}
.ms-card{display:flex;gap:16px;padding:16px;background:#fff;border-radius:12px;border:1px solid #F0E8E0;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ms-card.up{opacity:.5;border-style:dashed;background:#FFF5EE}
.ms-emoji{font-size:2rem;width:48px;height:48px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#FFF5EE;border-radius:50%}
.ms-info{flex:1;min-width:0}
.ms-info h3{font-size:1rem;font-weight:500;margin-bottom:2px}
.ms-meta{font-size:.75rem;color:#BCAAA4;margin-bottom:8px}
.ms-notes{font-size:.875rem;color:#8D6E63;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* Growth */
.stat-tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:24px}
.stat-tile{background:#fff;border-radius:12px;padding:16px;text-align:center;border:1px solid #F0E8E0}
.stat-val{font-size:1.5rem;font-weight:600;color:#4E342E}.stat-val .u{font-size:.875rem;font-weight:400;color:#8D6E63;margin-left:2px}
.stat-lbl{font-size:.75rem;color:#BCAAA4;margin-top:4px}
.chart-box{background:#fff;border-radius:12px;padding:16px;margin-bottom:24px;border:1px solid #F0E8E0}
.chart-box h3{font-size:1rem;font-weight:500;margin-bottom:16px;color:#8D6E63}
.chart-wrap{position:relative;width:100%;height:280px}
.tbl{width:100%;border-collapse:collapse;font-size:.875rem}
.tbl th,.tbl td{text-align:center;padding:8px 4px;border-bottom:1px solid #F0E8E0}
.tbl th{font-weight:500;color:#BCAAA4;font-size:.75rem}

/* Diary */
.dc{padding:16px;background:#fff;border-radius:12px;border:1px solid #F0E8E0;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);cursor:pointer;transition:transform .2s,box-shadow .3s}
.dc:active{box-shadow:0 4px 12px rgba(0,0,0,.06)}
.dc-h{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.dc-mood{font-size:1.5rem}
.dc-date{font-size:.75rem;color:#BCAAA4}
.dc-title{font-size:1rem;font-weight:500;margin-bottom:4px}
.dc-preview{font-size:.875rem;color:#8D6E63;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.dc-footer{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.dc-tag{font-size:.75rem;color:#FF8C69;background:#FFEDE6;padding:2px 8px;border-radius:50px}
.detail-h{margin-bottom:24px}
.detail-content{font-size:1rem;line-height:1.8;white-space:pre-wrap;margin-bottom:24px}

/* Moods */
.moods{display:flex;gap:8px;flex-wrap:wrap}
.mood-o{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;border:2px solid transparent;background:#FFF5EE;transition:all .15s}
.mood-o.sel{border-color:#FFA07A;background:#FFEDE6;transform:scale(1.1)}

/* Settings */
.ss{margin-bottom:32px}
.ss h3{font-size:.875rem;font-weight:600;color:#BCAAA4;text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px}
.sc{background:#fff;border-radius:12px;border:1px solid #F0E8E0;overflow:hidden}
.sr{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid #F0E8E0}
.sr:last-child{border-bottom:none}
.sr-label{font-size:.875rem;font-weight:500}
.sr-val{font-size:.875rem;color:#8D6E63}
.sr-act{color:#FFA07A;font-size:.875rem;font-weight:500}
.sr:active{background:#FFF5EE}

/* Confetti */
.confetti{position:fixed;inset:0;pointer-events:none;z-index:300}

/* FAB menu */
.fab-menu{position:fixed;right:16px;z-index:55;display:flex;flex-direction:column;gap:12px;transition:opacity .2s,transform .2s;pointer-events:auto}
.fab-menu.hidden{opacity:0;transform:translateY(12px);pointer-events:none}
.fab-mbtn{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.12);transition:transform .15s}
.fab-mbtn:active{transform:scale(.9)}
#fab-photo{background:#FFA07A;color:#fff}
#fab-video{background:#FF91A4;color:#fff}
@media(min-width:768px){.fab-menu{right:calc(50% - 384px + 16px)}}

/* Video card overlay */
.pc-video-badge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:1rem;pointer-events:none}
.pc-video-badge::after{content:'';display:block;width:0;height:0;border-style:solid;border-width:8px 0 8px 14px;border-color:transparent transparent transparent #fff;margin-left:3px}

/* Lightbox video */
.lb-video{max-width:100%;max-height:70vh;border-radius:6px;outline:none}

/* Responsive */
#tabs{position:static;transform:none;height:auto;padding:0 16px;background:transparent;backdrop-filter:none;border-top:none;border-bottom:1px solid #F0E8E0;gap:4px;justify-content:flex-start}
.tab{flex-direction:row;gap:4px;padding:8px 16px;border-bottom:2px solid transparent;font-size:.875rem}
.tab.active{border-bottom-color:#FF8C69}
.tab .ti{font-size:1.1rem}
#main{padding-bottom:0}
#fab{bottom:16px}
}

@media print{
#tabs,#fab,.modal,#toasts,#lock,#welcome,canvas{display:none!important}
#main{padding-bottom:0;max-width:none}body{background:#fff;color:#000}
.card,.ms-card,.dc{box-shadow:none;border:1px solid #ddd}
}
</style>
</head>
<body>

<!-- ==================== LOCK SCREEN ==================== -->
<div id="lock">
  <canvas id="lock-canvas"></canvas>
  <div class="lock-inner">
    <span class="lock-icon">🍑</span>
    <h1 class="lock-title">小桃酥</h1>
    <p class="lock-sub">的成长记录</p>
    <div class="lock-wrap">
      <input type="password" class="lock-input" id="lock-input" placeholder="输入访问密码" maxlength="20" autocomplete="off">
      <button class="lock-btn" id="lock-submit">进入</button>
    </div>
    <p class="lock-err" id="lock-err"></p>
  </div>
</div>

<!-- ==================== WELCOME PAGE ==================== -->
<div id="welcome" hidden>
  <canvas id="wel-canvas"></canvas>
  <div class="wc">
    <span class="w-icon">🍑</span>
    <h1 class="w-title" id="wname">小桃酥</h1>
    <p class="w-sub">的成长记录</p>
    <div class="w-stats">
      <div class="w-stat"><span class="w-stat-num" id="wage">--</span><span class="w-stat-lbl">月龄</span></div>
      <div class="w-div"></div>
      <div class="w-stat"><span class="w-stat-num" id="wphotos">--</span><span class="w-stat-lbl">照片</span></div>
      <div class="w-div"></div>
      <div class="w-stat"><span class="w-stat-num" id="wms">--</span><span class="w-stat-lbl">里程碑</span></div>
    </div>
    <div id="w-countdown" class="w-countdown">
      <div class="w-cd-label" id="w-cd-name">百天</div>
      <div class="w-cd-row">
        <span class="w-cd-num" id="w-cd-days">--</span>
        <span class="w-cd-unit">天后到来 🎉</span>
      </div>

async function tryLogin(input) {
  lockBtn.textContent = '验证中...';
  lockBtn.disabled = true;
  lockErr.textContent = '';

  try {
    // Add timeout
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 10000);

    const config = await API.getConfig();
    clearTimeout(timer);

    if (!config) {
      lockErr.textContent = '数据库配置缺失，请先执行 SQL 初始化';
      lockBtn.textContent = '进入';
      lockBtn.disabled = false;
      return;
    }

    if (config.passcode === input) {
      sessionStorage.setItem('xts_pass', input);
      await enterApp(config);
    } else {
      lockErr.textContent = '密码错误，请重试（默认: 123456）';
      lockBtn.textContent = '进入';
      lockBtn.disabled = false;
    }
  } catch (e) {
    console.error('Login error:', e);
    if (e.name === 'AbortError') {
      lockErr.textContent = '连接超时，请检查网络后刷新';
    } else {
      lockErr.textContent = '无法连接服务器: ' + e.message.slice(0,30);
    }
    lockBtn.textContent = '进入';
    lockBtn.disabled = false;
  }
}

  (function an(){ctx.clearRect(0,0,cv.width,cv.height);for(const p of ps){p.wb+=p.ws;p.x+=p.sx+Math.sin(p.wb)*p.wa*.04;p.y+=p.sy;p.r+=p.rs;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);const s=p.s;ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(-s*.4,-s*.7,-s*.1,-s,s*.3,-s*.5);ctx.bezierCurveTo(s*.5,-s*.2,s*.5,-s*.05,s*.2,s*.05);ctx.bezierCurveTo(s*.1,s*.1,-s*.2,s*.05,-s*.3,-s*.1);ctx.bezierCurveTo(-s*.4,-s*.3,-s*.5,-s*.5,0,0);ctx.fillStyle=p.c.replace(/[\d.]+\)$/,p.o+')');ctx.fill();ctx.restore();if(p.y>cv.height+30){p.y=-30;p.x=Math.random()*cv.width}if(p.x>cv.width+30)p.x=-30;if(p.x<-30)p.x=cv.width+30}requestAnimationFrame(an)})();
}

function setupMainApp() {
  $('#main').hidden = false;
  updateTitle();
  updateAge();

  const hash = location.hash.replace('#','');
  activeTab = ['album','milestones','growth','diary','settings'].includes(hash) ? hash : 'album';
  location.hash = activeTab;
  navigate(activeTab);

  // Tab clicks
  $$('#tabs .tab').forEach(b => {
    b.addEventListener('click', () => { location.hash = b.dataset.tab; });
  });

  window.addEventListener('hashchange', async () => {
    const tab = location.hash.replace('#','');
    if (['album','milestones','growth','diary','settings'].includes(tab)) {
      await reloadData();
      navigate(tab);
    }
  });

  $('#bsettings').addEventListener('click', () => { location.hash = 'settings'; });
  $('#fab').addEventListener('click', handleFab);
  $('#mclose').addEventListener('click', closeModal);

}

async function reloadData() {
  try {
    const [photos, milestones, growth, diary] = await Promise.all([
      API.getPhotos(), API.getMilestones(), API.getGrowth(), API.getDiary()
    ]);
    appData.photos = photos; appData.milestones = milestones;
    appData.growthRecords = growth; appData.diaryEntries = diary;
  } catch (e) { console.error('Reload error:', e); }
}

function navigate(tab) {
  $$('.page').forEach(p=>p.hidden=true);
  const pg=$('#page-'+tab); if(pg)pg.hidden=false;
  $$('#tabs .tab').forEach(b=>{b.classList.toggle('active',b.dataset.tab===tab);});
  $('#fab').classList.toggle('hidden', tab==='settings');
  if(fabMenuOpen)closeFabMenu();
  if(activeTab!==tab&&activeTab==='growth'){if(heightChart)heightChart.destroy();if(weightChart)weightChart.destroy();}
  activeTab=tab;
  renderPage();
  $('#content').scrollTop=0;
}

function renderPage() {
  switch(activeTab){
    case'album':renderAlbum();break;
    case'milestones':renderMilestones();break;
    case'growth':renderGrowth();break;
    case'diary':renderDiary();break;
    case'settings':renderSettings();break;

}

function initPhotoInput() {
  $('#photo-input').addEventListener('change', async function(e) {
    const file=e.target.files[0];if(!file)return;
    if(!file.type.startsWith('image/')){toast('请选择图片文件','err');e.target.value='';return;}
    toast('正在压缩上传...','');
    try{
      const compressed=await U.resizeImg(file,600,.6);
      const thumb=await U.resizeImg(file,150,.5);
      const pid=U.genId('p');
      const[pp,tp]=await Promise.all([API.uploadFile(compressed,pid,false),API.uploadFile(thumb,pid,true)]);
      showPhotoForm(pid,pp,tp,false);
    }catch(err){console.error(err);toast('上传失败: '+err.message,'err');}
    e.target.value='';
  });

  // Video input
  $('#video-input').addEventListener('change', async function(e) {
    const file=e.target.files[0];if(!file)return;
    if(!file.type.startsWith('video/')){toast('请选择视频文件','err');e.target.value='';return;}
    if(file.size>50*1024*1024){toast('视频不能超过50MB','err');e.target.value='';return;}
    toast('正在处理视频...','');

    try{
      const pid=U.genId('p');
      // Capture thumbnail from video
      const thumbDataUrl=await captureVideoThumb(file);
      // Upload video + thumbnail in parallel
      const vid= await fetch(URL.createObjectURL(file)).then(r=>r.blob());
      const thumbBlob=await fetch(thumbDataUrl).then(r=>r.blob());
      const formDataV=new FormData();formDataV.append('file',vid,pid+'.mp4');
      const formDataT=new FormData();formDataT.append('file',thumbBlob,pid+'.jpg');
      const [vp,tp]=await Promise.all([
        uploadFileDirect('videos/'+pid+'.mp4',formDataV),
        uploadFileDirect('thumbs/'+pid+'.jpg',formDataT)
      ]);
      showPhotoForm(pid,vp,tp,true);
    }catch(err){console.error(err);toast('上传失败: '+err.message,'err');}
    e.target.value='';
  });
}

// Direct upload helper (bypasses the dataURL conversion)
async function uploadFileDirect(path,formData){
  const res=await fetch(CFG.SUPABASE_URL+'/storage/v1/object/'+CFG.BUCKET+'/'+path,{
    method:'POST',
    headers:{'apikey':CFG.SUPABASE_KEY,'Authorization':'Bearer '+CFG.SUPABASE_KEY,'x-upsert':'true'},
    body:formData
  });
  if(!res.ok){const t=await res.text();throw new Error('上传失败('+res.status+'): '+t.slice(0,80));}
  return path;
}

// Capture video thumbnail at 1 second
function captureVideoThumb(file){
  return new Promise((ok,no)=>{
    const video=document.createElement('video');
    video.preload='metadata';video.muted=true;video.playsInline=true;
    video.onloadeddata=()=>{
      video.currentTime=Math.min(1,video.duration/3);
    };
    video.onseeked=()=>{
      const canvas=document.createElement('canvas');
      canvas.width=300;canvas.height=Math.round(300*(video.videoHeight/video.videoWidth));
      canvas.getContext('2d').drawImage(video,0,0,canvas.width,canvas.height);
      ok(canvas.toDataURL('image/jpeg',.7));
      URL.revokeObjectURL(video.src);
    };
    video.onerror=()=>{no(new Error('无法读取视频'));};
    video.src=URL.createObjectURL(file);
  });
}

function showLightbox(photos,p){
  let idx=photos.findIndex(x=>x.id===p.id);if(idx<0)idx=0;
  const ov=document.createElement('div');ov.className='lb';
  function ri(){
    const cur=photos[idx];
    const mediaHtml=cur.isVideo
      ? '<video class="lb-video" src="'+cur.dataUrl+'" controls playsinline autoplay style="max-width:100%;max-height:70vh;border-radius:6px;outline:none"></video>'
      : '<img src="'+cur.dataUrl+'" alt="'+U.esc(cur.title||'')+'">';
    ov.innerHTML='<button class="lb-close">✕</button>'+(idx>0?'<button class="lb-nav lb-prev">◀</button>':'')+(idx<photos.length-1?'<button class="lb-nav lb-next">▶</button>':'')+'<div class="lb-img">'+mediaHtml+'</div><div class="lb-cap"><div class="ltitle">'+(cur.isVideo?'🎬 ':'')+U.esc(cur.title||'无标题')+'</div><div class="ldate">'+U.fmtDate(cur.date)+' · '+(idx+1)+'/'+photos.length+'</div></div><div class="lb-acts"><button id="lb-fav">'+(cur.favorite?'⭐':'☆')+'</button><button id="lb-del">🗑️</button></div>';
    ov.querySelector('.lb-close').onclick=close;
    ov.querySelector('.lb-close').onclick=close;
    const pv=ov.querySelector('.lb-prev');if(pv)pv.onclick=()=>{idx--;ri();};
    const nx=ov.querySelector('.lb-next');if(nx)nx.onclick=()=>{idx++;ri();};
    ov.querySelector('#lb-fav').onclick=async()=>{cur.favorite=!cur.favorite;await API.updatePhoto(cur.id,{favorite:cur.favorite});const photo=appData.photos.find(x=>x.id===cur.id);if(photo)photo.favorite=cur.favorite;ri();};
    ov.querySelector('#lb-del').onclick=()=>{confirm('确定删除这张照片吗？',async()=>{await API.deletePhoto(cur.id);toast('已删除','ok');close();reloadData().then(()=>renderPage());});};
  }
  function close(){ov.remove();document.removeEventListener('keydown',onKey);}
  function onKey(e){if(e.key==='Escape')close();if(e.key==='ArrowLeft'&&idx>0){idx--;ri();}if(e.key==='ArrowRight'&&idx<photos.length-1){idx++;ri();}}
  document.addEventListener('keydown',onKey);
  let tx=0;ov.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;});ov.addEventListener('touchend',e=>{const d=tx-e.changedTouches[0].clientX;if(Math.abs(d)>60){if(d>0&&idx<photos.length-1)idx++;else if(d<0&&idx>0)idx--;ri();}});
  ri();document.body.appendChild(ov);
}

function stile(icon,label,value,unit,ds){return'<div class="stat-tile"><div style="font-size:1.5rem;margin-bottom:4px">'+icon+'</div><div class="stat-val">'+(value!=='--'?value:'--')+'<span class="u">'+(value!=='--'?unit:'')+'</span></div><div class="stat-lbl">'+label+'</div>'+(ds?'<div class="stat-lbl" style="color:#81C784">'+ds+'</div>':'')+'</div>';}
function deltaS(c,p,u){if(c==null||p==null)return'';const d=c-p;return(d>=0?'+':'')+d.toFixed(1)+u+' 较上次';}

function buildWHO(records,birth,metric){
  const maxAge=Math.max(730,...records.map(r=>r.ageInDays)),p3=[],p50=[],p97=[];
  for(const row of WHO_GIRLS){const days=Math.round(row[0]*30.4375);if(days>maxAge+60)break;
    if(metric==='height'){p3.push({x:days,y:row[1]});p50.push({x:days,y:row[2]});p97.push({x:days,y:row[3]});}
    else{p3.push({x:days,y:row[4]});p50.push({x:days,y:row[5]});p97.push({x:days,y:row[6]});}
  }return{p3,p50,p97};
}

function getUpcomingMilestones(birthDate) {
  const birth = new Date(birthDate + 'T00:00:00');
  const today = new Date();
  const elapsed = Math.floor((today - birth) / 86400000);

  // Define key milestones: [days, emoji, label]
  const keyDays = [
    { days: 30,   emoji: '🌕', label: '满月' },
    { days: 42,   emoji: '🍼', label: '产后复查' },
    { days: 100,  emoji: '🎂', label: '百天' },
    { days: 183,  emoji: '👶', label: '半岁' },
    { days: 365,  emoji: '🎈', label: '周岁' },
    { days: 730,  emoji: '🌟', label: '两岁' },
    { days: 1095, emoji: '🎓', label: '三岁' },
  ];

  // Filter to future milestones, sorted nearest first
  const upcoming = keyDays
    .filter(m => m.days > elapsed)
    .map(m => ({ ...m, daysLeft: m.days - elapsed }));

  // Also check if today IS a milestone
  const todayMatch = keyDays.find(m => m.days === elapsed);
  if (todayMatch) {
    return [{ ...todayMatch, daysLeft: 0, label: todayMatch.label + '就是今天！' }];
  }

  return upcoming;
}

// ---- Chart.js dynamic loader ----
let _chartJSLoaded=false,_chartJSLoading=false;
function loadChartJS(){
  if(_chartJSLoaded)return Promise.resolve();
  if(_chartJSLoading)return new Promise((ok)=>{const t=setInterval(()=>{if(_chartJSLoaded){clearInterval(t);ok();}},100);});
  _chartJSLoading=true;
  return new Promise((ok,no)=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js';
    s.onload=()=>{_chartJSLoaded=true;_chartJSLoading=false;ok();};
    s.onerror=()=>{_chartJSLoading=false;no(new Error('Chart.js load failed'));};
    document.head.appendChild(s);
  });
}

  }
};
