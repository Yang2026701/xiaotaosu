<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>小桃酥的成长记录</title>
<style>
/* ===== RESET ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans SC",system-ui,-apple-system,sans-serif;background:#FFFBF5;color:#4E342E;line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}
button{cursor:pointer;font-family:inherit;border:none;background:none}
input,textarea,select{font-family:inherit;font-size:inherit}
input:focus,textarea:focus,select:focus{outline:none}

/* ===== DESIGN TOKENS ===== */
:root{
--peach:#FFA07A;--peach2:#FF8C69;--peach-light:#FFF0EB;--peach-bg:#FFEDE6;
--pink-light:#FFF0F3;--pink:#FFB6C1;
--cre-bg:#FFFBF5;--cre-card:#FFFFFF;--cre-hover:#FFF5EE;
--txt:#4E342E;--txt2:#8D6E63;--txt3:#BCAAA4;
--shadow:0 4px 12px rgba(0,0,0,0.06);
--radius:12px;--radius-lg:16px;--radius-full:9999px;
}

/* ===== LOCK SCREEN ===== */
#lock{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:linear-gradient(170deg,#FFF0EB,#FFE0D5,#FFD1C4,#FFF0F3);transition:opacity .4s}
#lock canvas{position:absolute;inset:0;pointer-events:none}
#lock.exit{opacity:0;pointer-events:none}
.lock-inner{position:relative;z-index:1;text-align:center;padding:32px 24px;max-width:360px;width:100%}
.lock-icon{font-size:4.5rem;display:block;margin-bottom:8px;animation:lkb 2.5s ease-in-out infinite}
@keyframes lkb{0%,100%{transform:translateY(0)scale(1)}20%{transform:translateY(-14px)scale(1.1)}40%{transform:translateY(0)}55%{transform:translateY(-5px)scale(1.03)}70%{transform:translateY(0)}}
.lock-title{font-size:2rem;font-weight:700;letter-spacing:3px;margin-bottom:2px}
.lock-sub{font-size:.95rem;color:#8D6E63;margin-bottom:32px}
.lock-wrap{display:flex;gap:8px}
.lock-input{flex:1;padding:14px 18px;border:2px solid rgba(255,160,122,.25);border-radius:16px;font-size:1.1rem;background:rgba(255,255,255,.7);color:#4E342E;letter-spacing:4px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.lock-input:focus{border-color:#FFA07A}
.lock-input::placeholder{color:#D7CCC8;letter-spacing:1px;font-size:.95rem}
.lock-btn{padding:14px 24px;border-radius:16px;background:linear-gradient(135deg,#FFA07A,#FF8C69);color:#fff;font-size:1rem;font-weight:600;letter-spacing:2px;box-shadow:0 4px 16px rgba(255,140,105,.3);white-space:nowrap;transition:transform .15s,opacity .15s}
.lock-btn:active{transform:scale(.95)}
.lock-btn:disabled{opacity:.6}
.lock-err{margin-top:12px;font-size:.85rem;color:#EF9A9A;min-height:20px}

/* ===== WELCOME PAGE ===== */
#welcome{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:linear-gradient(170deg,#FFF5F1,#FFEDE6,#FFE0D5,#FFF0F3);transition:opacity .5s,transform .5s;overflow:hidden}
#welcome canvas{position:absolute;inset:0;pointer-events:none;z-index:0}
#welcome.exit{opacity:0;transform:scale(1.05);pointer-events:none}
.wc{position:relative;z-index:1;text-align:center;padding:40px 24px;max-width:380px;width:100%}
.w-icon{font-size:5rem;display:block;margin-bottom:12px;animation:lkb 2s ease-in-out infinite;filter:drop-shadow(0 8px 16px rgba(255,160,122,.3))}
.w-title{font-size:2rem;font-weight:700;letter-spacing:2px;margin-bottom:4px}
.w-sub{font-size:1rem;color:#8D6E63;margin-bottom:36px}
.w-stats{display:flex;align-items:center;background:rgba(255,255,255,.55);backdrop-filter:blur(12px);border-radius:20px;padding:16px 24px;margin-bottom:36px;box-shadow:0 4px 20px rgba(255,160,122,.1);border:1px solid rgba(255,180,150,.2)}
.w-stat{flex:1;text-align:center}
.w-stat-num{display:block;font-size:1.5rem;font-weight:700;color:#FF8C69}
.w-stat-lbl{font-size:.7rem;color:#BCAAA4;letter-spacing:1px}
.w-div{width:1px;height:32px;background:rgba(0,0,0,.06)}

/* Countdown card */
.w-countdown{background:rgba(255,255,255,.55);backdrop-filter:blur(12px);border-radius:20px;padding:14px 24px;margin-bottom:36px;text-align:center;box-shadow:0 4px 20px rgba(255,160,122,.1);border:1px solid rgba(255,180,150,.2)}
.w-cd-label{font-size:.95rem;font-weight:600;color:#FF8C69;letter-spacing:1px;margin-bottom:6px}
.w-cd-row{display:flex;align-items:baseline;justify-content:center;gap:6px}
.w-cd-num{font-size:2.2rem;font-weight:700;color:#FF8C69;font-variant-numeric:proportional-nums;animation:cdPulse 2s ease-in-out infinite}
@keyframes cdPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.w-cd-emoji{font-size:1.3rem}
.w-cd-unit{font-size:1.05rem;color:#8D6E63;font-weight:500}

.w-enter{display:inline-flex;align-items:center;gap:10px;padding:16px 48px;border-radius:50px;background:linear-gradient(135deg,#FFA07A,#FF8C69);color:#fff;font-size:1.15rem;font-weight:600;letter-spacing:2px;box-shadow:0 8px 28px rgba(255,140,105,.35);transition:transform .2s}
.w-enter:active{transform:scale(.94)}
.w-footer{margin-top:32px;font-size:.8rem;color:#BCAAA4;letter-spacing:1px}

/* ===== MAIN APP ===== */
#main{padding-bottom:56px;padding-bottom:calc(56px + env(safe-area-inset-bottom,0))}
#main[hidden]{display:none}
#main{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;max-width:768px;margin:0 auto}
#bar{position:sticky;top:0;z-index:50;background:rgba(255,251,245,.85);backdrop-filter:blur(12px);border-bottom:1px solid #F0E8E0;padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between}
.bar-left{display:flex;align-items:center;gap:8px}
.bar-logo{font-size:1.75rem;animation:lkb 3s ease-in-out infinite}
.bar-title{font-size:1.125rem;font-weight:600}
.bar-sub{font-size:.75rem;color:#8D6E63}
.btn-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.25rem}
.btn-icon:active{background:#FFEDE6}
#bmgmt.playing{animation:musicPulse 1.5s ease-in-out infinite;color:#FF8C69}
@keyframes musicPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
#bmgmt{transition:color .3s}

/* Content */
#content{flex:1;padding:16px}
.page{animation:pgIn .2s ease}
.page[hidden]{display:none}
@keyframes pgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Tab bar */
#tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:768px;height:56px;height:calc(56px+env(safe-area-inset-bottom,0));padding-bottom:env(safe-area-inset-bottom,0);background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-top:1px solid #F0E8E0;display:flex;justify-content:space-around;z-index:50}
.tab{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 16px;border-radius:6px;color:#BCAAA4;font-size:.625rem;font-weight:500;transition:color .15s}
.tab.active{color:#FF8C69}
.tab .ti{font-size:1.4rem}

/* FAB */
#fab{position:fixed;bottom:calc(56px+16px+env(safe-area-inset-bottom,0));right:16px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#FFA07A,#FF8C69);color:#fff;font-size:1.75rem;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(255,140,105,.3);z-index:40;transition:transform .2s}
#fab:active{transform:scale(.92)}
#fab.hidden{transform:scale(0);opacity:0;pointer-events:none}
@media(min-width:768px){#fab{right:calc(50% - 384px + 16px)}}

/* Cards */
.card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid #F0E8E0;margin-bottom:16px;transition:transform .2s,box-shadow .3s}
.card:active{box-shadow:0 4px 12px rgba(0,0,0,.06)}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:8px 24px;border-radius:50px;font-size:.875rem;font-weight:500;transition:background .15s,transform .15s}
.btn:active{transform:scale(.97)}
.btn-p{background:#FFA07A;color:#fff}
.btn-p:active{background:#E67A5A}
.btn-s{background:#FFF5EE;color:#4E342E}
.btn-s:active{background:#FAEBD7}
.btn-d{background:#EF9A9A;color:#fff}
.btn-sm{padding:4px 12px;font-size:.75rem}
.btn-block{width:100%}

/* Form */
.fg{margin-bottom:16px}
.fl{display:block;font-size:.875rem;font-weight:500;color:#8D6E63;margin-bottom:4px}
.fi,.ft{width:100%;padding:8px 16px;border:1px solid #F0E8E0;border-radius:6px;background:#fff;color:#4E342E;font-size:1rem}
.fi:focus,.ft:focus{border-color:#FFA07A;box-shadow:0 0 0 3px rgba(255,160,122,.12)}
.ft{resize:vertical;min-height:100px;line-height:1.6}
.fr{display:flex;gap:16px}.fr .fg{flex:1}

/* Modal */
.modal{position:fixed;inset:0;background:rgba(78,52,46,.3);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;z-index:100;animation:fadeIn .2s}
.modal[hidden]{display:none}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.mc{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:85vh;display:flex;flex-direction:column;animation:slideUp .3s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 0}
.mh h2{font-size:1.125rem;font-weight:600}
.mb{padding:16px;overflow-y:auto;flex:1}
.mf{padding:0 16px 16px;display:flex;gap:8px;justify-content:flex-end}
@media(min-width:768px){.modal{align-items:center}.mc{border-radius:16px;max-height:80vh}}

/* Toast */
#toasts{position:fixed;bottom:calc(56px+16px+env(safe-area-inset-bottom,0));left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:#4E342E;color:#fff;padding:8px 24px;border-radius:50px;font-size:.875rem;box-shadow:0 8px 24px rgba(0,0,0,.08);animation:tIn .3s,tOut .3s 2.2s forwards;pointer-events:auto}
.toast-ok{background:#66BB6A}
.toast-err{background:#EF5350}
@keyframes tIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes tOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-16px)}}

/* Empty */
.empty{display:flex;flex-direction:column;align-items:center;padding:48px 16px;text-align:center}
.empty-icon{font-size:3.5rem;margin-bottom:16px;animation:floatIcon 3s ease-in-out infinite}
@keyframes floatIcon{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.empty-title{font-size:1.125rem;font-weight:500;color:#8D6E63;margin-bottom:8px}
.empty-desc{font-size:.875rem;color:#BCAAA4;max-width:240px}

/* Chips */
.chips{display:flex;gap:8px;flex-wrap:nowrap;overflow-x:auto;padding:8px 0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 16px;border-radius:50px;font-size:.75rem;font-weight:500;white-space:nowrap;border:1px solid #F0E8E0;background:#fff;color:#8D6E63;transition:all .15s}
.chip.on{background:#FFA07A;color:#fff;border-color:#FFA07A}

/* Photo grid */
.photo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.pg-month{font-size:.875rem;font-weight:600;color:#8D6E63;padding:16px 0 8px;position:sticky;top:56px;background:#FFFBF5;z-index:5}
.pc{position:relative;border-radius:12px;overflow:hidden;background:#FFF5EE;aspect-ratio:1;cursor:pointer;transition:transform .25s}
.pc:active{transform:scale(.97)}
.pc img{width:100%;height:100%;object-fit:cover}
.pc-cap{position:absolute;bottom:0;left:0;right:0;padding:8px;background:linear-gradient(transparent,rgba(0,0,0,.5));color:#fff;font-size:.75rem;display:flex;justify-content:space-between}
.pc-fav{position:absolute;top:8px;right:8px;font-size:1rem;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3))}
@media(min-width:768px){.photo-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1024px){.photo-grid{grid-template-columns:repeat(4,1fr)}}

/* Lightbox */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:150;display:flex;flex-direction:column;align-items:center;justify-content:center}
.lb[hidden]{display:none}
.lb-img{flex:1;display:flex;align-items:center;justify-content:center;padding:16px}
.lb-img img{max-width:100%;max-height:70vh;object-fit:contain;border-radius:6px}
.lb-close{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;font-size:1.25rem;display:flex;align-items:center;justify-content:center}
.lb-nav{position:absolute;top:50%;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;font-size:1.25rem;display:flex;align-items:center;justify-content:center}
.lb-prev{left:8px}.lb-next{right:8px}
.lb-cap{padding:16px;color:#fff;text-align:center}
.lb-cap .ltitle{font-size:1rem;font-weight:500}
.lb-cap .ldate{font-size:.875rem;color:rgba(255,255,255,.6)}
.lb-acts{display:flex;gap:12px;justify-content:center;padding:0 16px 24px}
.lb-acts button{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.12);color:#fff;font-size:1.1rem;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer}
.lb-acts button:active{background:rgba(255,255,255,.25)}

/* Lightbox description */
.lb-desc{font-size:.8rem;color:rgba(255,255,255,.5);margin-top:4px;max-width:280px;margin-left:auto;margin-right:auto}

/* Milestone */
.ms-sum{display:flex;gap:16px;margin-bottom:24px}
.ms-stat{flex:1;text-align:center;background:#fff;border-radius:12px;padding:8px;border:1px solid #F0E8E0}
.ms-stat-v{font-size:1.25rem;font-weight:600;color:#FF8C69}
.ms-stat-l{font-size:.75rem;color:#BCAAA4;margin-top:2px}
.ms-card{display:flex;gap:16px;padding:16px;background:#fff;border-radius:12px;border:1px solid #F0E8E0;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ms-card.up{opacity:.5;border-style:dashed;background:#FFF5EE}
.ms-emoji{font-size:2rem;width:48px;height:48px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#FFF5EE;border-radius:50%}
.ms-info{flex:1;min-width:0}
.ms-info h3{font-size:1rem;font-weight:500;margin-bottom:2px}
.ms-meta{font-size:.75rem;color:#BCAAA4;margin-bottom:8px}
.ms-notes{font-size:.875rem;color:#8D6E63;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* Growth */
.stat-tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:24px}
.stat-tile{background:#fff;border-radius:12px;padding:16px;text-align:center;border:1px solid #F0E8E0}
.stat-val{font-size:1.5rem;font-weight:600;color:#4E342E}.stat-val .u{font-size:.875rem;font-weight:400;color:#8D6E63;margin-left:2px}
.stat-lbl{font-size:.75rem;color:#BCAAA4;margin-top:4px}
.chart-box{background:#fff;border-radius:12px;padding:16px;margin-bottom:24px;border:1px solid #F0E8E0}
.chart-box h3{font-size:1rem;font-weight:500;margin-bottom:16px;color:#8D6E63}
.chart-wrap{position:relative;width:100%;height:280px}
.tbl{width:100%;border-collapse:collapse;font-size:.875rem}
.tbl th,.tbl td{text-align:center;padding:8px 4px;border-bottom:1px solid #F0E8E0}
.tbl th{font-weight:500;color:#BCAAA4;font-size:.75rem}

/* Diary - enhanced */
.diary-tl{position:relative;padding-left:20px}
.diary-tl::before{content:'';position:absolute;left:6px;top:8px;bottom:8px;width:2px;background:linear-gradient(180deg,#FFA07A,#FFB6C1,#D7CCC8);border-radius:1px}
.dc{position:relative;padding:16px;border-radius:14px;margin-bottom:16px;cursor:pointer;transition:transform .2s,box-shadow .3s;overflow:hidden}
.dc::before{content:'';position:absolute;left:-24px;top:22px;width:10px;height:10px;border-radius:50%;border:2px solid #fff;z-index:1}
.dc-mood-joyful{background:linear-gradient(135deg,#FFFBF5,#FFF0EB);border:1px solid rgba(255,160,122,.15)}.dc-mood-joyful::before{background:#FFA07A;box-shadow:0 0 0 2px rgba(255,160,122,.3)}
.dc-mood-tired{background:linear-gradient(135deg,#FFFBF5,#E8EAF6);border:1px solid rgba(159,168,218,.15)}.dc-mood-tired::before{background:#9FA8DA;box-shadow:0 0 0 2px rgba(159,168,218,.3)}
.dc-mood-grateful{background:linear-gradient(135deg,#FFFBF5,#F3E5F5);border:1px solid rgba(206,147,216,.15)}.dc-mood-grateful::before{background:#CE93D8;box-shadow:0 0 0 2px rgba(206,147,216,.3)}
.dc-mood-worried{background:linear-gradient(135deg,#FFFBF5,#E3F2FD);border:1px solid rgba(144,202,249,.15)}.dc-mood-worried::before{background:#90CAF9;box-shadow:0 0 0 2px rgba(144,202,249,.3)}
.dc-mood-touched{background:linear-gradient(135deg,#FFFBF5,#FFE0B2);border:1px solid rgba(255,183,77,.15)}.dc-mood-touched::before{background:#FFB74D;box-shadow:0 0 0 2px rgba(255,183,77,.3)}
.dc-mood-amused{background:linear-gradient(135deg,#FFFBF5,#C8E6C9);border:1px solid rgba(129,199,132,.15)}.dc-mood-amused::before{background:#81C784;box-shadow:0 0 0 2px rgba(129,199,132,.3)}
.dc-mood-hopeful{background:linear-gradient(135deg,#FFFBF5,#FFE0F0);border:1px solid rgba(240,98,146,.1)}.dc-mood-hopeful::before{background:#F06292;box-shadow:0 0 0 2px rgba(240,98,146,.3)}
.dc:active{transform:scale(.98);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.dc-h{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.dc-mood{font-size:1.8rem;line-height:1}
.dc-date{font-size:.75rem;color:#BCAAA4}
.dc-weather{font-size:.9rem}
.dc-title{font-size:1.05rem;font-weight:600;margin-bottom:6px;color:#4E342E}
.dc-preview{font-size:.875rem;color:#8D6E63;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;line-height:1.6}
.dc-photos{display:flex;gap:6px;margin-top:10px;overflow-x:auto}
.dc-photos img{width:60px;height:60px;border-radius:8px;object-fit:cover;flex-shrink:0}
.dc-footer{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;align-items:center}
.dc-tag{font-size:.7rem;color:#FF8C69;background:rgba(255,160,122,.1);padding:2px 8px;border-radius:10px}
.dc-otd{background:linear-gradient(135deg,#FFE0D5,#FFEDE6);border-radius:12px;padding:10px 14px;margin-bottom:16px;font-size:.85rem;display:flex;align-items:center;gap:8px}
.dc-otd span{color:#FF8C69;font-weight:600}
.dc-template{background:#fff;border-radius:14px;padding:10px;margin-bottom:16px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.dc-tpl-btn{text-align:center;padding:10px 4px;border-radius:10px;border:1px dashed #EDE7E0;cursor:pointer;font-size:.75rem;transition:all .15s}
.dc-tpl-btn:active{background:#FFF0EB;border-color:#FFA07A}
.dc-tpl-btn .tpl-icon{font-size:1.2rem;display:block;margin-bottom:2px}
.detail-h{margin-bottom:24px}
.detail-content{font-size:1rem;line-height:1.8;white-space:pre-wrap;margin-bottom:24px}
/* Parenting Guide */
.pg-progress{background:#FFF0EB;border-radius:16px;padding:16px;margin-bottom:20px;border:1px solid rgba(255,160,122,.15)}
.pg-progress-bar{height:8px;border-radius:4px;background:#FFDDD1;margin-top:8px;overflow:hidden}
.pg-progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#FFA07A,#FF8C69);transition:width .5s}
.pg-stage-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid #F0E8E0;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.pg-stage-card.active{border-color:#FFA07A;box-shadow:0 4px 16px rgba(255,160,122,.12)}
.pg-stage-card.locked{opacity:.5;background:#FAFAFA;pointer-events:none}
.pg-knowledge{background:#FFFBFA;border-radius:12px;padding:12px;margin:12px 0;border:1px dashed #FFDDD1}
.pg-kn-header{display:flex;align-items:center;gap:6px;margin-bottom:8px;cursor:pointer}
.pg-kn-title{font-size:.85rem;font-weight:600;color:#FF8C69}
.pg-kn-body{font-size:.85rem;line-height:1.7;color:#5D4037}
.pg-kn-body p{margin-bottom:8px}
.pg-kn-body strong{color:#FF8C69}

async function tryLogin(input) {
  lockBtn.textContent = '验证中...';
  lockBtn.disabled = true;
  lockErr.textContent = '';

  try {
    // Add timeout
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 10000);

    const config = await API.getConfig();
    clearTimeout(timer);

    if (!config) {
      lockErr.textContent = '数据库配置缺失，请先执行 SQL 初始化';
      lockBtn.textContent = '进入';
      lockBtn.disabled = false;
      return;
    }

    if (config.passcode === input) {
      sessionStorage.setItem('xts_pass', input);
      await enterApp(config);
    } else {
      lockErr.textContent = '密码错误，请重试（默认: 123456）';
      lockBtn.textContent = '进入';
      lockBtn.disabled = false;
    }
  } catch (e) {
    console.error('Login error:', e);
    if (e.name === 'AbortError') {
      lockErr.textContent = '连接超时，请检查网络后刷新';
    } else {
      lockErr.textContent = '无法连接服务器: ' + e.message.slice(0,30);
    }
    lockBtn.textContent = '进入';
    lockBtn.disabled = false;
  }
}

let musicPlaying=false,musicCtx=null,musicGain=null,musicTimer=null;

function initMusic(){
  if(musicCtx)return;
  musicCtx=new(window.AudioContext||window.webkitAudioContext)();
  musicGain=musicCtx.createGain();
  musicGain.gain.value=0.25; // Default volume: gentle
  musicGain.connect(musicCtx.destination);
}

function getTimePeriod(){
  const h=new Date().getHours();
  if(h>=6&&h<12)return'morning';
  if(h>=12&&h<18)return'afternoon';
  if(h>=18&&h<22)return'evening';
  return'night';
}

// "Windy Place" inspired — warm piano tones, slow flowing melodies
const MUSIC_PRESETS={
  morning:{scale:[262,294,330,349,392,440,494,523],bpm:12,reverb:0.5,noteLen:3.0,label:'晨光'},
  afternoon:{scale:[330,392,440,494,523,587,659],bpm:14,reverb:0.45,noteLen:2.8,label:'暖阳'},
  evening:{scale:[294,349,392,440,494,523,587],bpm:10,reverb:0.6,noteLen:3.5,label:'晚风'},
  night:{scale:[262,294,330,349,392,440,494],bpm:8,reverb:0.7,noteLen:4.0,label:'摇篮'}
};

function playNote(freq, duration, period){
  if(!musicCtx||!musicGain)return;
  const now=musicCtx.currentTime;
  const preset=MUSIC_PRESETS[period];

  // Piano-like tone: sine fundamental + soft harmonic
  const osc1=musicCtx.createOscillator(); // fundamental
  osc1.type='sine';
  osc1.frequency.value=freq;

  const osc2=musicCtx.createOscillator(); // soft octave harmonic
  osc2.type='sine';
  osc2.frequency.value=freq*2;
  const h2Gain=musicCtx.createGain();
  h2Gain.gain.value=0.08;

  // Piano envelope: quick attack, natural decay
  const envGain=musicCtx.createGain();
  envGain.gain.setValueAtTime(0,now);
  envGain.gain.linearRampToValueAtTime(0.45,now+0.08);  // hammer strike
  envGain.gain.setValueAtTime(0.35,now+0.15);
  envGain.gain.exponentialRampToValueAtTime(0.001,now+duration); // natural decay

  // Warm reverb with longer tail
  const delay1=musicCtx.createDelay(0.6);
  delay1.delayTime.value=preset.reverb+0.1;
  const delay2=musicCtx.createDelay(0.35);
  delay2.delayTime.value=preset.reverb+0.2;
  const fb1=musicCtx.createGain();fb1.gain.value=0.12;
  const fb2=musicCtx.createGain();fb2.gain.value=0.10;

  osc1.connect(envGain);
  osc2.connect(h2Gain);h2Gain.connect(envGain);
  envGain.connect(musicGain);
  // Dual-path reverb
  envGain.connect(delay1);delay1.connect(fb1);fb1.connect(delay1);fb1.connect(delay2);
  envGain.connect(delay2);delay2.connect(fb2);fb2.connect(delay2);fb2.connect(musicGain);

  osc1.start(now);
  osc2.start(now);
  osc1.stop(now+duration+1);
  osc2.stop(now+duration+1);
}

// Melodic phrase generator with stepwise motion
let lastIdx=-1,phraseStep=0,phraseDir=1;
function playNextNote(){
  if(!musicPlaying)return;
  const period=getTimePeriod();
  const preset=MUSIC_PRESETS[period];
  const scale=preset.scale;
  const n=scale.length;

  // Build flowing phrases: stepwise motion, occasional leaps
  if(lastIdx<0||phraseStep>=5+Math.floor(Math.random()*4)){
    // Start new phrase
    lastIdx=Math.floor(Math.random()*n);
    phraseStep=0;
    phraseDir=Math.random()<0.5?-1:1;
    // Occasional large leap for emotional lift
    if(Math.random()<0.15)lastIdx=Math.min(n-1,Math.max(0,lastIdx+(phraseDir*3)));
  }

  const freq=scale[lastIdx];
  playNote(freq,preset.noteLen,period);

  // Occasional soft chord (root + fifth, wide spread)
  if(Math.random()<0.2){
    const fifth=scale[Math.min(n-1,lastIdx+4)];
    if(fifth)setTimeout(()=>{if(musicPlaying)playNote(fifth,preset.noteLen*1.2,period);},150);
  }

  // Stepwise movement within phrase
  phraseStep++;
  if(phraseStep%2===0||Math.random()<0.6){
    lastIdx=Math.min(n-1,Math.max(0,lastIdx+phraseDir));
  }
  if(lastIdx===0)phraseDir=1;
  if(lastIdx===n-1)phraseDir=-1;

  const interval=(60/preset.bpm)*1000*(0.85+Math.random()*0.3);
  musicTimer=setTimeout(playNextNote,interval);
}

function startMusic(){
  if(musicPlaying)return;
  initMusic();
  if(musicCtx.state==='suspended')musicCtx.resume();
  musicPlaying=true;
  playNextNote();
  $('#bmgmt').classList.add('playing');
  showMusicToast();
}

function stopMusic(){
  musicPlaying=false;
  if(musicTimer){clearTimeout(musicTimer);musicTimer=null;}
  if(musicCtx)musicCtx.suspend();
  $('#bmgmt').classList.remove('playing');
}

function toggleMusic(){
  if(musicPlaying){stopMusic();}
  else{startMusic();}
}

function showMusicToast(){
  const p=getTimePeriod();

  const names={morning:'有风的地方·晨',afternoon:'有风的地方·暖',evening:'有风的地方·夕',night:'有风的地方·梦'};

}

      const pid=U.genId('p');

      showPhotoForm(pid,pp,tp,false);
    }catch(err){console.error(err);toast('上传失败: '+err.message,'err');}
    e.target.value='';
  });

  // Video input (with auto-compression)
  $('#video-input').addEventListener('change', async function(e) {
    const file=e.target.files[0];if(!file)return;
    if(!file.type.startsWith('video/')){toast('请选择视频文件','err');e.target.value='';return;}
    if(file.size>500*1024*1024){toast('视频不能超过500MB','err');e.target.value='';return;}

    let uploadBlob=null;
    const MAX_TARGET=30*1024*1024; // Target ~30MB, compress if larger
    const pid=U.genId('p');

    try{
      if(file.size<=MAX_TARGET){
        toast('正在上传视频...','');
        uploadBlob=await fetch(URL.createObjectURL(file)).then(r=>r.blob());
      }else{
        const sizeMB=(file.size/1048576).toFixed(0);
        toast('视频较大('+sizeMB+'MB)，正在压缩...','');
        uploadBlob=await compressVideo(file, 720, 2500000, MAX_TARGET);
        const newMB=(uploadBlob.size/1048576).toFixed(1);
        toast('已压缩至 '+newMB+'MB，正在上传...','');
      }
      const thumbDataUrl=await captureVideoThumb(file);
      const thumbBlob=await fetch(thumbDataUrl).then(r=>r.blob());
      const ext=uploadBlob.type.includes('mp4')?'mp4':'webm';
      const formDataV=new FormData();formDataV.append('file',uploadBlob,pid+'.'+ext);

    }catch(err){console.error(err);toast('上传失败: '+err.message,'err');}
    e.target.value='';
  });
}

// Video compression (Canvas + MediaRecorder)
async function compressVideo(file, maxHeight, bitrate, maxSize){
  const video=document.createElement('video');
  video.preload='metadata';video.muted=true;video.playsInline=true;
  return new Promise((ok,no)=>{
    video.onloadedmetadata=()=>{
      let w=video.videoWidth, h=video.videoHeight;
      const scale=Math.min(1, maxHeight/h);
      w=Math.round(w*scale);h=Math.round(h*scale);
      if(w%2)w--;if(h%2)h--;
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      const stream=canvas.captureStream(30);
      const chunks=[];
      let mime='video/webm;codecs=vp8';
      if(MediaRecorder.isTypeSupported('video/webm;codecs=vp9'))mime='video/webm;codecs=vp9';
      const recorder=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:bitrate});
      recorder.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
      recorder.onstop=()=>{
        const blob=new Blob(chunks,{type:mime});
        if(blob.size>maxSize){
          const ratio=maxSize/blob.size*0.8;
          const retry=document.createElement('video');
          retry.preload='metadata';retry.muted=true;retry.playsInline=true;
          retry.src=URL.createObjectURL(blob);
          retry.onloadedmetadata=()=>{
            const chunks2=[];
            const stream2=canvas.captureStream(30);
            const rec2=new MediaRecorder(stream2,{mimeType:mime,videoBitsPerSecond:Math.round(bitrate*ratio)});
            rec2.ondataavailable=e=>{if(e.data.size>0)chunks2.push(e.data);};
            rec2.onstop=()=>{const b2=new Blob(chunks2,{type:mime});ok(b2);URL.revokeObjectURL(retry.src);};
            rec2.start(1000);retry.currentTime=0;retry.play();
            (function draw2(){if(rec2.state==='recording'){ctx.drawImage(retry,0,0,w,h);requestAnimationFrame(draw2)}else{rec2.stop()}})();
          };
          retry.onerror=()=>ok(blob);
          return;
        }
        ok(blob);URL.revokeObjectURL(video.src);
      };
      recorder.onerror=()=>no(new Error('压缩失败'));
      recorder.start(1000);
      video.currentTime=0;video.play();
      (function drawFrame(){if(recorder.state==='recording'){ctx.drawImage(video,0,0,w,h);requestAnimationFrame(drawFrame)}else{recorder.stop()}})();
    };
    video.onerror=()=>no(new Error('无法读取视频'));
    video.src=URL.createObjectURL(file);
  });
}

// Direct upload helper
async function uploadFileDirect(path,formData){
  const res=await fetch(CFG.SUPABASE_URL+'/storage/v1/object/'+CFG.BUCKET+'/'+path,{
    method:'POST',
    headers:{'apikey':CFG.SUPABASE_KEY,'Authorization':'Bearer '+CFG.SUPABASE_KEY,'x-upsert':'true'},
    body:formData
  });
  if(!res.ok){const t=await res.text();throw new Error('上传失败('+res.status+'): '+t.slice(0,80));}
  return path;
}

// Capture video thumbnail at 1 second
function captureVideoThumb(file){
  return new Promise((ok,no)=>{
    const video=document.createElement('video');
    video.preload='metadata';video.muted=true;video.playsInline=true;
    video.onloadeddata=()=>{
      video.currentTime=Math.min(1,video.duration/3);
    };
    video.onseeked=()=>{
      const canvas=document.createElement('canvas');
      canvas.width=300;canvas.height=Math.round(300*(video.videoHeight/video.videoWidth));
      canvas.getContext('2d').drawImage(video,0,0,canvas.width,canvas.height);
      ok(canvas.toDataURL('image/jpeg',.7));
      URL.revokeObjectURL(video.src);
    };
    video.onerror=()=>{no(new Error('无法读取视频'));};
    video.src=URL.createObjectURL(file);
  });
}

function showLightbox(photos,p){
  let idx=photos.findIndex(x=>x.id===p.id);if(idx<0)idx=0;
  const ov=document.createElement('div');ov.className='lb';
  function ri(){
    const cur=photos[idx];
    const mediaHtml=cur.isVideo
      ? '<video class="lb-video" src="'+cur.dataUrl+'" controls playsinline autoplay style="max-width:100%;max-height:70vh;border-radius:6px;outline:none"></video>'
      : '<img src="'+cur.dataUrl+'" alt="'+U.esc(cur.title||'')+'">';
    ov.innerHTML='<button class="lb-close">✕</button>'+(idx>0?'<button class="lb-nav lb-prev">◀</button>':'')+(idx<photos.length-1?'<button class="lb-nav lb-next">▶</button>':'')+'<div class="lb-img">'+mediaHtml+'</div><div class="lb-cap"><div class="ltitle">'+(cur.isVideo?'🎬 ':'')+U.esc(cur.title||'无标题')+'</div>'+(cur.description?'<div class="lb-desc">'+U.esc(cur.description)+'</div>':'')+'<div class="ldate">'+U.fmtDate(cur.date)+(cur.time?' '+cur.time:'')+' · '+(idx+1)+'/'+photos.length+'</div></div><div class="lb-acts"><button id="lb-edit" title="编辑">✏️</button><button id="lb-fav" title="'+(cur.favorite?'取消收藏':'收藏')+'">'+(cur.favorite?'⭐':'☆')+'</button><button id="lb-del" title="删除">🗑️</button></div>';
    ov.querySelector('.lb-close').onclick=close;
    ov.querySelector('.lb-close').onclick=close;
    const pv=ov.querySelector('.lb-prev');if(pv)pv.onclick=()=>{idx--;ri();};
    const nx=ov.querySelector('.lb-next');if(nx)nx.onclick=()=>{idx++;ri();};
    ov.querySelector('#lb-edit').onclick=()=>{showEditMediaForm(cur,ri);};
    ov.querySelector('#lb-fav').onclick=async()=>{cur.favorite=!cur.favorite;await API.updatePhoto(cur.id,{favorite:cur.favorite});const photo=appData.photos.find(x=>x.id===cur.id);if(photo)photo.favorite=cur.favorite;ri();};
    ov.querySelector('#lb-del').onclick=()=>{confirm('确定删除这张照片吗？',async()=>{await API.deletePhoto(cur.id);toast('已删除','ok');close();reloadData().then(()=>renderPage());});};
  }
  function close(){ov.remove();document.removeEventListener('keydown',onKey);}
  function onKey(e){if(e.key==='Escape')close();if(e.key==='ArrowLeft'&&idx>0){idx--;ri();}if(e.key==='ArrowRight'&&idx<photos.length-1){idx++;ri();}}
  document.addEventListener('keydown',onKey);
  let tx=0;ov.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;});ov.addEventListener('touchend',e=>{const d=tx-e.changedTouches[0].clientX;if(Math.abs(d)>60){if(d>0&&idx<photos.length-1)idx++;else if(d<0&&idx>0)idx--;ri();}});
  ri();document.body.appendChild(ov);
}

function stile(icon,label,value,unit,ds){return'<div class="stat-tile"><div style="font-size:1.5rem;margin-bottom:4px">'+icon+'</div><div class="stat-val">'+(value!=='--'?value:'--')+'<span class="u">'+(value!=='--'?unit:'')+'</span></div><div class="stat-lbl">'+label+'</div>'+(ds?'<div class="stat-lbl" style="color:#81C784">'+ds+'</div>':'')+'</div>';}
function deltaS(c,p,u){if(c==null||p==null)return'';const d=c-p;return(d>=0?'+':'')+d.toFixed(1)+u+' 较上次';}

function buildWHO(records,birth,metric){
  const maxAge=Math.max(730,...records.map(r=>r.ageInDays)),p3=[],p50=[],p97=[];
  for(const row of WHO_GIRLS){const days=Math.round(row[0]*30.4375);if(days>maxAge+60)break;
    if(metric==='height'){p3.push({x:days,y:row[1]});p50.push({x:days,y:row[2]});p97.push({x:days,y:row[3]});}
    else{p3.push({x:days,y:row[4]});p50.push({x:days,y:row[5]});p97.push({x:days,y:row[6]});}
  }return{p3,p50,p97};
}

  {v:'乙肝疫苗①',days:0},{v:'卡介苗',days:0},{v:'乙肝疫苗②',days:30},{v:'脊灰疫苗①',days:60},
  {v:'百白破①',days:90},{v:'脊灰疫苗②',days:90},{v:'百白破②',days:120},{v:'脊灰疫苗③',days:120},
  {v:'乙肝疫苗③',days:180},{v:'百白破③',days:180},{v:'流脑A群①',days:180},{v:'麻腮风①',days:240},
  {v:'乙脑减毒①',days:240},{v:'流脑A群②',days:270},{v:'百白破④',days:540},{v:'麻腮风②',days:540},
  {v:'甲肝减毒',days:540},{v:'乙脑减毒②',days:720},{v:'脊灰疫苗④',days:1460}
];

  {v:'满月体检',days:30},{v:'2月龄体检',days:60},{v:'4月龄体检',days:120},{v:'6月龄体检',days:180},
  {v:'9月龄体检',days:270},{v:'12月龄体检',days:365},{v:'18月龄体检',days:540},{v:'24月龄体检',days:730},
  {v:'30月龄体检',days:900},{v:'36月龄体检',days:1095}
];

function renderHealthFiles(r){
  let html='';
  try{
    const paths=JSON.parse(r.filePath||'[]');
    const names=JSON.parse(r.fileName||'[]');
    paths.forEach((p,i)=>{html+='<div class="hr-file" onclick="window.open(\''+CFG.SUPABASE_URL+'/storage/v1/object/public/media/'+U.esc(p)+'\',\'_blank\')"><span class="hr-file-icon">📎</span> '+U.esc(names[i]||'附件'+(i+1))+'</div>';});
  }catch(e){
    // Legacy single file format
    html+='<div class="hr-file" onclick="window.open(\''+CFG.SUPABASE_URL+'/storage/v1/object/public/media/'+U.esc(r.filePath)+'\',\'_blank\')"><span class="hr-file-icon">📎</span> '+U.esc(r.fileName||'查看附件')+'</div>';
  }
  return html;
}
function renderHealth(){
  const records=appData.healthRecords||[];
  const birth=appData.settings.birthDate;
  const birthD=new Date(birth+'T00:00:00');
  const todayD=new Date();const elapsed=Math.floor((todayD-birthD)/86400000);

  // "AI" Analysis
  const completedSet=new Set(records.filter(r=>r.isCompleted).map(r=>r.title));
  const dueVaccines=VACCINE_SCHEDULE.filter(v=>v.days<=elapsed+30&&!completedSet.has(v.v));
  const overdueVaccines=VACCINE_SCHEDULE.filter(v=>v.days<=elapsed&&!completedSet.has(v.v));
  const dueCheckups=CHECKUP_SCHEDULE.filter(v=>v.days<=elapsed+60&&!completedSet.has(v.v));
  const todayVaccines=VACCINE_SCHEDULE.filter(v=>Math.abs(v.days-elapsed)<=3&&!completedSet.has(v.v));
  const completedCount=records.filter(r=>r.isCompleted).length;
  const vaccineDone=VACCINE_SCHEDULE.filter(v=>completedSet.has(v.v)).length;
  const vaccineTotal=VACCINE_SCHEDULE.length;

  let html='';

  // AI Analysis Box
  html+='<div class="health-ai"><h3>🤖 AI 智能分析</h3>';
  if(overdueVaccines.length>0){
    html+='<div class="health-ai-item"><span class="health-ai-warn">⚠️ '+overdueVaccines.length+'项疫苗已超期未接种：</span></div>';
    overdueVaccines.slice(0,4).forEach(v=>{html+='<div class="health-ai-item" style="margin-left:16px">· '+v.v+'（应于出生后'+v.days+'天内接种）</div>';});
  }
  if(todayVaccines.length>0){
    html+='<div class="health-ai-item"><span class="health-ai-warn">🔔 近期需接种：</span></div>';
    todayVaccines.forEach(v=>{html+='<div class="health-ai-item" style="margin-left:16px">· '+v.v+'</div>';});
  }
  const nextCheckup=CHECKUP_SCHEDULE.filter(v=>v.days>elapsed&&!completedSet.has(v.v)).slice(0,1);
  if(nextCheckup.length>0){
    html+='<div class="health-ai-item">📋 下次体检：'+nextCheckup[0].v+'（'+(nextCheckup[0].days-elapsed)+'天后）</div>';
  }
  html+='<div class="health-ai-item"><span class="health-ai-ok">✅ 已完成 '+vaccineDone+'/'+vaccineTotal+' 针疫苗，'+completedCount+' 项健康记录</span></div>';
  html+='<div class="health-ai-item" style="font-size:.8rem;color:#BCAAA4">注：建议仅供参考，请遵医嘱</div>';
  html+='</div>';

  // Summary cards
  html+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">';
  html+='<div class="stat-tile"><div style="font-size:1.3rem">💉</div><div class="stat-val">'+vaccineDone+'/'+vaccineTotal+'</div><div class="stat-lbl">疫苗接种</div></div>';
  html+='<div class="stat-tile"><div style="font-size:1.3rem">🏥</div><div class="stat-val">'+completedCount+'</div><div class="stat-lbl">健康记录</div></div>';
  html+='<div class="stat-tile" style="cursor:pointer" id="pending-tile"><div style="font-size:1.3rem">📅</div><div class="stat-val">'+(dueVaccines.length+dueCheckups.length)+'</div><div class="stat-lbl">近期待办</div></div>';
  html+='</div>';

  // Timeline
  const timeline=[];
  // Add completed records
  records.filter(r=>r.isCompleted).forEach(r=>{timeline.push({...r,_source:'record'});});
  // Add due vaccines not yet recorded
  dueVaccines.forEach(v=>{const exists=records.find(r=>r.isCompleted&&r.title===v.v);if(!exists)timeline.push({id:v.v,title:v.v,date:new Date(birthD.getTime()+v.days*86400000).toISOString().slice(0,10),ageDays:v.days,recordType:'vaccine',isCompleted:false,notes:'系统提醒：应于出生后'+v.days+'天接种',_source:'auto'});});
  // Add upcoming checkups
  dueCheckups.forEach(v=>{const exists=records.find(r=>r.isCompleted&&r.title===v.v);if(!exists)timeline.push({id:v.v,title:v.v,date:new Date(birthD.getTime()+v.days*86400000).toISOString().slice(0,10),ageDays:v.days,recordType:'checkup',isCompleted:false,notes:'系统提醒：建议体检',_source:'auto'});});
  timeline.sort((a,b)=>a.date.localeCompare(b.date));

  html+='<h3 style="font-size:14px;color:#BCAAA4;margin:20px 0 12px">📋 健康时间线</h3>';
  html+='<div class="health-tl">';
  let lastMonth='';
  timeline.forEach(r=>{
    const m=r.date.substring(0,7);
    if(m!==lastMonth){html+='<div style="font-size:.75rem;color:#BCAAA4;margin:12px 0 6px;font-weight:600">'+U.fmtMonth(r.date+'T00:00:00')+'</div>';lastMonth=m;}
    const isOverdue=!r.isCompleted&&r.date<U.today();
    const badgeLabel={vaccine:'疫苗',checkup:'体检',illness:'生病',medication:'用药'};
    html+='<div class="hr-card'+(r.isCompleted?' done':'')+(isOverdue?' overdue':'')+'">'+
      '<div class="hr-top"><span class="hr-badge '+(r.recordType||'checkup')+'">'+((badgeLabel[r.recordType]||'其他')+(r._source==='auto'&&!r.isCompleted?'·待办':''))+'</span>'+
      (isOverdue?'<span style="font-size:.65rem;color:#EF9A9A;font-weight:600">已超期</span>':'')+
      '<span class="hr-date">'+U.fmtDate(r.date)+' · '+(r.ageDays||0)+'天</span></div>'+
      '<div class="hr-title">'+U.esc(r.title)+'</div>'+
      (r.notes?'<div class="hr-notes">'+U.esc(r.notes)+'</div>':'')+
      (r.filePath?renderHealthFiles(r):'')+
      (r._source==='record'?'<div class="hr-actions">'+
        '<button class="btn btn-s btn-sm btn-hr-del" data-id="'+r.id+'">删除</button></div>':
        (r._source==='auto'?'<div class="hr-actions">'+
          '<button class="btn btn-p btn-sm btn-hr-done" data-v="'+U.esc(r.title)+'" data-days="'+r.ageDays+'" data-type="'+r.recordType+'">标记完成</button></div>':''));
    html+='</div>';
  });
  html+='</div>';

  // Add custom record button  
  html+='<div class="hr-add" id="hr-add"><div class="hr-add-icon">+ 添加记录</div><div class="hr-add-text">疫苗、体检、生病、用药</div></div>';

  $('#page-health').innerHTML=html;

  // Bind events
  $('#hr-add')?.addEventListener('click',showHealthForm);
  $('#pending-tile')?.addEventListener('click',()=>showPendingList(dueVaccines,dueCheckups,records));
  $$('.btn-hr-del').forEach(b=>{b.addEventListener('click',e=>{e.stopPropagation();confirm('确定删除？',async()=>{await API.deleteHealth(b.dataset.id);toast('已删除','ok');reloadData().then(()=>renderPage());});});});
  $$('.btn-hr-done').forEach(b=>{b.addEventListener('click',async e=>{e.stopPropagation();
    const h={id:U.genId('h'),recordType:b.dataset.type||'vaccine',title:b.dataset.v,date:U.today(),ageDays:parseInt(b.dataset.days)||0,notes:'',isCompleted:true};
    await API.addHealth(h);toast('已记录','ok');celebrate();reloadData().then(()=>renderPage());
  });});
}

function showPendingList(dueVaccines,dueCheckups,records){
  const birth=appData.settings.birthDate;
  const birthD=new Date(birth+'T00:00:00');
  const now=new Date(),elapsed=Math.floor((now-birthD)/86400000);
  let html='';
  if(dueVaccines.length>0){
    html+='<h3 style="font-size:.9rem;color:#FF8C69;margin-bottom:8px">💉 近期需接种疫苗 ('+dueVaccines.length+'项)</h3>';
    dueVaccines.slice(0,8).forEach(v=>{
      const dl=v.days-elapsed;
      const targetDate=new Date(birthD.getTime()+v.days*86400000).toISOString().slice(0,10);
      html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #F0E8E0"><div><span style="font-size:.9rem">'+v.v+'</span><span style="font-size:.7rem;color:#BCAAA4;margin-left:8px">建议'+v.days+'天</span></div><span style="font-size:.8rem;font-weight:500;color:'+(dl<=0?'#EF9A9A':'#FF8C69')+'">'+(dl<=0?'已超期'+(Math.abs(dl))+'天':dl+'天后')+'</span></div>';
    });
  }
  if(dueCheckups.length>0){
    html+='<h3 style="font-size:.9rem;color:#81C784;margin:16px 0 8px">🏥 近期建议体检 ('+dueCheckups.length+'项)</h3>';
    dueCheckups.slice(0,8).forEach(v=>{
      const dl=v.days-elapsed;
      html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #F0E8E0"><div><span style="font-size:.9rem">'+v.v+'</span><span style="font-size:.7rem;color:#BCAAA4;margin-left:8px">建议'+v.days+'天</span></div><span style="font-size:.8rem;font-weight:500;color:'+(dl<=0?'#EF9A9A':'#8D6E63')+'">'+(dl<=0?'已超期'+(Math.abs(dl))+'天':dl+'天后')+'</span></div>';
    });
  }
  if(dueVaccines.length===0&&dueCheckups.length===0){
    html='<div style="text-align:center;padding:24px;color:#81C784">✅ 暂无待办，很棒！</div>';
  }
  html+='<div style="font-size:.7rem;color:#BCAAA4;margin-top:12px;text-align:center">注：建议仅供参考，请遵医嘱</div>';
  showModal('📅 近期待办',html,()=>true);
}
function showHealthForm(){
  const today=U.today();
  const html='<div class="fg"><label class="fl">类型</label><select class="fi" id="hr-type"><option value="vaccine">💉 疫苗接种</option><option value="checkup">🏥 体检</option><option value="illness">🤒 生病</option><option value="medication">💊 用药</option></select></div>'+
    '<div class="fg"><label class="fl">标题</label><input type="text" class="fi" id="hr-title" placeholder="例如：五联疫苗第一针"></div>'+
    '<div class="fg"><label class="fl">日期</label><input type="date" class="fi" id="hr-date" value="'+today+'"></div>'+
    '<div class="fg"><label class="fl">备注</label><textarea class="ft" id="hr-notes" rows="2" placeholder="医生建议、反应等..."></textarea></div>'+
    '<div class="fg"><label class="fl">上传附件（可多选，PDF/图片/文档等）</label><input type="file" class="hr-file-input" id="hr-file-upload" accept="*" multiple><button type="button" class="btn btn-s btn-sm" id="hr-file-btn">选择文件</button> <span style="font-size:.75rem;color:#BCAAA4" id="hr-file-name">未选择文件</span></div>';
  let healthFiles=[];
  showModal('添加健康记录',html,async()=>{
    const type=$('#hr-type').value,title=$('#hr-title').value.trim(),date=$('#hr-date').value,notes=$('#hr-notes').value.trim();
    if(!title){toast('请输入标题','err');return false;}
    if(!date){toast('请选择日期','err');return false;}
    const birth=appData.settings.birthDate,ageDays=U.age(birth,date).totalDays;
    const hid=U.genId('h');
    let filePath='',fileName='';
    // Upload multiple files
    if(healthFiles.length>0){
      toast('正在上传'+healthFiles.length+'个文件...','');
      const uploads=healthFiles.map((f,i)=>{
        const ext=(f.name.split('.').pop()||'pdf').replace(/[^a-z0-9]/gi,'');
        const safeName=hid+'_'+i+'.'+ext;
        const fd=new FormData();fd.append('file',f,safeName);
        return uploadFileDirect('health/'+safeName,fd).then(p=>({path:p,name:f.name}));
      });
      try{
        const results=await Promise.all(uploads);
        filePath=JSON.stringify(results.map(r=>r.path));
        fileName=JSON.stringify(results.map(r=>r.name));
      }catch(e){toast('附件上传失败: '+e.message,'err');return false;}
    }
    try{await API.addHealth({id:hid,recordType:type,title,date,ageDays,notes,isCompleted:true,filePath,fileName});toast('已添加','ok');celebrate();return true;}
    catch(e){toast('保存失败: '+e.message,'err');return false;}
  },()=>{
    // On modal open, bind file input
    $('#hr-file-btn').addEventListener('click',()=>{$('#hr-file-upload').click();});
    $('#hr-file-upload').addEventListener('change',function(){
      if(this.files.length>0){healthFiles=Array.from(this.files);$('#hr-file-name').textContent='已选 '+healthFiles.length+' 个文件 ('+(healthFiles.reduce((s,f)=>s+f.size,0)/1024).toFixed(0)+'KB)';}
    });
  });
}

      {title:'新生儿睡眠安全法则',video:'新生儿安全睡眠姿势',body:'<p><strong>ABC法则：</strong>Alone（单独睡婴儿床）· Back（仰卧）· Crib（在安全的婴儿床内）。这是国际公认降低婴儿猝死综合征（SIDS）风险的核心措施。</p><p><strong>不要：</strong>与大人同床睡、使用枕头、放置毛绒玩具、盖厚被子、穿过多衣服（体温过高是SIDS风险因素）。</p><p><strong>襁褓法：</strong>上肢适度包裹给安全感，下肢保持自由活动空间。满月后逐步戒除襁褓。</p>',tags:['睡眠','安全']},
      {title:'脐部护理与洗澡技巧',video:'新生儿洗澡脐部护理',body:'<p><strong>脐部护理四步骤：</strong>①洗净双手 ②用75%酒精棉签从脐根部向外螺旋擦拭 ③保持干燥，尿布反折露出脐部 ④每天1-2次至脱落（通常7-14天）。</p><p><strong>警惕脐炎信号：</strong>脐周红肿、渗液、有臭味、触碰时宝宝哭闹——立即就医。</p><p><strong>洗澡要点：</strong>室温26-28°C，水温38-40°C（用手肘试温），时间不超过10分钟。先洗脸→洗头→洗身体，脐带未脱落前只擦浴。</p>',tags:['护理','洗澡']},
      {title:'维生素D与营养补充',video:'婴儿维生素D补充',body:'<p><strong>维生素D：</strong>出生后2周开始补充，每天400IU，持续至2岁。母乳中维生素D含量极低，必须额外补充。</p><p><strong>不需要常规补钙：</strong>母乳和配方奶已含足够钙质，乱补钙反而增加肾脏负担。</p><p><strong>维生素K1：</strong>出生时肌肉注射一次，预防新生儿出血症。这是国际标准流程。</p>',tags:['营养','补充剂']},
    ]

    knowledge: [
      {title:'二月龄宝宝的发育里程碑',video:'2个月宝宝发育训练',body:'<p><strong>这个月最关键的变化：</strong>宝宝从只会吃睡的新生儿，开始变成一个会互动的小人儿。出现社会性微笑、能抬头45度、眼睛追视物体。</p><p><strong>俯卧练习：</strong>每天累计不少于30分钟（分多次）。在宝宝清醒时进行，用黑白卡或摇铃在前方引导抬头。俯卧不仅锻炼颈部和背部肌肉，还能预防扁头综合征。</p><p><strong>肠绞痛应对：</strong>约20%的宝宝在2-4周开始出现肠绞痛（每天哭闹3小时以上、每周3天以上）。飞机抱、白噪音、顺时针腹部按摩可缓解。这不是病，通常在3-4月龄自然消失。</p>',tags:['发育','肠绞痛']},
      {title:'建立昼夜节律的方法',video:'婴儿昼夜节律建立方法',body:'<p><strong>白天：</strong>保持光线明亮、正常生活噪音、每次小睡不超过3小时。喂奶时多互动、多说话。</p><p><strong>夜晚：</strong>调暗灯光、减少刺激、喂奶时保持安静、不逗玩。建立固定的睡前程序：洗澡→按摩→穿睡袋→喂奶→轻声哼歌→放入婴儿床。</p><p><strong>不必刻意睡眠训练：</strong>2个月的宝宝还不具备自主入睡能力，按需响应不会惯坏宝宝，反而建立安全依恋。</p>',tags:['睡眠','作息']},
      {title:'疫苗接种须知（满月-2月）',video:'婴儿疫苗接种流程',body:'<p><strong>满月后接种乙肝疫苗第2针。</strong>如果出生时因低体重或其他原因未接种卡介苗，此阶段需补种。</p><p><strong>接种前：</strong>确保宝宝健康、无发热。接种当天穿宽松易脱的衣服。</p><p><strong>接种后：</strong>留院观察30分钟。可能出现低热（低于38.5°C）、局部红肿，通常1-2天消退。多喂奶、多安抚。如高热不退或异常哭闹需就医。</p>',tags:['疫苗','健康']},
      {title:'读懂宝宝的哭声',video:'宝宝哭声怎么分辨',body:'<p><strong>饥饿哭：</strong>短促、有节奏、伴随咂嘴或转头寻找（觅食反射）。</p><p><strong>困倦哭：</strong>揉眼睛、打哈欠、哭声逐渐变强。</p><p><strong>不适哭：</strong>尖锐、突然爆发——可能是尿布湿了、太热/太冷、衣服标签摩擦皮肤。</p><p><strong>肠绞痛哭：</strong>每天固定时间（通常是傍晚）、声嘶力竭、双腿蜷缩、放屁或排便后缓解。</p><p><strong>应对原则：</strong>先检查生理需求（饿？湿？热？），再安抚（抱、摇、白噪音），最后考虑不适（胀气？生病？）。</p>',tags:['护理','沟通']},
    ]

    ],knowledge:[{title:'睡眠倒退期应对指南',video:'4个月睡眠倒退怎么办',body:'<p><strong>4月龄睡眠倒退</strong>是正常的生理现象：宝宝的睡眠模式从婴儿型向成人型转变。</p><p><strong>应对：</strong>①保持一致的睡前程序 ②在宝宝困但还醒着时放下 ③不要一醒就立刻抱起 ④白天确保足够活动量。</p><p>这个阶段通常持续2-6周，全家人保持一致的应对方式最重要。</p>',tags:['睡眠','核心']},{title:'感统游戏指南',video:'婴儿感统训练游戏',body:'<p><strong>视觉：</strong>引入彩色卡片和绘本。<strong>听觉：</strong>不同材质摇铃感受不同音色。<strong>触觉：</strong>布书、硅胶牙胶、毛绒球。<strong>前庭觉：</strong>抱着宝宝缓慢摇摆。</p>',tags:['感统','游戏']}]

    ],knowledge:[{title:'辅食添加完全指南',video:'辅食添加步骤高铁米粉',body:'<p><strong>何时开始？</strong>满6月龄（180天），同时满足：①能靠坐、头部稳定 ②对食物表现出兴趣 ③挺舌反射消失。</p><p><strong>第一口辅食：</strong>高铁米粉。从1勺开始，由稀到稠。<strong>每次只添加一种新食物，观察3-5天。</strong></p><p><strong>绝对不能吃的（1岁前）：</strong>蜂蜜、整颗坚果、整颗葡萄、爆米花、生鸡蛋。</p>',tags:['辅食','核心知识']},{title:'辅食制作与储存',video:'辅食制作储存冰格',body:'<p><strong>制作原则：</strong>现做现吃、不加盐糖调味料。胡萝卜蒸熟打泥，绿叶菜焯水打泥。<strong>储存：</strong>硅胶冰格冷冻，每次取一块。冷藏不超过24小时，冷冻不超过1个月。</p>',tags:['辅食','安全']}]

    ],knowledge:[{title:'爬行的重要性',video:'宝宝爬行训练方法',body:'<p><strong>爬行不仅仅是移动方式</strong>——它是大脑双侧协调、空间感知、深度知觉发展的关键。研究显示，充分爬行的宝宝在日后的阅读、书写和运动协调方面表现更好。</p><p>每天累计爬行时间不少于1小时。不要用学步车替代爬行。</p>',tags:['大运动','核心']},{title:'手指食物与噎食急救',video:'婴儿海姆立克急救法',body:'<p><strong>适宜的手指食物：</strong>软胡萝卜条、熟透的香蕉块、小溶豆。<strong>噎食急救（海姆立克法）：</strong>宝宝面朝下放在前臂，头低于躯干，手掌根部在肩胛骨间用力拍击5次。</p>',tags:['喂养','安全']},{title:'语言发展黄金期',video:'宝宝语言发育促进方法',body:'<p><strong>6-9月龄</strong>是语言理解能力爆发期。如何促进：①多说话、多描述 ②回应发音进行对话 ③指物命名 ④每天亲子阅读15分钟 ⑤零屏幕时间。</p>',tags:['语言','早期发展']}]

function renderParenting(){
  const birth=appData.settings.birthDate;
  const birthD=new Date(birth+'T00:00:00');
  const todayD=new Date();
  const elapsed=Math.floor((todayD-birthD)/86400000);
  const currentMonth=Math.floor(elapsed/30.4375);

  const checks=appData.parentingChecks||[];
  const checkMap=new Map();
  checks.forEach(c=>checkMap.set(c.stage_key+'_'+c.item_key, true));

  // Determine which stage is "current" based on age
  let activeStage=null, currentStageIdx=0;
  for(let i=PARENTING_STAGES.length-1;i>=0;i--){
    if(PARENTING_STAGES[i].months<=currentMonth+1){currentStageIdx=i;break;}
  }
  activeStage=PARENTING_STAGES[currentStageIdx];

  let html='';

  // Progress bar
  let totalItems=0,completedItems=0;
  PARENTING_STAGES.forEach(s=>{s.items.forEach(cat=>{totalItems+=cat.items.length;});});
  completedItems=checkMap.size;
  const pct=totalItems>0?Math.round(completedItems/totalItems*100):0;

  html+='<div class="pg-progress"><h3 style="font-size:1rem;font-weight:600">📚 育儿宝典</h3><p style="font-size:.8rem;color:#8D6E63;margin-top:4px">小桃酥当前月龄：'+currentMonth+'个月 · 已完成 '+completedItems+'/'+totalItems+' 项（'+pct+'%）</p><div class="pg-progress-bar"><div class="pg-progress-fill" style="width:'+pct+'%"></div></div><p style="font-size:.7rem;color:#BCAAA4;margin-top:6px">基于浙江省科学育儿指导服务手册 + WHO/中国卫健委权威指南</p></div>';

  // Render stages from current backwards
  const visibleStages=[];
  for(let i=PARENTING_STAGES.length-1;i>=0;i--){
    if(i<=currentStageIdx+1||(i<=currentStageIdx+3&&checkMap.size>0)){
      visibleStages.push({...PARENTING_STAGES[i], _isActive:i===currentStageIdx, _isUpcoming:i>currentStageIdx, _isExpanded:i===currentStageIdx||(i===currentStageIdx+1&&i>0)});
    }
  }

  visibleStages.forEach(s=>{
    let stageDone=0,stageTotal=0;
    s.items.forEach(cat=>{cat.items.forEach(it=>{stageTotal++;if(checkMap.has(s.key+'_'+it.key))stageDone++;});});
    const stagePct=stageTotal>0?Math.round(stageDone/stageTotal*100):0;

    html+='<div class="pg-stage-card'+(s._isActive?' active':'')+'" data-stage="'+s.key+'">';
    html+='<div class="pg-stage-header" onclick="this.parentElement.classList.toggle(\'expanded\')">';
    html+='<div><div class="pg-stage-title">'+s.icon+' '+s.title+'</div><div class="pg-stage-age">'+s.ageRange+(s._isActive?' · 当前阶段':'')+'</div></div>';
    html+='<div style="text-align:right"><span class="pg-stage-badge '+(stagePct>=80?'done':s._isActive?'current':'upcoming')+'">'+stageDone+'/'+stageTotal+'</span></div>';
    html+='</div>';

    html+='<div class="pg-stage-content" style="display:'+(s._isExpanded?'block':'none')+'">';
    // Knowledge articles
    if(s.knowledge && s.knowledge.length>0){
      html+='<div class="pg-knowledge" style="margin-top:0">';
      html+='<div class="pg-kn-header" data-toggle="kn"><span style="font-size:.9rem">📖</span> <span class="pg-kn-title">宝典知识（点击展开）</span></div>';
      html+='<div class="pg-kn-body" style="display:none">';
      s.knowledge.forEach(k=>{
        html+='<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #F5F3F0">';
        html+='<div style="font-weight:600;font-size:.9rem;margin-bottom:4px;color:#4E342E">'+U.esc(k.title)+'</div>';
        html+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">';
        if(k.video)html+='<a href="https://search.bilibili.com/all?keyword='+encodeURIComponent(k.video)+'" target="_blank" style="display:inline-flex;align-items:center;gap:3px;font-size:.75rem;color:#00A1D6;text-decoration:none;background:#E8F4FD;padding:3px 8px;border-radius:6px">🎬 B站视频教程</a>';
        if(k.video)html+='<a href="https://www.youtube.com/results?search_query='+encodeURIComponent(k.video)+'" target="_blank" style="display:inline-flex;align-items:center;gap:3px;font-size:.75rem;color:#FF0000;text-decoration:none;background:#FFEBEE;padding:3px 8px;border-radius:6px">▶️ YouTube</a>';
        html+='</div>';
        html+=k.body;
        if(k.tags)html+='<div>'+(k.tags||[]).map(t=>'<span class="pg-kn-tag">'+U.esc(t)+'</span>').join('')+'</div>';
        html+='</div>';
      });
      html+='</div></div>';
    }
    s.items.forEach(cat=>{
      let catDone=0,catTotal=cat.items.length;
      cat.items.forEach(it=>{if(checkMap.has(s.key+'_'+it.key))catDone++;});
      html+='<div class="pg-cat"><div class="pg-cat-title">'+cat.cat+' ('+catDone+'/'+catTotal+')</div>';
      cat.items.forEach(it=>{
        const done=checkMap.has(s.key+'_'+it.key);
        html+='<div class="pg-item" onclick="toggleParentingCheck(\''+s.key+'\',\''+it.key+'\')"><div class="pg-check'+(done?' done':'')+'">'+(done?'✓':'')+'</div><div><div class="pg-item-text">'+it.text+'</div>'+(it.tip?'<div class="pg-item-tip">💡 '+it.tip+'</div>':'')+'</div></div>';
      });
      html+='</div>';
    });
    html+='</div></div>';
  });

  $('#page-parenting').innerHTML=html;
  // Bind knowledge toggle clicks
  setTimeout(()=>{
    $$('#page-parenting .pg-kn-header').forEach(hdr=>{
      hdr.addEventListener('click',function(){
        var body=this.parentElement.querySelector('.pg-kn-body');
        if(body)body.style.display=body.style.display==='none'?'block':'none';
        this.classList.toggle('open');
      });
    });
  },50);
}

async function toggleParentingCheck(stageKey,itemKey){
  const checks=appData.parentingChecks||[];
  const cid=stageKey+'_'+itemKey;
  const existing=checks.find(c=>c.stage_key+'_'+c.item_key===cid);
  const nowCompleted=!existing;
  try{
    await API.saveParentingCheck(stageKey,itemKey,nowCompleted);
    if(nowCompleted){
      appData.parentingChecks.push({stage_key:stageKey,item_key:itemKey,completed:true});
    }else{
      appData.parentingChecks=appData.parentingChecks.filter(c=>(c.stage_key+'_'+c.item_key)!==cid);
    }
    toast(nowCompleted?'已标记完成 ✓':'已取消标记','ok');
    if(nowCompleted)celebrate();
    renderParenting();
  }catch(e){toast('操作失败: '+e.message,'err');}
}

var recognition=null;
function initDiaryVoice(){
  var btn=$('#dy-voice'); if(!btn)return;
  if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)){
    btn.style.display='none'; return;
  }
  btn.addEventListener('click',function(){
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(recognition&&recognition.abort){recognition.abort();}
    recognition=new SR();
    recognition.lang='zh-CN';
    recognition.interimResults=true;
    recognition.continuous=true;
    recognition.maxAlternatives=1;
    var textarea=$('#dy-content'), hint=$('#dy-hint');
    textarea.placeholder='正在聆听...';
    btn.style.background='#FF8C69';btn.style.color='#fff';
    hint.textContent='🎙️ 正在聆听，请说话...';
    recognition.onresult=function(e){
      var transcript='';
      for(var i=e.resultIndex;i<e.results.length;i++){
        transcript+=e.results[i][0].transcript;
      }
      // Append to existing text
      var prev=textarea.value;
      textarea.value=prev+(prev?'\n':'')+transcript;
      textarea.scrollTop=textarea.scrollHeight;
    };
    recognition.onerror=function(e){
      hint.textContent='语音输入出错: '+e.error;
      stopVoice();
    };
    recognition.onend=function(){
      stopVoice();
      hint.textContent='✅ 语音输入完成';
      setTimeout(function(){hint.textContent='';},2000);
    };
    recognition.start();
  });
}
function stopVoice(){
  var btn=$('#dy-voice');
  if(btn){btn.style.background='';btn.style.color='';}
  $('#dy-content').placeholder='今天发生了什么...';
  if(recognition){try{recognition.stop();}catch(e){}}
}

const DS_API='https://api.deepseek.com/chat/completions';

function getDSKey(){
  // Try localStorage first, then app config
  var k=localStorage.getItem('xts_ds_key');
  if(k)return k;
  if(appData&&appData.settings&&appData.settings.dsApiKey)return appData.settings.dsApiKey;
  return '';
}
function setDSKey(k){localStorage.setItem('xts_ds_key',k);}

async function callDeepSeek(prompt,systemPrompt){
  var key=getDSKey();
  if(!key)throw new Error('NO_KEY');
  var res=await fetch(DS_API,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({
      model:'deepseek-chat',
      messages:[
        {role:'system',content:systemPrompt||'你是一个温暖的育儿助手，帮助父母记录宝宝的成长日记。用温馨、细腻的中文写作。'},
        {role:'user',content:prompt}
      ],
      temperature:0.8,max_tokens:1500,stream:false
    })
  });
  if(!res.ok){
    var err=await res.text();
    if(res.status===401)throw new Error('API密钥无效，请检查后重试');
    if(res.status===402)throw new Error('API余额不足');
    throw new Error('AI请求失败('+res.status+'): '+err.slice(0,100));
  }
  var data=await res.json();
  return data.choices[0].message.content;
}

    );

    if(e.message==='NO_KEY'){
      // Fallback to local polish
      textarea.value=localPolish(raw);
      textarea.scrollTop=textarea.scrollHeight;
      hint.textContent='💡 已用离线润色，配置API密钥效果更好';

      setTimeout(function(){
        if(confirm('想要更好的AI润色效果吗？\n\nDeepSeek提供免费API额度，注册即送500万tokens。\n\n点击确定去获取API密钥')){window.open('https://platform.deepseek.com/api_keys','_blank');}
      },1000);
    }else{
      textarea.value=localPolish(raw);
      textarea.scrollTop=textarea.scrollHeight;
      hint.textContent='AI请求失败，已用离线润色: '+e.message.slice(0,50);
    }
  }
  setTimeout(function(){hint.textContent='';},3000);
  btn.textContent='✨';btn.disabled=false;
}

async function generateDiaryInsights(){
  try{
    if(!getDSKey())return null;
    var entries=appData.diaryEntries||[];
    if(entries.length<3)return null;

    // Get last 10 entries, build summary
    var recent=entries.sort(function(a,b){return b.date.localeCompare(a.date);}).slice(0,10);

// Offline fallback polish (used when no API key configured)
function localPolish(text){
  var result=text;
  result=result.replace(/开心|高兴|快乐/g,function(m){return m+'😊';});
  result=result.replace(/哭|伤心|难过/g,function(m){return m+'😢';});
  result=result.replace(/可爱|萌|乖/g,function(m){return m+'💕';});
  result=result.replace(/第一次|首次/g,function(m){return '✨'+m;});
  result=result.replace(/([。！？])\s*/g,'$1\n');
  if(!result.match(/^(今天|昨天|早上|下午|晚上|刚刚)/)){
    var h=new Date().getHours();
    result=(h<12?'早上':h<18?'下午':'晚上')+'，'+result;
  }
  return result.replace(/\n{3,}/g,'\n\n').trim();
}

//  COUNTDOWN HELPERS
// ============================================================
function getUpcomingMilestones(birthDate) {
  const birth = new Date(birthDate + 'T00:00:00');
  const today = new Date();
  const elapsed = Math.floor((today - birth) / 86400000);

  // Define key milestones: [days, emoji, label]
  const keyDays = [
    { days: 30,   emoji: '🌕', label: '满月' },
    { days: 42,   emoji: '🍼', label: '产后复查' },
    { days: 100,  emoji: '🎂', label: '百天' },
    { days: 183,  emoji: '👶', label: '半岁' },
    { days: 365,  emoji: '🎈', label: '周岁' },
    { days: 730,  emoji: '🌟', label: '两岁' },
    { days: 1095, emoji: '🎓', label: '三岁' },
  ];

  // Filter to future milestones, sorted nearest first
  const upcoming = keyDays
    .filter(m => m.days > elapsed)
    .map(m => ({ ...m, daysLeft: m.days - elapsed }));

  // Also check if today IS a milestone
  const todayMatch = keyDays.find(m => m.days === elapsed);
  if (todayMatch) {
    return [{ ...todayMatch, daysLeft: 0, label: todayMatch.label + '就是今天！' }];
  }

  return upcoming;
}

// ---- Chart.js dynamic loader ----
let _chartJSLoaded=false,_chartJSLoading=false;
function loadChartJS(){
  if(_chartJSLoaded)return Promise.resolve();
  if(_chartJSLoading)return new Promise((ok)=>{const t=setInterval(()=>{if(_chartJSLoaded){clearInterval(t);ok();}},100);});
  _chartJSLoading=true;
  return new Promise((ok,no)=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js';
    s.onload=()=>{_chartJSLoaded=true;_chartJSLoading=false;ok();};
    s.onerror=()=>{_chartJSLoading=false;no(new Error('Chart.js load failed'));};
    document.head.appendChild(s);
  });
}
