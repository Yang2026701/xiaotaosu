function renderDaily(){
  try{
  var logs=appData.dailyLogs||[],today=U.today(),feeds=0,formulaFeeds=0,formulaTotal=0,breastFeeds=0,breastTotal=0,breastVolTotal=0,sleeps=0,diapers=0;
  var todayItems=[];
  for(var i=0;i<logs.length;i++){
    var l=logs[i];
    if(l.date!==today)continue;
    todayItems.push(l);
    if(l.logType=='feed'){feeds++;
      if(l.valueText&&l.valueText.indexOf('母乳')===0){breastFeeds++;breastTotal+=(l.valueNum||0);var bv=l.valueText.split('|')[1];if(bv)breastVolTotal+=parseFloat(bv);}
      else{formulaFeeds++;formulaTotal+=(l.valueNum||0);}
    }
    else if(l.logType=='sleep')sleeps++;
    else if(l.logType=='diaper')diapers++;
  }
  var feedSummary='';
  var breastPart=breastFeeds>0?'🤱 '+breastFeeds+'次 '+breastTotal+'分钟'+(breastVolTotal>0?' '+breastVolTotal+'ml':''):'';
  var formulaPart=formulaFeeds>0?'🍼 '+formulaFeeds+'次 '+formulaTotal+'ml':'';
  if(formulaPart&&breastPart)feedSummary=formulaPart+' · '+breastPart;
  else if(breastPart)feedSummary=breastPart;
  else feedSummary=formulaPart||'暂无';
  var h='<div class="dl-grid">'+
    '<button class="dl-btn dl-bf" id="dk-feed"><span class="dl-btn-icon">🍼</span>喂奶</button>'+
    '<button class="dl-btn dl-sl" id="dk-sleep"><span class="dl-btn-icon">😴</span>睡眠</button>'+
    '<button class="dl-btn dl-dp" id="dk-diaper"><span class="dl-btn-icon">💩</span>换尿布</button>'+
    '<button class="dl-btn dl-other" id="dk-other"><span class="dl-btn-icon">📝</span>其他</button></div>'+
    '<div class="dl-today"><h3>📊 今日小结 ('+U.fmtDate(today)+')</h3>'+
    '<div class="dl-stat">'+
    '<div class="dl-stat-item"><div class="dl-stat-num">'+feeds+'次</div><div class="dl-stat-lbl">🍼 喂奶</div><div style="font-size:.7rem;color:#FF8C69">'+feedSummary+'</div></div>'+
    '<div class="dl-stat-item"><div class="dl-stat-num">'+sleeps+'次</div><div class="dl-stat-lbl">😴 睡眠</div></div>'+
    '<div class="dl-stat-item"><div class="dl-stat-num">'+diapers+'次</div><div class="dl-stat-lbl">💩 换尿布</div></div>'+
    '</div></div>';
  if(todayItems.length===0)h+='<div class="empty-state" style="padding:24px 0"><div class="empty-icon">📋</div><div class="empty-title">今天还没有记录</div><div class="empty-desc">点击上方按钮快速记录</div></div>';
  else{var tl={feed:'🍼',sleep:'😴',diaper:'💩',other:'📝'};h+='<div style="font-size:.85rem;color:#BCAAA4;margin-bottom:8px">今天记录</div>';for(var i=0;i<todayItems.length;i++){var l=todayItems[i],d='';if(l.logType=='feed'){if(l.valueText&&l.valueText.indexOf('母乳')===0){d='🤱 '+(l.valueNum?l.valueNum+'分钟 ':'');var bv2=l.valueText.split('|')[1];if(bv2)d+=bv2+'ml ';}else{d='🍼 '+(l.valueNum?l.valueNum+'ml ':'');}}else d=l.valueText||l.notes||'';h+='<div class="dl-item"><span class="dl-item-icon">'+(tl[l.logType]||'📝')+'</span><span class="dl-item-info">'+U.esc(d||'—')+'</span><span class="dl-item-time">'+(l.time?l.time.substring(0,5):'')+'</span><span class="dl-item-del" onclick="window._dodl(\''+l.id+'\')">×</span></div>';}}
  $('#page-daily').innerHTML=h;
  setTimeout(function(){
    var b=document.getElementById('dk-feed');if(b)b.onclick=function(){showDailyForm('feed');};
    b=document.getElementById('dk-sleep');if(b)b.onclick=function(){showDailyForm('sleep');};
    b=document.getElementById('dk-diaper');if(b)b.onclick=function(){showDailyForm('diaper');};
    b=document.getElementById('dk-other');if(b)b.onclick=function(){showDailyForm('other');};
  },100);
  }catch(e){$('#page-daily').innerHTML='<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">出错</div><div class="empty-desc">'+e.message+'</div></div>';}
}

function showDailyForm(type){
  var t=U.today(),ts=('0'+new Date().getHours()).slice(-2)+':'+('0'+new Date().getMinutes()).slice(-2);
  var labels={feed:'🍼 喂奶',sleep:'😴 睡眠',diaper:'💩 换尿布',other:'📝 其他'};
  var html='<div class="fg"><label class="fl">日期</label><input type="date" class="fi" id="dl-date" value="'+t+'"></div><div class="fg"><label class="fl">时间</label><input type="time" class="fi" id="dl-time" value="'+ts+'"></div>';
  if(type=='feed'){
    html+='<div class="fg"><label class="fl">喂养方式</label><div class="chips" id="feed-type-chips"><button class="chip on" data-ft="formula">🍼 配方奶</button><button class="chip" data-ft="breast">🤱 母乳</button></div></div>';
    html+='<div id="feed-formula"><div class="fg"><label class="fl">奶量(ml)</label><input type="number" class="fi" id="dl-val" placeholder="80"></div><div class="dl-quick"><span class="dl-chip" onclick="document.getElementById(\'dl-val\').value=60">60ml</span><span class="dl-chip" onclick="document.getElementById(\'dl-val\').value=90">90ml</span><span class="dl-chip" onclick="document.getElementById(\'dl-val\').value=120">120ml</span><span class="dl-chip" onclick="document.getElementById(\'dl-val\').value=150">150ml</span></div></div>';
    html+='<div id="feed-breast" style="display:none"><div class="fg"><label class="fl">时长(分钟)</label><input type="number" class="fi" id="dl-bmin" placeholder="15"></div><div class="dl-quick"><span class="dl-chip" onclick="document.getElementById(\'dl-bmin\').value=10">10分钟</span><span class="dl-chip" onclick="document.getElementById(\'dl-bmin\').value=15">15分钟</span><span class="dl-chip" onclick="document.getElementById(\'dl-bmin\').value=20">20分钟</span><span class="dl-chip" onclick="document.getElementById(\'dl-bmin\').value=30">30分钟</span></div><div class="fg"><label class="fl">挤奶量(ml) <span style="color:#BCAAA4;font-weight:400">可选</span></label><input type="number" class="fi" id="dl-bval" placeholder="如: 80"></div><div class="dl-quick"><span class="dl-chip" onclick="document.getElementById(\'dl-bval\').value=60">60ml</span><span class="dl-chip" onclick="document.getElementById(\'dl-bval\').value=80">80ml</span><span class="dl-chip" onclick="document.getElementById(\'dl-bval\').value=100">100ml</span><span class="dl-chip" onclick="document.getElementById(\'dl-bval\').value=120">120ml</span></div></div>';
  } else if(type=='sleep')html+='<div class="fg"><label class="fl">时长</label><input type="text" class="fi" id="dl-vt" placeholder="如: 30分钟"></div>';
  else if(type=='diaper')html+='<div class="fg"><label class="fl">内容</label><input type="text" class="fi" id="dl-vt" placeholder="如: 便便+小便"></div>';
  else html+='<div class="fg"><label class="fl">内容</label><input type="text" class="fi" id="dl-vt" placeholder="..."></div>';
  showModal(labels[type],html,async function(){
    var dt=document.getElementById('dl-date').value;
    var tm=document.getElementById('dl-time').value;
    var v=document.getElementById('dl-val');
    var vt=document.getElementById('dl-vt');
    var bmin=document.getElementById('dl-bmin');
    if(!dt){toast('请选择日期','err');return false;}
    try{
      var valueNum=null,valueText='';
      if(type=='feed'){
        var feedType=document.querySelector('#feed-type-chips .chip.on');
        if(feedType&&feedType.dataset.ft==='breast'){
          valueNum=bmin?parseFloat(bmin.value):null;
          var bval=document.getElementById('dl-bval');
          valueText='母乳'+(bval&&bval.value?'|'+parseFloat(bval.value):'');
        } else {
          valueNum=v?parseFloat(v.value):null;
          valueText='配方奶';
        }
      } else {
        if(v)valueNum=parseFloat(v.value);
        if(vt)valueText=vt.value.trim();
      }
      await API.addDailyLog({id:U.genId('dl'),logType:type,date:dt,time:tm,valueNum:valueNum,valueText:valueText,notes:''});toast('已记录','ok');celebrate();return true;
    }catch(e){toast('保存失败: '+e.message,'err');return false;}
  }, function(){
    if(type==='feed'){
      $$('#feed-type-chips .chip').forEach(function(ch){ch.addEventListener('click',function(){$$('#feed-type-chips .chip').forEach(function(c){c.classList.remove('on');});ch.classList.add('on');document.getElementById('feed-formula').style.display=ch.dataset.ft==='breast'?'none':'block';document.getElementById('feed-breast').style.display=ch.dataset.ft==='breast'?'block':'none';});});
    }
  });

}

window._dodl=function(id){confirm('删除？',async function(){await API.deleteDailyLog(id);toast('已删除','ok');Emitter.emit('actionDone');});};

var weeklyWeekStart=null;

function renderWeeklyBanner(){
  try{
  var today=U.today();
  if(!weeklyWeekStart){
    var now=new Date(today+'T00:00:00');
    var day=now.getDay();
    var monOffset=day===0?-6:1-day;
    var mon=new Date(now);mon.setDate(now.getDate()+monOffset);
    weeklyWeekStart=mon.getFullYear()+'-'+('0'+(mon.getMonth()+1)).slice(-2)+'-'+('0'+mon.getDate()).slice(-2);
  }
  var week=getWeekRange(weeklyWeekStart);
  var dLogs=appData.dailyLogs||[];
  var feeds=0,formulaMl=0,breastMin=0,sleeps=0,diapers=0,newMs=0,photos=0,diaries=0;
  for(var i=0;i<dLogs.length;i++){
    var l=dLogs[i];
    if(!isDateInRange(l.date,week))continue;
    if(l.logType==='feed'){feeds++;if(l.valueText&&l.valueText.indexOf('母乳')===0){breastMin+=(l.valueNum||0);}else{formulaMl+=(l.valueNum||0);}}
    else if(l.logType==='sleep')sleeps++;
    else if(l.logType==='diaper')diapers++;
  }
  for(var i=0;i<appData.milestones.length;i++){if(isDateInRange(appData.milestones[i].date,week))newMs++;}
  for(var i=0;i<appData.photos.length;i++){if(isDateInRange(appData.photos[i].date,week))photos++;}
  for(var i=0;i<appData.diaryEntries.length;i++){if(isDateInRange(appData.diaryEntries[i].date,week))diaries++;}

  var stats=[];
  if(feeds>0)stats.push('<span class="wb-stat">🍼 '+feeds+'次</span>');
  if(sleeps>0)stats.push('<span class="wb-stat">😴 '+sleeps+'次</span>');
  if(diapers>0)stats.push('<span class="wb-stat">💩 '+diapers+'次</span>');
  if(newMs>0)stats.push('<span class="wb-stat">🏆 +'+newMs+'</span>');
  if(photos>0)stats.push('<span class="wb-stat">📷 '+photos+'张</span>');
  if(diaries>0)stats.push('<span class="wb-stat">📝 '+diaries+'篇</span>');

  var hasData=stats.length>0;

  return '<div class="wb-card" id="wb-banner" onclick="location.hash=\'weekly\'">'+
    '<div class="wb-icon">📰</div>'+
    '<div class="wb-info">'+
    '<div class="wb-title">成长周报</div>'+
    '<div class="wb-week">'+week.label+'</div>'+
    (hasData?'<div class="wb-stats">'+stats.join('')+'</div>':'<div class="wb-empty">本周还没有记录，去添加吧~</div>')+
    '</div>'+
    '<div class="wb-arrow">→</div>'+
    '</div>';
  }catch(e){return'';}
}

function getWeekRange(dateStr){
  var d=new Date(dateStr+'T00:00:00');
  var day=d.getDay();
  var monOffset=day===0?-6:1-day;
  var mon=new Date(d);mon.setDate(d.getDate()+monOffset);
  var sun=new Date(mon);sun.setDate(mon.getDate()+6);
  function fmt(dd){return dd.getFullYear()+'-'+('0'+(dd.getMonth()+1)).slice(-2)+'-'+('0'+dd.getDate()).slice(-2);}
  var monStr=fmt(mon),sunStr=fmt(sun);
  var label=(mon.getMonth()+1)+'月'+mon.getDate()+'日 - '+(sun.getMonth()+1)+'月'+sun.getDate()+'日';
  if(mon.getMonth()!==sun.getMonth())label=(mon.getMonth()+1)+'月'+mon.getDate()+'日 - '+(sun.getMonth()+1)+'月'+sun.getDate()+'日';
  return{mon:monStr,sun:sunStr,label:label,monDate:mon,sunDate:sun};
}

function isDateInRange(dateStr,week){
  return dateStr>=week.mon&&dateStr<=week.sun;
}

function aggregateFeedByDay(weekLogs,week){
  var days=[];
  for(var i=0;i<7;i++){
    var d=new Date(week.monDate);d.setDate(d.getDate()+i);
    var ds=d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);
    var dayLabels=['一','二','三','四','五','六','日'];
    var formulaCount=0,formulaMl=0,breastCount=0,breastMin=0,breastMl=0;
    for(var j=0;j<weekLogs.length;j++){
      var l=weekLogs[j];
      if(l.logType!=='feed'||l.date!==ds)continue;
      if(l.valueText&&l.valueText.indexOf('母乳')===0){
        breastCount++;breastMin+=(l.valueNum||0);
        var bv=l.valueText.split('|')[1];if(bv)breastMl+=parseFloat(bv);
      } else {formulaCount++;formulaMl+=(l.valueNum||0);}
    }
    days.push({day:dayLabels[i],date:ds,feeds:formulaCount+breastCount,formulaMl:formulaMl,breastMin:breastMin,breastMl:breastMl,formulaCount:formulaCount,breastCount:breastCount});
  }
  return days;
}

function aggregateSleepDiaper(weekLogs){
  var sleepCount=0,sleepTotalMin=0,diaperCount=0;
  for(var i=0;i<weekLogs.length;i++){
    var l=weekLogs[i];
    if(l.logType==='sleep'){sleepCount++;var m=parseInt(l.valueText);if(m>0)sleepTotalMin+=m;}
    else if(l.logType==='diaper')diaperCount++;
  }
  return{sleepCount:sleepCount,sleepTotalMin:sleepTotalMin,diaperCount:diaperCount,avgSleep:Math.round(sleepTotalMin/Math.max(1,sleepCount))};
}

function wrapText(ctx,text,maxW){
  var words=text.split(''),lines=[],line='';
  for(var i=0;i<words.length;i++){
    var test=line+words[i];
    if(ctx.measureText(test).width>maxW&&line.length>0){lines.push(line);line=words[i];}
    else line=test;
  }
  if(line.length>0)lines.push(line);
  return lines;
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function drawShareCard(week,weekGrowth,weekLogs,weekMilestones,weekDiary,weekPhotos,loadedImgs){
  var dpr=window.devicePixelRatio||1;
  var W=750,H=1200;
  var c=document.createElement('canvas');
  c.width=W*dpr;c.height=H*dpr;
  c.style.width=W+'px';c.style.height=H+'px';
  var ctx=c.getContext('2d');
  ctx.scale(dpr,dpr);

  // Background
  var bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#FEF9F5');bg.addColorStop(0.3,'#FFF5F0');bg.addColorStop(0.6,'#FFF0EB');bg.addColorStop(1,'#FEF7F3');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Top decorative stripe
  var stripe=ctx.createLinearGradient(0,0,W,0);
  stripe.addColorStop(0,'#FFA07A');stripe.addColorStop(0.5,'#FFB6C1');stripe.addColorStop(1,'#FFD1C4');
  ctx.fillStyle=stripe;ctx.fillRect(0,0,W,6);

  // === HEADER ===
  ctx.fillStyle='#FFA07A';ctx.font='bold 42px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif';
  ctx.textAlign='center';
  ctx.fillText('🍑',W/2,82);

  var babyName=appData.settings.babyName||'宝宝';
  ctx.fillStyle='#4E342E';ctx.font='bold 44px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif';
  ctx.fillText(babyName+'的成长周报',W/2,152);

  ctx.fillStyle='#A09085';ctx.font='24px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif';
  ctx.fillText(week.label,W/2,192);

  // === SECTION 1: Growth + Feeding ===
  var y=232;
  ctx.fillStyle='#FFFFFF';ctx.strokeStyle='rgba(240,232,224,.6)';ctx.lineWidth=1;
  roundRect(ctx,32,y,W-64,210,20);
  ctx.fill();ctx.stroke();

  ctx.fillStyle='#5D4037';ctx.font='bold 26px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif';
  ctx.textAlign='left';
  ctx.fillText('📈 生长 & 喂养',60,y+42);

  // Stat columns
  var colW=Math.floor((W-64)/3);
  var sx=32;
  if(weekGrowth.length>0){
    var lg=weekGrowth[weekGrowth.length-1];
    var ageDays=lg.ageInDays||0;
    var whoRow=null;
    for(var wi=0;wi<WHO_GIRLS.length;wi++){var row=WHO_GIRLS[wi];if(row[0]>=Math.round(ageDays/30.4375)){whoRow=row;break;}}
    if(!whoRow&&WHO_GIRLS.length>0)whoRow=WHO_GIRLS[WHO_GIRLS.length-1];

    if(lg.height!=null){
      ctx.fillStyle='#FF8C69';ctx.font='bold 36px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif';
      ctx.textAlign='center';
      ctx.fillText(lg.height+'cm',sx+colW*0.5,y+96);
      ctx.fillStyle='#A09085';ctx.font='18px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif';
      ctx.fillText('身高',sx+colW*0.5,y+126);
    }
    if(lg.weight!=null){
      ctx.fillStyle='#81C784';ctx.font='bold 36px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif';
      ctx.textAlign='center';
      ctx.fillText(lg.weight+'kg',sx+colW*1.5,y+96);
      ctx.fillStyle='#A09085';ctx.font='18px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif';
      ctx.fillText('体重',sx+colW*1.5,y+126);
    }
    if(whoRow){
      ctx.fillStyle='#8D6E63';ctx.font='bold 36px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif';
      ctx.textAlign='center';
      ctx.fillText(whoRow[3]+'cm',sx+colW*2.5,y+96);
      ctx.fillStyle='#A09085';ctx.font='18px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif';
      ctx.fillText('同龄均值',sx+colW*2.5,y+126);
    }
  } else {
    ctx.fillStyle='#BCAAA4';ctx.font='20px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif';
    ctx.textAlign='center';
    ctx.fillText('暂无生长记录',W/2,y+110);
  }

  // Feed summary
  var feedDays=aggregateFeedByDay(weekLogs,week);
  var totalFeeds=0,totalFormula=0,totalBreastM=0,totalBreastV=0;
  for(var i=0;i<feedDays.length;i++){totalFeeds+=feedDays[i].feeds;totalFormula+=feedDays[i].formulaMl;totalBreastM+=feedDays[i].breastMin;totalBreastV+=feedDays[i].breastMl;}
  var feedLine='';
  if(totalFormula>0)feedLine+='🍼 配方奶 '+totalFormula+'ml';
  if(totalBreastM>0){if(feedLine)feedLine+='  ·  ';feedLine+='🤱 母乳 '+totalBreastM+'分钟'+(totalBreastV>0?' '+totalBreastV+'ml':'');}
  if(feedLine){
    ctx.fillStyle='#6D5D55';ctx.font='20px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif';
    ctx.textAlign='center';
    ctx.fillText(feedLine+'  |  共 '+totalFeeds+' 次',W/2,y+180);
  } else {
    ctx.fillStyle='#BCAAA4';ctx.font='20px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif';
    ctx.textAlign='center';
    ctx.fillText('暂无喂养记录',W/2,y+180);
  }

  // === SECTION 2: Sleep/Diaper + Milestones ===
  y=462;
  roundRect(ctx,32,y,W-64,200,20);
  ctx.fillStyle='#FFFFFF';ctx.fill();ctx.strokeStyle='rgba(240,232,224,.6)';ctx.stroke();

  ctx.fillStyle='#5D4037';ctx.font='bold 26px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif';
  ctx.textAlign='left';
  ctx.fillText('😴 作息 & 🏆 里程碑',60,y+42);

  var sd=aggregateSleepDiaper(weekLogs);
  ctx.fillStyle='#6D5D55';ctx.font='22px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif';
  ctx.textAlign='center';
  ctx.fillText('😴 睡眠 '+sd.sleepCount+' 次  |  💩 尿布 '+sd.diaperCount+' 次',W/2,y+90);

  if(weekMilestones.length>0){
    ctx.fillStyle='#FF8C69';ctx.font='bold 20px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif';
    var msText='';
    for(var i=0;i<Math.min(weekMilestones.length,2);i++){
      if(i>0)msText+='  ·  ';
      msText+=weekMilestones[i].emoji+' '+weekMilestones[i].title;
    }
    ctx.fillText(msText,W/2,y+140);
  } else {
    ctx.fillStyle='#BCAAA4';ctx.font='18px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif';
    ctx.fillText('本周暂无新里程碑，继续加油~',W/2,y+140);
  }

  // === SECTION 3: Photos + Diary ===
  y=682;
  var hasPhotos=loadedImgs&&loadedImgs.length>0;
  var hasDiary=weekDiary.length>0;
  var sectionH=hasPhotos?280:140;
  if(!hasPhotos&&!hasDiary)sectionH=10;

  if(hasPhotos||hasDiary){
    roundRect(ctx,32,y,W-64,sectionH,20);
    ctx.fillStyle='#FFFFFF';ctx.fill();ctx.strokeStyle='rgba(240,232,224,.6)';ctx.stroke();

    ctx.fillStyle='#5D4037';ctx.font='bold 26px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif';
    ctx.textAlign='left';
    ctx.fillText('📷 本周瞬间 & 📝 日记',60,y+42);

    if(hasPhotos){
      // Draw photo polaroids
      var pw=110,ph=110,pgap=16;
      var totalW=Math.min(loadedImgs.length,4)*(pw+pgap)-pgap;
      var startX=(W-totalW)/2;
      var photoY=y+60;
      for(var pi=0;pi<Math.min(loadedImgs.length,4);pi++){
        var px=startX+pi*(pw+pgap);
        // White polaroid frame
        ctx.fillStyle='#FFFFFF';
        ctx.shadowColor='rgba(0,0,0,.1)';ctx.shadowBlur=8;ctx.shadowOffsetY=3;
        roundRect(ctx,px-4,photoY-4,pw+8,ph+24,6);
        ctx.fill();
        ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetY=0;
        // Photo (catch cross-origin taint errors)
        try{
          ctx.save();
          roundRect(ctx,px,photoY,pw,ph,4);ctx.clip();
          ctx.drawImage(loadedImgs[pi],px,photoY,pw,ph);
          ctx.restore();
        }catch(e){}
        // Date caption
        var pday=U.fmtShort(weekPhotos[pi]?weekPhotos[pi].date:'');
        ctx.fillStyle='#A09085';ctx.font='14px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif';
        ctx.textAlign='center';
        ctx.fillText(pday,px+pw/2,photoY+ph+18);
      }
    }

    if(hasDiary){
      var dy=weekDiary[0];
      var snippet=dy.content||'';
      if(snippet.length>60)snippet=snippet.substring(0,60)+'...';
      var diaryTextY=hasPhotos?y+200:y+72;
      ctx.fillStyle='#8D6E63';ctx.font='italic 20px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif';
      ctx.textAlign='center';
      var lines=wrapText(ctx,'"'+snippet+'"',W-140);
      for(var i=0;i<Math.min(lines.length,2);i++){
        ctx.fillText(lines[i],W/2,diaryTextY+i*30);
      }
    }
  }

  // === Bottom area ===
  var hasData=weekGrowth.length>0||weekLogs.length>0||weekMilestones.length>0||weekDiary.length>0;
  var bottomY=y+(hasPhotos||hasDiary?sectionH+20:20);

  // Bottom message
  var footerY=Math.max(bottomY+30,980);
  ctx.fillStyle='#BCAAA4';ctx.font='20px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif';
  ctx.textAlign='center';
  ctx.fillText('💕 每一天都是珍贵的礼物',W/2,footerY);

  ctx.fillStyle='#D7CCC8';ctx.font='16px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif';
  ctx.fillText('yang2026701.github.io/xiaotaosu',W/2,footerY+36);

  // Stats footer
  if(hasData){
    var statText='';
    if(weekPhotos.length>0)statText+='📷 '+weekPhotos.length+'张 ';
    if(weekMilestones.length>0)statText+='🏆 '+weekMilestones.length+'个 ';
    if(weekDiary.length>0)statText+='📝 '+weekDiary.length+'篇 ';
    ctx.fillStyle='#D7CCC8';ctx.font='14px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif';
    ctx.fillText('本周记录了 '+statText,W/2,footerY+62);
  }

  // toDataURL may throw SecurityError if canvas is tainted by cross-origin images
  try{return c.toDataURL('image/png');}
  catch(e){
    // Fallback: redraw without photos
    try{
      var fbCanvas=document.createElement('canvas');
      fbCanvas.width=W*dpr;fbCanvas.height=H*dpr;
      fbCanvas.style.width=W+'px';fbCanvas.style.height=H+'px';
      var fbCtx=fbCanvas.getContext('2d');
      fbCtx.scale(dpr,dpr);
      return drawShareCardFallback(fbCtx,week,weekGrowth,weekLogs,weekMilestones,weekDiary,W,H);
    }catch(e2){throw new Error('生成失败，请重试');}
  }
}

function drawShareCardFallback(ctx,week,weekGrowth,weekLogs,weekMilestones,weekDiary,W,H){
  var bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#FEF9F5');bg.addColorStop(0.3,'#FFF5F0');bg.addColorStop(0.6,'#FFF0EB');bg.addColorStop(1,'#FEF7F3');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  var stripe=ctx.createLinearGradient(0,0,W,0);
  stripe.addColorStop(0,'#FFA07A');stripe.addColorStop(0.5,'#FFB6C1');stripe.addColorStop(1,'#FFD1C4');
  ctx.fillStyle=stripe;ctx.fillRect(0,0,W,6);
  ctx.fillStyle='#FFA07A';ctx.font='bold 42px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif';
  ctx.textAlign='center';
  ctx.fillText('🍑',W/2,82);
  var babyName=appData.settings.babyName||'宝宝';
  ctx.fillStyle='#4E342E';ctx.font='bold 44px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif';
  ctx.fillText(babyName+'的成长周报',W/2,152);
  ctx.fillStyle='#A09085';ctx.font='24px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif';
  ctx.fillText(week.label,W/2,192);
  ctx.fillStyle='#BCAAA4';ctx.font='22px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif';
  ctx.fillText('📷 照片需在Supabase Storage中配置CORS才能展示',W/2,320);
  ctx.fillText('请在Supabase Storage Settings中允许跨域访问',W/2,350);
  ctx.fillStyle='#BCAAA4';ctx.font='18px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif';
  ctx.fillText('💕 每一天都是珍贵的礼物',W/2,480);
  return ctx.canvas.toDataURL('image/png');
}

async function showShareCard(){
  try{
  var week=getWeekRange(weeklyWeekStart);
  var birth=appData.settings.birthDate;

  var weekGrowth=[],weekMilestones=[],weekDiary=[],weekPhotos=[],weekLogs=[];
  for(var i=0;i<appData.growthRecords.length;i++){var r=appData.growthRecords[i];if(isDateInRange(r.date,week))weekGrowth.push(r);}
  for(var i=0;i<appData.milestones.length;i++){var m=appData.milestones[i];if(isDateInRange(m.date,week))weekMilestones.push(m);}
  for(var i=0;i<appData.diaryEntries.length;i++){var e=appData.diaryEntries[i];if(isDateInRange(e.date,week))weekDiary.push(e);}
  for(var i=0;i<appData.photos.length;i++){var p=appData.photos[i];if(isDateInRange(p.date,week))weekPhotos.push(p);}
  var dLogs=appData.dailyLogs||[];
  for(var i=0;i<dLogs.length;i++){var l=dLogs[i];if(isDateInRange(l.date,week))weekLogs.push(l);}

  // Show loading
  toast('正在生成卡片...','ok');

  // Preload up to 4 photos (crossOrigin to avoid canvas taint)
  var loadedImgs=[];
  var maxPhotos=Math.min(weekPhotos.length,4);
  for(var i=0;i<maxPhotos;i++){
    var purl=weekPhotos[i].thumbnailDataUrl||weekPhotos[i].dataUrl;
    if(purl){
      try{
        var img=await new Promise(function(resolve){
          var im=new Image();
          // Only set crossOrigin for external URLs, not data: URLs
          if(purl.indexOf('http')===0){im.crossOrigin='anonymous';}
          var done=false;
          im.onload=function(){if(!done){done=true;resolve(im);}};
          im.onerror=function(){if(!done){done=true;resolve(null);}};
          setTimeout(function(){if(!done){done=true;resolve(null);}},5000);
          im.src=purl;
        });
        if(img)loadedImgs.push(img);
      }catch(e){}
    }
  }

  setTimeout(function(){
    try{
      var dataUrl=drawShareCard(week,weekGrowth,weekLogs,weekMilestones,weekDiary,weekPhotos,loadedImgs);
      var simg=document.getElementById('sm-img');
      if(simg)simg.src=dataUrl;
      var ov=document.getElementById('sm-overlay');
      if(ov)ov.classList.remove('hidden');

      // Download button
      var dl=document.getElementById('sm-dl');
      if(dl)dl.onclick=function(){
        var a=document.createElement('a');
        a.href=dataUrl;a.download=(appData.settings.babyName||'宝宝')+'_周报_'+week.label+'.png';
        a.click();
      };
    }catch(e){toast('生成失败: '+e.message,'err');}
  },100);
  }catch(e){toast('生成失败: '+e.message,'err');}
}

function renderHealthFiles(r){
  let html='';
  try{
    const paths=JSON.parse(r.filePath||'[]');
    const names=JSON.parse(r.fileName||'[]');
    paths.forEach((p,i)=>{html+='<div class="hr-file" onclick="window.open(\''+CFG.SUPABASE_URL+'/storage/v1/object/public/media/'+U.esc(p)+'\',\'_blank\')"><span class="hr-file-icon">📎</span> '+U.esc(names[i]||'附件'+(i+1))+'</div>';});
  }catch(e){
    // Legacy single file format
    html+='<div class="hr-file" onclick="window.open(\''+CFG.SUPABASE_URL+'/storage/v1/object/public/media/'+U.esc(r.filePath)+'\',\'_blank\')"><span class="hr-file-icon">📎</span> '+U.esc(r.fileName||'查看附件')+'</div>';
  }
  return html;
}
function renderHealth(){
  const records=appData.healthRecords||[];
  const birth=appData.settings.birthDate;
  const birthD=new Date(birth+'T00:00:00');
  const todayD=new Date();const elapsed=Math.floor((todayD-birthD)/86400000);

  // "AI" Analysis
  const completedSet=new Set(records.filter(r=>r.isCompleted).map(r=>r.title));
  const dueVaccines=VACCINE_SCHEDULE.filter(v=>v.days<=elapsed+30&&!completedSet.has(v.v));
  const overdueVaccines=VACCINE_SCHEDULE.filter(v=>v.days<=elapsed&&!completedSet.has(v.v));
  const dueCheckups=CHECKUP_SCHEDULE.filter(v=>v.days<=elapsed+60&&!completedSet.has(v.v));
  const todayVaccines=VACCINE_SCHEDULE.filter(v=>Math.abs(v.days-elapsed)<=3&&!completedSet.has(v.v));
  const completedCount=records.filter(r=>r.isCompleted).length;
  const vaccineDone=VACCINE_SCHEDULE.filter(v=>completedSet.has(v.v)).length;
  const vaccineTotal=VACCINE_SCHEDULE.length;

  let html='';

  // AI Analysis Box
  html+='<div class="health-ai"><h3>🤖 AI 智能分析</h3>';
  if(overdueVaccines.length>0){
    html+='<div class="health-ai-item"><span class="health-ai-warn">⚠️ '+overdueVaccines.length+'项疫苗已超期未接种：</span></div>';
    overdueVaccines.slice(0,4).forEach(v=>{html+='<div class="health-ai-item" style="margin-left:16px">· '+v.v+'（应于出生后'+v.days+'天内接种）</div>';});
  }
  if(todayVaccines.length>0){
    html+='<div class="health-ai-item"><span class="health-ai-warn">🔔 近期需接种：</span></div>';
    todayVaccines.forEach(v=>{html+='<div class="health-ai-item" style="margin-left:16px">· '+v.v+'</div>';});
  }
  const nextCheckup=CHECKUP_SCHEDULE.filter(v=>v.days>elapsed&&!completedSet.has(v.v)).slice(0,1);
  if(nextCheckup.length>0){
    html+='<div class="health-ai-item">📋 下次体检：'+nextCheckup[0].v+'（'+(nextCheckup[0].days-elapsed)+'天后）</div>';
  }
  html+='<div class="health-ai-item"><span class="health-ai-ok">✅ 已完成 '+vaccineDone+'/'+vaccineTotal+' 针疫苗，'+completedCount+' 项健康记录</span></div>';
  html+='<div class="health-ai-item" style="font-size:.8rem;color:#BCAAA4">注：建议仅供参考，请遵医嘱</div>';
  html+='</div>';

  // Summary cards
  html+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">';
  html+='<div class="stat-tile"><div style="font-size:1.3rem">💉</div><div class="stat-val">'+vaccineDone+'/'+vaccineTotal+'</div><div class="stat-lbl">疫苗接种</div></div>';
  html+='<div class="stat-tile"><div style="font-size:1.3rem">🏥</div><div class="stat-val">'+completedCount+'</div><div class="stat-lbl">健康记录</div></div>';
  html+='<div class="stat-tile" style="cursor:pointer" id="pending-tile"><div style="font-size:1.3rem">📅</div><div class="stat-val">'+(dueVaccines.length+dueCheckups.length)+'</div><div class="stat-lbl">近期待办</div></div>';
  html+='</div>';

  // Timeline
  const timeline=[];
  // Add completed records
  records.filter(r=>r.isCompleted).forEach(r=>{timeline.push({...r,_source:'record'});});
  // Add due vaccines not yet recorded
  dueVaccines.forEach(v=>{const exists=records.find(r=>r.isCompleted&&r.title===v.v);if(!exists)timeline.push({id:v.v,title:v.v,date:new Date(birthD.getTime()+v.days*86400000).toISOString().slice(0,10),ageDays:v.days,recordType:'vaccine',isCompleted:false,notes:'系统提醒：应于出生后'+v.days+'天接种',_source:'auto'});});
  // Add upcoming checkups
  dueCheckups.forEach(v=>{const exists=records.find(r=>r.isCompleted&&r.title===v.v);if(!exists)timeline.push({id:v.v,title:v.v,date:new Date(birthD.getTime()+v.days*86400000).toISOString().slice(0,10),ageDays:v.days,recordType:'checkup',isCompleted:false,notes:'系统提醒：建议体检',_source:'auto'});});
  timeline.sort((a,b)=>a.date.localeCompare(b.date));

  html+='<h3 style="font-size:14px;color:#BCAAA4;margin:20px 0 12px">📋 健康时间线</h3>';
  html+='<div class="health-tl">';
  let lastMonth='';
  timeline.forEach(r=>{
    const m=r.date.substring(0,7);
    if(m!==lastMonth){html+='<div style="font-size:.75rem;color:#BCAAA4;margin:12px 0 6px;font-weight:600">'+U.fmtMonth(r.date+'T00:00:00')+'</div>';lastMonth=m;}
    const isOverdue=!r.isCompleted&&r.date<U.today();
    const badgeLabel={vaccine:'疫苗',checkup:'体检',illness:'生病',medication:'用药'};
    html+='<div class="hr-card'+(r.isCompleted?' done':'')+(isOverdue?' overdue':'')+'">'+
      '<div class="hr-top"><span class="hr-badge '+(r.recordType||'checkup')+'">'+((badgeLabel[r.recordType]||'其他')+(r._source==='auto'&&!r.isCompleted?'·待办':''))+'</span>'+
      (isOverdue?'<span style="font-size:.65rem;color:#EF9A9A;font-weight:600">已超期</span>':'')+
      '<span class="hr-date">'+U.fmtDate(r.date)+' · '+(r.ageDays||0)+'天</span></div>'+
      '<div class="hr-title">'+U.esc(r.title)+'</div>'+
      (r.notes?'<div class="hr-notes">'+U.esc(r.notes)+'</div>':'')+
      (r.filePath?renderHealthFiles(r):'')+
      (r._source==='record'?'<div class="hr-actions">'+
        '<button class="btn btn-s btn-sm btn-hr-del" data-id="'+r.id+'">删除</button></div>':
        (r._source==='auto'?'<div class="hr-actions">'+
          '<button class="btn btn-p btn-sm btn-hr-done" data-v="'+U.esc(r.title)+'" data-days="'+r.ageDays+'" data-type="'+r.recordType+'">标记完成</button></div>':''));
    html+='</div>';
  });
  html+='</div>';

  // Add custom record button  
  html+='<div class="hr-add" id="hr-add"><div class="hr-add-icon">+ 添加记录</div><div class="hr-add-text">疫苗、体检、生病、用药</div></div>';

  $('#page-health').innerHTML=html;

  // Bind events
  $('#hr-add')?.addEventListener('click',showHealthForm);
  $('#pending-tile')?.addEventListener('click',()=>showPendingList(dueVaccines,dueCheckups,records));
  $$('.btn-hr-del').forEach(b=>{b.addEventListener('click',e=>{e.stopPropagation();confirm('确定删除？',async()=>{await API.deleteHealth(b.dataset.id);toast('已删除','ok');Emitter.emit('actionDone');});});});
  $$('.btn-hr-done').forEach(b=>{b.addEventListener('click',async e=>{e.stopPropagation();
    const h={id:U.genId('h'),recordType:b.dataset.type||'vaccine',title:b.dataset.v,date:U.today(),ageDays:parseInt(b.dataset.days)||0,notes:'',isCompleted:true};
    await API.addHealth(h);toast('已记录','ok');celebrate();Emitter.emit('actionDone');
  });});
}

function showPendingList(dueVaccines,dueCheckups,records){
  const birth=appData.settings.birthDate;
  const birthD=new Date(birth+'T00:00:00');
  const now=new Date(),elapsed=Math.floor((now-birthD)/86400000);
  let html='';
  if(dueVaccines.length>0){
    html+='<h3 style="font-size:.9rem;color:#FF8C69;margin-bottom:8px">💉 近期需接种疫苗 ('+dueVaccines.length+'项)</h3>';
    dueVaccines.slice(0,8).forEach(v=>{
      const dl=v.days-elapsed;
      const targetDate=new Date(birthD.getTime()+v.days*86400000).toISOString().slice(0,10);
      html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #F0E8E0"><div><span style="font-size:.9rem">'+v.v+'</span><span style="font-size:.7rem;color:#BCAAA4;margin-left:8px">建议'+v.days+'天</span></div><span style="font-size:.8rem;font-weight:500;color:'+(dl<=0?'#EF9A9A':'#FF8C69')+'">'+(dl<=0?'已超期'+(Math.abs(dl))+'天':dl+'天后')+'</span></div>';
    });
  }
  if(dueCheckups.length>0){
    html+='<h3 style="font-size:.9rem;color:#81C784;margin:16px 0 8px">🏥 近期建议体检 ('+dueCheckups.length+'项)</h3>';
    dueCheckups.slice(0,8).forEach(v=>{
      const dl=v.days-elapsed;
      html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #F0E8E0"><div><span style="font-size:.9rem">'+v.v+'</span><span style="font-size:.7rem;color:#BCAAA4;margin-left:8px">建议'+v.days+'天</span></div><span style="font-size:.8rem;font-weight:500;color:'+(dl<=0?'#EF9A9A':'#8D6E63')+'">'+(dl<=0?'已超期'+(Math.abs(dl))+'天':dl+'天后')+'</span></div>';
    });
  }
  if(dueVaccines.length===0&&dueCheckups.length===0){
    html='<div style="text-align:center;padding:24px;color:#81C784">✅ 暂无待办，很棒！</div>';
  }
  html+='<div style="font-size:.7rem;color:#BCAAA4;margin-top:12px;text-align:center">注：建议仅供参考，请遵医嘱</div>';
  showModal('📅 近期待办',html,()=>true);
}
function showHealthForm(){
  const today=U.today();
  const html='<div class="fg"><label class="fl">类型</label><select class="fi" id="hr-type"><option value="vaccine">💉 疫苗接种</option><option value="checkup">🏥 体检</option><option value="illness">🤒 生病</option><option value="medication">💊 用药</option></select></div>'+
    '<div class="fg"><label class="fl">标题</label><input type="text" class="fi" id="hr-title" placeholder="例如：五联疫苗第一针"></div>'+
    '<div class="fg"><label class="fl">日期</label><input type="date" class="fi" id="hr-date" value="'+today+'"></div>'+
    '<div class="fg"><label class="fl">备注</label><textarea class="ft" id="hr-notes" rows="2" placeholder="医生建议、反应等..."></textarea></div>'+
    '<div class="fg"><label class="fl">上传附件（可多选，PDF/图片/文档等）</label><input type="file" class="hr-file-input" id="hr-file-upload" accept="*" multiple><button type="button" class="btn btn-s btn-sm" id="hr-file-btn">选择文件</button> <span style="font-size:.75rem;color:#BCAAA4" id="hr-file-name">未选择文件</span></div>';
  let healthFiles=[];
  showModal('添加健康记录',html,async()=>{
    const type=$('#hr-type').value,title=$('#hr-title').value.trim(),date=$('#hr-date').value,notes=$('#hr-notes').value.trim();
    if(!title){toast('请输入标题','err');return false;}
    if(!date){toast('请选择日期','err');return false;}
    const birth=appData.settings.birthDate,ageDays=U.age(birth,date).totalDays;
    const hid=U.genId('h');
    let filePath='',fileName='';
    // Upload multiple files
    if(healthFiles.length>0){
      toast('正在上传'+healthFiles.length+'个文件...','');
      const uploads=healthFiles.map((f,i)=>{
        const ext=(f.name.split('.').pop()||'pdf').replace(/[^a-z0-9]/gi,'');
        const safeName=hid+'_'+i+'.'+ext;
        const fd=new FormData();fd.append('file',f,safeName);
        return uploadFileDirect('health/'+safeName,fd).then(p=>({path:p,name:f.name}));
      });
      try{
        const results=await Promise.all(uploads);
        filePath=JSON.stringify(results.map(r=>r.path));
        fileName=JSON.stringify(results.map(r=>r.name));
      }catch(e){toast('附件上传失败: '+e.message,'err');return false;}
    }
    try{await API.addHealth({id:hid,recordType:type,title,date,ageDays,notes,isCompleted:true,filePath,fileName});toast('已添加','ok');celebrate();return true;}
    catch(e){toast('保存失败: '+e.message,'err');return false;}
  },()=>{
    // On modal open, bind file input
    $('#hr-file-btn').addEventListener('click',()=>{$('#hr-file-upload').click();});
    $('#hr-file-upload').addEventListener('change',function(){
      if(this.files.length>0){healthFiles=Array.from(this.files);$('#hr-file-name').textContent='已选 '+healthFiles.length+' 个文件 ('+(healthFiles.reduce((s,f)=>s+f.size,0)/1024).toFixed(0)+'KB)';}
    });
  });
}

function renderParenting(){
  const birth=appData.settings.birthDate;
  const birthD=new Date(birth+'T00:00:00');
  const todayD=new Date();
  const elapsed=Math.floor((todayD-birthD)/86400000);
  const currentMonth=Math.floor(elapsed/30.4375);

  const checks=appData.parentingChecks||[];
  const checkMap=new Map();
  checks.forEach(c=>checkMap.set(c.stage_key+'_'+c.item_key, true));

  // Determine which stage is "current" based on age
  let activeStage=null, currentStageIdx=0;
  for(let i=PARENTING_STAGES.length-1;i>=0;i--){
    if(PARENTING_STAGES[i].months<=currentMonth+1){currentStageIdx=i;break;}
  }
  activeStage=PARENTING_STAGES[currentStageIdx];

  let html='';

  // Progress bar
  let totalItems=0,completedItems=0;
  PARENTING_STAGES.forEach(s=>{s.items.forEach(cat=>{totalItems+=cat.items.length;});});
  completedItems=checkMap.size;
  const pct=totalItems>0?Math.round(completedItems/totalItems*100):0;

  html+='<div class="pg-progress"><h3 style="font-size:1rem;font-weight:600">📚 育儿宝典</h3><p style="font-size:.8rem;color:#8D6E63;margin-top:4px">小桃酥当前月龄：'+currentMonth+'个月 · 已完成 '+completedItems+'/'+totalItems+' 项（'+pct+'%）</p><div class="pg-progress-bar"><div class="pg-progress-fill" style="width:'+pct+'%"></div></div><p style="font-size:.7rem;color:#BCAAA4;margin-top:6px">基于浙江省科学育儿指导服务手册 + WHO/中国卫健委权威指南</p></div>';

  // Render stages from current backwards
  const visibleStages=[];
  for(let i=PARENTING_STAGES.length-1;i>=0;i--){
    if(i<=currentStageIdx+1||(i<=currentStageIdx+3&&checkMap.size>0)){
      visibleStages.push({...PARENTING_STAGES[i], _isActive:i===currentStageIdx, _isUpcoming:i>currentStageIdx, _isExpanded:i===currentStageIdx||(i===currentStageIdx+1&&i>0)});
    }
  }

  visibleStages.forEach(s=>{
    let stageDone=0,stageTotal=0;
    s.items.forEach(cat=>{cat.items.forEach(it=>{stageTotal++;if(checkMap.has(s.key+'_'+it.key))stageDone++;});});
    const stagePct=stageTotal>0?Math.round(stageDone/stageTotal*100):0;

    html+='<div class="pg-stage-card'+(s._isActive?' active':'')+'" data-stage="'+s.key+'">';
    html+='<div class="pg-stage-header" onclick="this.parentElement.classList.toggle(\'expanded\')">';
    html+='<div><div class="pg-stage-title">'+s.icon+' '+s.title+'</div><div class="pg-stage-age">'+s.ageRange+(s._isActive?' · 当前阶段':'')+'</div></div>';
    html+='<div style="text-align:right"><span class="pg-stage-badge '+(stagePct>=80?'done':s._isActive?'current':'upcoming')+'">'+stageDone+'/'+stageTotal+'</span></div>';

        if(k.video)html+='<a href="https://www.youtube.com/results?search_query='+encodeURIComponent(k.video)+'" target="_blank" style="display:inline-flex;align-items:center;gap:3px;font-size:.75rem;color:#FF0000;text-decoration:none;background:#FFEBEE;padding:3px 8px;border-radius:6px">▶️ YouTube</a>';
        html+='</div>';
        html+=k.body;
        if(k.tags)html+='<div>'+(k.tags||[]).map(t=>'<span class="pg-kn-tag">'+U.esc(t)+'</span>').join('')+'</div>';

      });
      html+='</div></div>';
    }
    s.items.forEach(cat=>{
      let catDone=0,catTotal=cat.items.length;
      cat.items.forEach(it=>{if(checkMap.has(s.key+'_'+it.key))catDone++;});
      html+='<div class="pg-cat"><div class="pg-cat-title">'+cat.cat+' ('+catDone+'/'+catTotal+')</div>';

        const done=checkMap.has(s.key+'_'+it.key);
        html+='<div class="pg-item" onclick="toggleParentingCheck(\''+s.key+'\',\''+it.key+'\')"><div class="pg-check'+(done?' done':'')+'">'+(done?'✓':'')+'</div><div><div class="pg-item-text">'+it.text+'</div>'+(it.tip?'<div class="pg-item-tip">💡 '+it.tip+'</div>':'')+'</div></div>';
      });
      html+='</div>';
    });
    html+='</div></div>';
  });

  $('#page-parenting').innerHTML=html;

async function toggleParentingCheck(stageKey,itemKey){
  const checks=appData.parentingChecks||[];
  const cid=stageKey+'_'+itemKey;
  const existing=checks.find(c=>c.stage_key+'_'+c.item_key===cid);
  const nowCompleted=!existing;
  try{
    await API.saveParentingCheck(stageKey,itemKey,nowCompleted);
    toast(nowCompleted?'已标记完成 ✓':'已取消标记','ok');
    if(nowCompleted)celebrate();
    Emitter.emit('actionDone');
  }catch(e){toast('操作失败: '+e.message,'err');}
}

var recognition=null;
function initDiaryVoice(){
  var btn=$('#dy-voice'); if(!btn)return;
  if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)){
    btn.style.display='none'; return;
  }
  btn.addEventListener('click',function(){
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(recognition&&recognition.abort){recognition.abort();}
    recognition=new SR();
    recognition.lang='zh-CN';
    recognition.interimResults=true;
    recognition.continuous=true;
    recognition.maxAlternatives=1;
    var textarea=$('#dy-content'), hint=$('#dy-hint');
    textarea.placeholder='正在聆听...';
    btn.style.background='#FF8C69';btn.style.color='#fff';
    hint.textContent='🎙️ 正在聆听，请说话...';
    recognition.onresult=function(e){
      var transcript='';
      for(var i=e.resultIndex;i<e.results.length;i++){
        transcript+=e.results[i][0].transcript;
      }
      // Append to existing text
      var prev=textarea.value;
      textarea.value=prev+(prev?'\n':'')+transcript;
      textarea.scrollTop=textarea.scrollHeight;
    };
    recognition.onerror=function(e){
      hint.textContent='语音输入出错: '+e.error;
      stopVoice();
    };
    recognition.onend=function(){
      stopVoice();
      hint.textContent='✅ 语音输入完成';
      setTimeout(function(){hint.textContent='';},2000);
    };
    recognition.start();
  });
}
function stopVoice(){
  var btn=$('#dy-voice');
  if(btn){btn.style.background='';btn.style.color='';}
  $('#dy-content').placeholder='今天发生了什么...';
  if(recognition){try{recognition.stop();}catch(e){}}
}

const DS_API='https://api.deepseek.com/chat/completions';

function getDSKey(){
  // Try localStorage first, then app config
  var k=localStorage.getItem('xts_ds_key');
  if(k)return k;
  if(appData&&appData.settings&&appData.settings.dsApiKey)return appData.settings.dsApiKey;
  return '';
}
function setDSKey(k){localStorage.setItem('xts_ds_key',k);}

async function callDeepSeek(prompt,systemPrompt){
  var key=getDSKey();
  if(!key)throw new Error('NO_KEY');
  var res=await fetch(DS_API,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({
      model:'deepseek-chat',
      messages:[
        {role:'system',content:systemPrompt||'你是一个温暖的育儿助手，帮助父母记录宝宝的成长日记。用温馨、细腻的中文写作。'},
        {role:'user',content:prompt}
      ],
      temperature:0.8,max_tokens:1500,stream:false
    })
  });
  if(!res.ok){
    var err=await res.text();
    if(res.status===401)throw new Error('API密钥无效，请检查后重试');
    if(res.status===402)throw new Error('API余额不足');
    throw new Error('AI请求失败('+res.status+'): '+err.slice(0,100));
  }
  var data=await res.json();
  return data.choices[0].message.content;
}

// Offline fallback polish (used when no API key configured)
function localPolish(text){
  var result=text;
  result=result.replace(/开心|高兴|快乐/g,function(m){return m+'😊';});
  result=result.replace(/哭|伤心|难过/g,function(m){return m+'😢';});
  result=result.replace(/可爱|萌|乖/g,function(m){return m+'💕';});
  result=result.replace(/第一次|首次/g,function(m){return '✨'+m;});
  result=result.replace(/([。！？])\s*/g,'$1\n');
  if(!result.match(/^(今天|昨天|早上|下午|晚上|刚刚)/)){
    var h=new Date().getHours();
    result=(h<12?'早上':h<18?'下午':'晚上')+'，'+result;
  }
  return result.replace(/\n{3,}/g,'\n\n').trim();
}

function getUpcomingMilestones(birthDate) {
  const birth = new Date(birthDate + 'T00:00:00');
  const today = new Date();
  const elapsed = Math.floor((today - birth) / 86400000);

  // Define key milestones: [days, emoji, label]
  const keyDays = [
    { days: 30,   emoji: '🌕', label: '满月' },
    { days: 42,   emoji: '🍼', label: '产后复查' },
    { days: 100,  emoji: '🎂', label: '百天' },
    { days: 183,  emoji: '👶', label: '半岁' },
    { days: 365,  emoji: '🎈', label: '周岁' },
    { days: 730,  emoji: '🌟', label: '两岁' },
    { days: 1095, emoji: '🎓', label: '三岁' },
  ];

  // Filter to future milestones, sorted nearest first
  const upcoming = keyDays
    .filter(m => m.days > elapsed)
    .map(m => ({ ...m, daysLeft: m.days - elapsed, totalDays: m.days }));

  // Also check if today IS a milestone
  const todayMatch = keyDays.find(m => m.days === elapsed);
  if (todayMatch) {
    return [{ ...todayMatch, daysLeft: 0, label: todayMatch.label + '就是今天！' }];
  }

  return upcoming;
}
